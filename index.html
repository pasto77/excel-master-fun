<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Master Fun | L'Académie Interactive</title>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <style>
        :root { --gold: #fbbf24; --bg: #020617; --card: #1e293b; --text: #f8fafc; --success: #22c55e; }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }

        /* Header & Stats */
        .header { display: flex; justify-content: space-between; align-items: center; padding: 20px; background: var(--card); border-radius: 20px; margin-bottom: 25px; border: 1px solid rgba(251, 191, 36, 0.3); }
        .logo { font-weight: 800; color: var(--gold); font-size: 1.4rem; }
        .stats-bar { display: flex; gap: 20px; }
        .stat-item { text-align: center; }
        .stat-num { display: block; font-size: 1.2rem; font-weight: bold; color: var(--gold); }

        /* Curriculum Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .module-card { background: var(--card); border-radius: 15px; padding: 20px; cursor: pointer; transition: 0.3s; border-left: 5px solid transparent; position: relative; }
        .module-card:hover { transform: translateY(-5px); background: #2d3a4f; }
        .module-card.done { border-left-color: var(--success); }
        .module-card.locked { opacity: 0.5; filter: grayscale(1); cursor: not-allowed; }
        .badge { background: var(--gold); color: #000; padding: 2px 8px; border-radius: 10px; font-size: 0.7rem; font-weight: bold; position: absolute; top: 15px; right: 15px; }

        /* Modal Immersif */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: none; place-items: center; z-index: 1000; padding: 10px; overflow-y: auto; }
        .modal.active { display: grid; }
        .modal-content { background: var(--card); width: 100%; max-width: 800px; border-radius: 25px; overflow: hidden; }
        .video-container { width: 100%; aspect-ratio: 16/9; background: #000; border-bottom: 3px solid var(--gold); }
        .content-area { padding: 30px; }
        .concept-box { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border-left: 4px solid var(--gold); }
        
        /* Quiz & Interaction */
        .quiz-area { background: #0f172a; padding: 20px; border-radius: 15px; margin-top: 20px; }
        input { width: 100%; padding: 15px; border-radius: 10px; border: 2px solid #334155; background: #000; color: #fff; margin: 15px 0; font-size: 1.1rem; text-align: center; }
        input:focus { border-color: var(--gold); outline: none; }
        .btn-check { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--gold); color: #000; font-weight: 800; cursor: pointer; text-transform: uppercase; }

        .auth-overlay { position: fixed; inset: 0; background: var(--bg); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
    </style>
</head>
<body>

<div id="authScreen" class="auth-overlay">
    <h1 style="color:var(--gold); margin-bottom:20px;">EXCEL MASTER FUN</h1>
    <p style="margin-bottom:30px; opacity:0.8;">L'Académie qui transforme les débutants en Experts.</p>
    <button onclick="loginGoogle()" class="btn-check" style="width:auto; padding:15px 40px;">Se connecter avec Google</button>
</div>

<div class="container">
    <div class="header">
        <div class="logo">EXCEL ACADEMY</div>
        <div class="stats-bar">
            <div class="stat-item"><span class="stat-num" id="st-lv">1</span><small>Niveau</small></div>
            <div class="stat-item"><span class="stat-num" id="st-xp">0</span><small>XP</small></div>
            <div class="stat-item"><span class="stat-num" id="st-done">0</span><small>Modules</small></div>
        </div>
    </div>

    <h2 style="margin-bottom:25px;">🎓 Ton Parcours de Transformation</h2>
    <div class="grid" id="lessonGrid"></div>
</div>

<div class="modal" id="lessonModal">
    <div class="modal-content">
        <div class="video-container" id="videoBox">
            </div>
        <div class="content-area">
            <h2 id="m-title" style="color:var(--gold); margin-bottom:10px;"></h2>
            <div class="concept-box" id="m-exp"></div>
            
            <div class="quiz-area">
                <p><b>🎯 Défi Pratique :</b> <span id="m-q"></span></p>
                <input type="text" id="ansInput" placeholder="Tapez votre réponse ou formule ici...">
                <button class="btn-check" onclick="verifyAnswer()">Valider l'étape</button>
            </div>
            <p onclick="closeModal()" style="text-align:center; margin-top:20px; cursor:pointer; opacity:0.5;">Retour au menu</p>
        </div>
    </div>
</div>

<script>
    // --- CONFIG FIREBASE ---
    const firebaseConfig = {
        apiKey: "AIzaSyDtPKWklKh7Ijd_zTev7uq9gmuXcXfoFKQ",
        authDomain: "excel-master-5.firebaseapp.com",
        projectId: "excel-master-5",
        storageBucket: "excel-master-5.appspot.com",
        messagingSenderId: "409433181308",
        appId: "1:409433181308:web:5db60af28ade85f1110df9"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();

    let userData = { xp: 0, done: [], premium: false };
    let currentLesson = null;

    // --- BASE DE DONNÉES ENRICHIE (Vidéos + Démo) ---
    const lessons = {
        1: { 
            t: "L'Interface : Dompter la Grille", 
            exp: "Avant de calculer, il faut savoir naviguer. Découvrez comment Excel organise ses milliards de données.",
            vid: "https://www.youtube.com/embed/dQw4w9WgXcQ", // METTRE TES LIENS ICI
            q: "Quelle est l'adresse de la cellule à l'intersection de la colonne B et de la ligne 5 ?",
            a: "B5",
            xp: 20 
        },
        2: { 
            t: "La Formule Magique : SOMME", 
            exp: "Ne perdez plus de temps à additionner. Laissez Excel faire le travail lourd pour vous.",
            vid: "https://www.youtube.com/embed/dQw4w9WgXcQ",
            q: "Écrivez la formule pour additionner les cellules de A1 jusqu'à A10.",
            a: "=SOMME(A1:A10)",
            xp: 30
        },
        // Ajoute ici jusqu'à 100 leçons...
    };

    // --- LOGIQUE CORE ---
    function renderGrid() {
        const grid = document.getElementById('lessonGrid');
        grid.innerHTML = "";
        Object.keys(lessons).forEach(id => {
            const l = lessons[id];
            const isDone = userData.done.includes(id);
            const isLocked = id > 10 && !userData.premium;
            
            grid.innerHTML += `
                <div class="module-card ${isDone?'done':''} ${isLocked?'locked':''}" onclick="openLesson(${id})">
                    <span class="badge">+${l.xp} XP</span>
                    <h3 style="margin-bottom:10px;">${id}. ${l.t}</h3>
                    <p style="font-size:0.8rem; opacity:0.7;">${l.exp.substring(0, 60)}...</p>
                    <div style="margin-top:15px; font-size:0.9rem; color:var(--gold);">${isLocked ? '🔒 Débloquer' : '▶️ Commencer'}</div>
                </div>
            `;
        });
        updateStats();
    }

    function openLesson(id) {
        if (id > 10 && !userData.premium) {
            alert("🔒 Accès Premium requis. Contactez le 677 05 10 62 pour débloquer tout le parcours.");
            return;
        }
        currentLesson = { id, ...lessons[id] };
        document.getElementById('videoBox').innerHTML = `<iframe width="100%" height="100%" src="${currentLesson.vid}" frameborder="0" allowfullscreen></iframe>`;
        document.getElementById('m-title').innerText = currentLesson.t;
        document.getElementById('m-exp').innerHTML = `<p>📖 <b>Le Concept :</b> ${currentLesson.exp}</p>`;
        document.getElementById('m-q').innerText = currentLesson.q;
        document.getElementById('lessonModal').classList.add('active');
    }

    function verifyAnswer() {
        const val = document.getElementById('ansInput').value.trim().toUpperCase();
        if (val === currentLesson.a.toUpperCase()) {
            if (!userData.done.includes(currentLesson.id.toString())) {
                userData.done.push(currentLesson.id.toString());
                userData.xp += currentLesson.xp;
                saveData();
            }
            alert("✅ MAGNIFIQUE ! Vous avez maîtrisé cette étape.");
            closeModal();
            renderGrid();
        } else {
            alert("❌ Pas tout à fait... Regardez bien la vidéo et réessayez !");
        }
    }

    function closeModal() {
        document.getElementById('lessonModal').classList.remove('active');
        document.getElementById('videoBox').innerHTML = ""; // Stop la vidéo
    }

    // --- CLOUD SYNC ---
    async function saveData() {
        if (auth.currentUser) {
            await db.collection('users').doc(auth.currentUser.uid).set(userData);
        }
    }

    function updateStats() {
        document.getElementById('st-lv').innerText = Math.floor(userData.xp / 300) + 1;
        document.getElementById('st-xp').innerText = userData.xp;
        document.getElementById('st-done').innerText = userData.done.length;
    }

    async function loginGoogle() {
        const provider = new firebase.auth.GoogleAuthProvider();
        await auth.signInWithPopup(provider);
    }

    auth.onAuthStateChanged(async (user) => {
        if (user) {
            document.getElementById('authScreen').style.display = 'none';
            const doc = await db.collection('users').doc(user.uid).get();
            if (doc.exists) userData = doc.data();
            renderGrid();
        }
    });
</script>
</body>
</html>
