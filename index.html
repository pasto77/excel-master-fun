<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Excel Master Fun - Plateforme Universelle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --primary: #FFD700;
            --primary-dark: #FFC107;
            --primary-light: #FFF9C4;
            --secondary: #4ECCA3;
            --secondary-dark: #2E8B57;
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-light: #0f3460;
            --text: #e9ecef;
            --text-muted: #a0a0a0;
            --danger: #ff4b5c;
            --success: #4CAF50;
            --warning: #FF9800;
            --info: #2196F3;
            --border: rgba(255, 215, 0, 0.2);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        html[dir="rtl"] {
            text-align: right;
        }

        html[dir="rtl"] .coach-bubble::after {
            right: auto;
            left: 20px;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        #app {
            width: 100%;
            max-width: 1400px;
            height: 90vh;
            background: var(--bg-card);
            border-radius: 30px;
            box-shadow: var(--shadow);
            display: flex;
            overflow: hidden;
            border: 1px solid var(--border);
            position: relative;
        }

        #sidebar {
            width: 320px;
            background: linear-gradient(180deg, var(--bg-card) 0%, #0f1a2f 100%);
            border-right: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        html[dir="rtl"] #sidebar {
            border-right: none;
            border-left: 2px solid var(--border);
        }

        .brand {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 2px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
        }

        .brand h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .brand small {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .user-info {
            padding: 15px 20px;
            background: rgba(255, 215, 0, 0.05);
            border-bottom: 1px solid var(--border);
        }

        .user-name {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .level-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .xp-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            width: 0%;
            transition: width 0.3s ease;
        }

        .badges-preview {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .badge-mini {
            width: 30px;
            height: 30px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            border: 1px solid var(--border);
        }

        .badge-mini.earned {
            background: var(--primary);
            color: #000;
        }

        .chapters-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .chapters-header h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
        }

        .filter-badge {
            background: var(--secondary);
            color: #000;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        #chapters-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        #chapters-list li {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        #chapters-list li:hover {
            background: rgba(255, 215, 0, 0.1);
        }

        #chapters-list li.completed {
            background: rgba(78, 204, 163, 0.1);
            border-left: 4px solid var(--secondary);
        }

        html[dir="rtl"] #chapters-list li.completed {
            border-left: none;
            border-right: 4px solid var(--secondary);
        }

        #main {
            flex-grow: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle at 30% 50%, rgba(78, 204, 163, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                        var(--bg-dark);
            overflow-y: auto;
        }

        .progress-container {
            position: absolute;
            top: 20px;
            left: 40px;
            right: 40px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            width: 0%;
            transition: width 0.4s ease;
        }

        .language-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 5px;
        }

        html[dir="rtl"] .language-selector {
            right: auto;
            left: 20px;
        }

        .lang-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .lang-btn.active {
            background: var(--primary);
            color: #000;
        }

        .coach-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
        }

        html[dir="rtl"] .coach-container {
            right: auto;
            left: 30px;
        }

        .coach-bubble {
            background: var(--bg-card);
            border: 2px solid var(--primary);
            border-radius: 20px 20px 5px 20px;
            padding: 15px;
            max-width: 250px;
            position: relative;
            margin-bottom: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            animation: float 3s infinite ease-in-out;
        }

        html[dir="rtl"] .coach-bubble {
            border-radius: 20px 20px 20px 5px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .coach-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            right: 20px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid var(--primary);
        }

        html[dir="rtl"] .coach-bubble::after {
            right: auto;
            left: 20px;
        }

        .coach-avatar {
            display: flex;
            justify-content: flex-end;
        }

        html[dir="rtl"] .coach-avatar {
            justify-content: flex-start;
        }

        .coach-avatar img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            cursor: pointer;
            transition: 0.3s;
        }

        .coach-avatar img:hover {
            transform: scale(1.1);
        }

        .card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
            text-align: center;
        }

        .card h3 {
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-bottom: 30px;
            text-align: center;
        }

        .intro-ticker {
            width: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            color: #000;
            padding: 12px 0;
            border-radius: 50px;
            margin-bottom: 25px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .ticker-content {
            display: flex;
            animation: ticker 15s linear infinite;
            white-space: nowrap;
        }

        .ticker-item {
            display: inline-flex;
            align-items: center;
            padding: 0 30px;
            font-weight: 600;
            font-size: 1rem;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .coach-intro-card {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(78, 204, 163, 0.1) 100%);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            animation: slideIn 0.5s;
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .coach-intro-avatar {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 3px solid var(--secondary);
        }

        .coach-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border-radius: 20px;
            margin: 25px 0;
            border-left: 5px solid var(--primary);
            line-height: 1.6;
            font-size: 1.1rem;
            position: relative;
        }

        html[dir="rtl"] .coach-box {
            border-left: none;
            border-right: 5px solid var(--primary);
        }

        .coach-box::before {
            content: '"';
            position: absolute;
            top: -10px;
            left: 15px;
            font-size: 4rem;
            color: var(--primary);
            opacity: 0.3;
        }

        html[dir="rtl"] .coach-box::before {
            left: auto;
            right: 15px;
        }

        input, select, textarea {
            width: 100%;
            padding: 15px;
            background: rgba(10, 10, 26, 0.8);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: 0.3s;
            margin-bottom: 15px;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        button {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            width: 100%;
            font-size: 1rem;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
            margin: 5px 0;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }

        button.secondary {
            background: var(--secondary);
            box-shadow: 0 5px 15px rgba(78, 204, 163, 0.3);
        }

        .auth-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .auth-tab {
            background: rgba(255, 215, 0, 0.1);
            color: var(--text);
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            text-align: center;
            flex: 1;
            font-weight: 600;
        }

        .auth-tab.active {
            background: var(--primary);
            color: #000;
        }

        .question-card {
            background: rgba(255, 255, 255, 0.03);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .question-card label {
            display: block;
            margin: 8px 0;
            padding: 8px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 5px;
            cursor: pointer;
        }

        .question-card label:hover {
            background: rgba(255, 215, 0, 0.1);
        }

        .feedback {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
        }

        .feedback.success {
            background: rgba(76, 175, 80, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .feedback.error {
            background: rgba(255, 75, 92, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .unlock-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            border: 1px dashed var(--primary);
        }

        .whatsapp-btn {
            display: inline-block;
            text-decoration: none;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            margin: 5px;
            transition: 0.3s;
            text-align: center;
        }

        .wa-1 { background: #25D366; }
        .wa-2 { background: #075E54; }

        .certificate {
            background: white;
            color: #333;
            padding: 40px;
            border: 15px double var(--primary);
            text-align: center;
            max-width: 800px;
            margin: 0 auto;
        }

        .certificate h1 {
            font-size: 3rem;
            color: #000;
            margin-bottom: 20px;
        }

        .certificate h2 {
            font-size: 1.8rem;
            color: #333;
            border-bottom: 3px solid var(--primary);
            display: inline-block;
            padding: 0 30px 10px;
            margin: 20px 0;
        }

        .certificate .user-name {
            font-size: 2.5rem;
            color: var(--primary-dark);
            font-weight: 800;
            margin: 30px 0;
            text-transform: uppercase;
        }

        .print-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        @media print {
            body * { visibility: hidden; }
            .certificate, .certificate * { visibility: visible; }
            .certificate { position: absolute; left: 0; top: 0; width: 100%; }
        }

        @media (max-width: 768px) {
            #app { flex-direction: column; height: auto; }
            #sidebar { width: 100%; max-height: 300px; }
            .language-selector { top: 10px; right: 10px; }
        }
    </style>
</head>

        const CHAPTERS = {};
        for (let i = 1; i <= 100; i++) {
            CHAPTERS[i] = {
                title: i <= 10 ? `Leçon ${i}` : `Chapitre avancé ${i}`,
                question: i <= 10 ? `Question pour la leçon ${i}` : `Question avancée ${i}`,

                "Excel peut traiter plus d'un million de lignes !",

        // ============================================
        // FONCTIONS API
        // ============================================
        
        async function apiCall(endpoint, options = {}) {
            const url = `${API_BASE_URL}${endpoint}`;
            const headers = {
                'Content-Type': 'application/json',
                ...options.headers
            };
            
            if (authToken) {
                headers['Authorization'] = `Bearer ${authToken}`;
            }
            
            try {
                const response = await fetch(url, {
                    ...options,
                    headers
                });
                
                if (response.status === 204) {
                    return null;
                }
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Erreur API');
                }
                
                return data;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }

        async function register(email, password, name) {
            try {
                const data = await apiCall('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({ email, password, full_name: name })
                });
                
                authToken = data.token;
                localStorage.setItem('token', data.token);
                localStorage.setItem('userName', data.user.name);
                
                return data.user;
            } catch (error) {
                alert("Erreur d'inscription: " + error.message);
                return null;
            }
        }

        async function login(email, password) {
            try {
                const data = await apiCall('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({ email, password })
                });
                
                authToken = data.token;
                localStorage.setItem('token', data.token);
                localStorage.setItem('userName', data.user.name);
                localStorage.setItem('userLevel', data.user.level);
                localStorage.setItem('userXp', data.user.xp);
                
                userLevel = data.user.level;
                userXp = data.user.xp;
                userName = data.user.name;
                
                return data.user;
            } catch (error) {
                alert("Erreur de connexion: " + error.message);
                return null;
            }
        }

        function logout() {
            authToken = null;
            localStorage.removeItem('token');
            localStorage.removeItem('userName');
            localStorage.removeItem('userLevel');
            localStorage.removeItem('userXp');
            localStorage.removeItem('excelProgress');
            location.reload();
        }

        // ============================================
        // FONCTIONS UI
        // ============================================
        
        function t(key) {
            const keys = key.split('.');
            let value = translations[currentLang];
            for (const k of keys) {
                if (!value) return key;
                value = value[k];
            }
            return value || key;
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('excelLang', lang);
            document.documentElement.setAttribute('dir', lang === 'ar' ? 'rtl' : 'ltr');
            
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase().includes(lang)) {
                    btn.classList.add('active');
                }
            });
            
            updateUITexts();
            if (authToken) {
                showDashboard();
            } else {
                showAuthScreen();
            }
        }

        function updateUITexts() {
            document.getElementById('brand-title').textContent = t('brand');
            document.getElementById('brand-subtitle').textContent = t('brandSub');
        }

        function showAuthScreen() {
            document.getElementById('user-info').style.display = 'none';
            document.getElementById('chapters-header').style.display = 'none';
            document.getElementById('progress-container').style.display = 'none';
            document.getElementById('coach-container').style.display = 'none';
            document.getElementById('chapters-list').innerHTML = '';
            
            document.getElementById('lesson-content').innerHTML = `
                <h2>${t('welcome')}</h2>
                <h3>${t('welcomeDesc')}</h3>
                
                <div class="auth-tabs">
                    <div class="auth-tab active" onclick="showLoginForm()">${t('login')}</div>
                    <div class="auth-tab" onclick="showRegisterForm()">${t('register')}</div>
                </div>
                
                <div id="auth-form">
                    ${getLoginForm()}
                </div>
            `;
        }

        function getLoginForm() {
            return `
                <input type="email" id="login-email" placeholder="${t('email')}">
                <input type="password" id="login-password" placeholder="${t('password')}">
                <button onclick="handleLogin()">${t('loginBtn')}</button>
            `;
        }

        function getRegisterForm() {
            return `
                <input type="text" id="register-name" placeholder="${t('name')}">
                <input type="email" id="register-email" placeholder="${t('email')}">
                <input type="password" id="register-password" placeholder="${t('password')}">
                <button onclick="handleRegister()">${t('registerBtn')}</button>
            `;
        }

        function showLoginForm() {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('auth-form').innerHTML = getLoginForm();
        }

        function showRegisterForm() {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('auth-form').innerHTML = getRegisterForm();
        }

        async function handleLogin() {
            const email = document.getElementById('login-email')?.value;
            const password = document.getElementById('login-password')?.value;
            
            if (!email || !password) {
                alert('Veuillez remplir tous les champs');
                return;
            }
            
            const user = await login(email, password);
            if (user) {
                showDashboard();
            }
        }

        async function handleRegister() {
            const name = document.getElementById('register-name')?.value;
            const email = document.getElementById('register-email')?.value;
            const password = document.getElementById('register-password')?.value;
            
            if (!name || !email || !password) {
                alert('Veuillez remplir tous les champs');
                return;
            }
            
            const user = await register(email, password, name);
            if (user) {
                showDashboard();
            }
        }

        function showDashboard() {
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('chapters-header').style.display = 'flex';
            document.getElementById('progress-container').style.display = 'block';
            document.getElementById('coach-container').style.display = 'block';
            
            document.getElementById('display-name').textContent = userName;
            document.getElementById('level-display').textContent = userLevel;
            
            const nextLevelXp = userLevel < 7 ? userLevel * 300 : 2700;
            const currentLevelXp = userLevel > 1 ? (userLevel - 1) * 300 : 0;
            const xpInLevel = userXp - currentLevelXp;
            const xpNeeded = nextLevelXp - currentLevelXp;
            const progressPercent = (xpInLevel / xpNeeded) * 100;
            
            document.getElementById('xp-bar').style.width = progressPercent + '%';
            document.getElementById('xp-display').textContent = `${xpInLevel}/${xpNeeded} ${t('xp')}`;
            document.getElementById('completed-counter').textContent = `${completedChapters.size}/100`;
            document.getElementById('progress-bar').style.width = (completedChapters.size / 100 * 100) + '%';
            
            renderChaptersList();
            
            if (completedChapters.size > 0) {
                let lastCompleted = Math.max(...Array.from(completedChapters));
                if (lastCompleted < 100) {
                    loadChapter(lastCompleted + 1);
                } else {
                    showCertificate();
                }
            } else {
                loadChapter(1);
            }
        }

        function renderChaptersList() {
            const list = document.getElementById('chapters-list');
            list.innerHTML = '';

            for (let i = 1; i <= 100; i++) {
                const isCompleted = completedChapters.has(i);
                const isLocked = i > 10 && !isPremium && !isCompleted;
                
                const li = document.createElement('li');
                li.className = `${isCompleted ? 'completed' : ''} ${isLocked ? 'locked' : ''}`;
                li.innerHTML = `
                    <span class="chapter-number">${i}</span>
                    <span class="chapter-title">${CHAPTERS[i].title}</span>
                    <span class="chapter-status ${isCompleted ? 'completed' : ''}">${isCompleted ? '✓' : (isLocked ? '🔒' : '')}</span>
                `;
                
                if (!isLocked) {
                    li.onclick = () => loadChapter(i);
                }
                
                list.appendChild(li);
            }
        }

        function loadChapter(i) {
            currentLesson = i;
            localStorage.setItem('currentLesson', i);
            
            if (i > 100) {
                showCertificate();
                return;
            }

            if (i > 10 && !isPremium && !completedChapters.has(i)) {
                showUnlockScreen();
                return;
            }

            const chapter = CHAPTERS[i];
            const funFact = (FUN_FACTS[currentLang] || FUN_FACTS.fr)[Math.floor(Math.random() * (FUN_FACTS[currentLang] || FUN_FACTS.fr).length)];
            
            document.getElementById('lesson-content').innerHTML = `
                <div class="intro-ticker">
                    <div class="ticker-content">
                        ${Array(3).fill(0).map(() => `
                            <div class="ticker-item"><span>⭐</span><span>${funFact}</span><span>⭐</span></div>
                        `).join('')}
                    </div>
                </div>

                <div class="coach-intro-card">
                    <div class="coach-intro-avatar">🦊</div>
                    <div class="coach-intro-text">
                        <h4>Coach Excelix</h4>
                        <p>${t('coachIntro')}</p>
                        <div class="fun-fact">💡 ${funFact}</div>
                    </div>
                </div>

                <span class="lesson-number">Chapitre ${i}/100</span>
                <h2>${chapter.title}</h2>
                
                <div class="coach-box">${chapter.question}</div>
                
                <input type="text" id="answer-input" placeholder="${t('answer')}" autofocus>
                <button onclick="checkAnswer(${i})">${t('validate')}</button>
                
                <div id="feedback" class="feedback"></div>
            `;
            
            document.getElementById('answer-input')?.focus();
        }

        function checkAnswer(i) {
            const answer = document.getElementById('answer-input')?.value.trim().toUpperCase() || '';
            const correct = CHAPTERS[i].answer.toUpperCase();
            const feedback = document.getElementById('feedback');

            if (answer === correct) {
                if (!completedChapters.has(i)) {
                    completedChapters.add(i);
                    localStorage.setItem('excelProgress', JSON.stringify(Array.from(completedChapters)));
                    
                    let xpGain = i <= 10 ? 10 : i <= 20 ? 15 : i <= 50 ? 20 : 30;
                    userXp += xpGain;
                    localStorage.setItem('userXp', userXp);
                    
                    feedback.className = 'feedback success';
                    feedback.innerHTML = `✅ ${t('correct')} +${xpGain} XP`;
                    
                    if (i === 10) {
                        setTimeout(() => showUnlockScreen(), 1000);
                        return;
                    }
                } else {
                    feedback.className = 'feedback success';
                    feedback.innerHTML = `✅ Déjà validé !`;
                }

                setTimeout(() => {
                    if (i === 100) showCertificate();
                    else loadChapter(i + 1);
                }, 800);
            } else {
                feedback.className = 'feedback error';
                feedback.innerHTML = `❌ ${t('incorrect')} ${CHAPTERS[i].answer}`;
            }
        }

        function showUnlockScreen() {
            document.getElementById('lesson-content').innerHTML = `
                <h2>🔓 Accès Premium</h2>
                <div class="coach-box">Excellent travail ! Tu as terminé les 10 premiers chapitres.</div>
                
                <div class="unlock-section">
                    <input type="text" id="unlock-name" placeholder="TON NOM" value="${userName}">
                    <input type="text" id="unlock-key" placeholder="CLÉ D'ACTIVATION">
                    <button onclick="unlockPremium()">DÉBLOQUER</button>
                    
                    <div style="margin-top: 20px;">
                        <p>Obtenir une clé via WhatsApp :</p>
                        <a href="https://wa.me/237677051062" class="whatsapp-btn wa-1">📱 Ligne 1</a>
                        <a href="https://wa.me/237659718567" class="whatsapp-btn wa-2">📱 Ligne 2</a>
                    </div>
                </div>
                
                <button class="secondary" onclick="logout()">${t('logout')}</button>
            `;
        }

        function unlockPremium() {
            const name = document.getElementById('unlock-name')?.value.trim().toUpperCase() || userName.toUpperCase();
            const key = document.getElementById('unlock-key')?.value.trim().toUpperCase() || '';
            
            if (key === `EXL-${name}-2026` || key === MASTER_KEY) {
                isPremium = true;
                localStorage.setItem('excelPremium', 'true');
                localStorage.setItem('userName', name);
                userName = name;
                showDashboard();
            } else {
                alert("❌ Clé invalide");
            }
        }

        function showCertificate() {
            const today = new Date().toLocaleDateString(currentLang === 'fr' ? 'fr-FR' : 'en-US', {
                day: 'numeric', month: 'long', year: 'numeric'
            });
            
            document.getElementById('lesson-content').innerHTML = `
                <div class="certificate">
                    <h1>🏆</h1>
                    <h2>${t('certificate')}</h2>
                    <div class="user-name">${userName}</div>
                    <div>A validé les 100 chapitres<br><strong>Excel Master Fun</strong></div>
                    <div style="margin: 30px 0;">${t('level')} ${t('levelNames.' + userLevel)}<br>XP: ${userXp}</div>
                    <div class="certificate-footer">Douala, ${today}</div>
                    <button class="print-btn" onclick="window.print()">${t('print')}</button>
                </div>
                <button class="secondary" style="margin-top:20px;" onclick="logout()">${t('logout')}</button>
            `;
        }

        // ============================================
        // INITIALISATION
        // ============================================
        
        window.onload = function() {
            changeLanguage(currentLang);
            if (authToken) {
                showDashboard();
            } else {
                showAuthScreen();
            }
        };
