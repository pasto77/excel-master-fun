<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EXCEL MASTER FUN - Édition Universelle</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* ============================================
           STYLE ULTIME - DESIGN INTEMPOREL
           ============================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --primary: #FFD700;
            --primary-dark: #FFC107;
            --primary-light: #FFF9C4;
            --secondary: #4ECCA3;
            --secondary-dark: #2E8B57;
            --secondary-light: #A7E9D0;
            --accent: #FF6B6B;
            --bg-dark: #0A0A1A;
            --bg-card: #12122F;
            --bg-light: #1E1E3F;
            --text: #FFFFFF;
            --text-muted: #B0B0B0;
            --text-dark: #333333;
            --danger: #FF4757;
            --success: #00D68F;
            --warning: #FFA500;
            --info: #3498DB;
            --border: rgba(255, 215, 0, 0.2);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            --shadow-sm: 0 5px 15px rgba(0, 0, 0, 0.3);
            --gradient: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            --gradient-reverse: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
        }

        html[dir="rtl"] {
            text-align: right;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
            position: relative;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 30%, rgba(255, 215, 0, 0.1) 0%, transparent 30%),
                        radial-gradient(circle at 80% 70%, rgba(78, 204, 163, 0.1) 0%, transparent 30%);
            pointer-events: none;
        }

        #app {
            width: 100%;
            max-width: 1600px;
            height: 95vh;
            background: rgba(18, 18, 47, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: var(--shadow);
            display: flex;
            overflow: hidden;
            border: 2px solid var(--border);
            position: relative;
            z-index: 10;
        }

        /* ============================================
           SIDEBAR - LÉGENDAIRE
           ============================================ */
        #sidebar {
            width: 350px;
            background: linear-gradient(180deg, var(--bg-card) 0%, #0A0A1F 100%);
            border-right: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .brand {
            padding: 30px 25px;
            text-align: center;
            border-bottom: 2px solid var(--border);
            background: rgba(0, 0, 0, 0.3);
            position: relative;
        }

        .brand h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
        }

        .brand small {
            color: var(--text-muted);
            font-size: 0.9rem;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .user-profile {
            padding: 25px;
            background: rgba(255, 215, 0, 0.05);
            border-bottom: 2px solid var(--border);
        }

        .user-avatar {
            width: 80px;
            height: 80px;
            background: var(--gradient);
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 4px solid var(--primary);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
        }

        .user-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            text-align: center;
            margin-bottom: 5px;
        }

        .user-title {
            text-align: center;
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .level-container {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .level-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.9rem;
        }

        .level-number {
            color: var(--primary);
            font-weight: 700;
        }

        .xp-bar {
            width: 100%;
            height: 10px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            overflow: hidden;
            margin-bottom: 10px;
        }

        .xp-fill {
            height: 100%;
            background: var(--gradient);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 5px;
            position: relative;
        }

        .xp-fill::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 10px;
            height: 100%;
            background: white;
            filter: blur(5px);
            animation: scan 2s infinite;
        }

        .xp-text {
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .badges-container {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .badge-item {
            width: 50px;
            height: 50px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            border: 2px solid var(--border);
            transition: 0.3s;
            cursor: pointer;
            position: relative;
        }

        .badge-item.earned {
            background: var(--primary);
            border-color: var(--primary);
            color: #000;
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--primary);
        }

        .badge-item:hover::after {
            content: attr(data-name);
            position: absolute;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.7rem;
            white-space: nowrap;
            border: 1px solid var(--primary);
            z-index: 1000;
        }

        .chapters-section {
            flex: 1;
            padding: 20px;
        }

        .chapters-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .chapters-header h3 {
            color: var(--primary);
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .progress-badge {
            background: var(--secondary);
            color: #000;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 700;
        }

        #chapters-list {
            list-style: none;
        }

        #chapters-list li {
            padding: 15px 20px;
            margin-bottom: 8px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 15px;
            border: 1px solid var(--border);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        #chapters-list li::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 4px;
            background: var(--gradient);
            opacity: 0;
            transition: 0.3s;
        }

        #chapters-list li:hover {
            transform: translateX(5px);
            background: rgba(255, 215, 0, 0.1);
        }

        #chapters-list li:hover::before {
            opacity: 1;
        }

        #chapters-list li.completed {
            background: rgba(78, 204, 163, 0.1);
            border-color: var(--secondary);
        }

        #chapters-list li.completed::before {
            background: var(--secondary);
            opacity: 1;
        }

        #chapters-list li.locked {
            opacity: 0.5;
            filter: grayscale(1);
            cursor: not-allowed;
        }

        .chapter-number {
            font-weight: 700;
            color: var(--primary);
            margin-right: 15px;
        }

        .chapter-status {
            width: 25px;
            height: 25px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            background: rgba(255, 255, 255, 0.1);
        }

        .chapter-status.completed {
            background: var(--secondary);
            color: #000;
        }

        /* ============================================
           MAIN CONTENT - ZONE PRINCIPALE
           ============================================ */
        #main {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-y: auto;
        }

        .global-progress {
            position: absolute;
            top: 20px;
            left: 40px;
            right: 40px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        #global-progress-bar {
            height: 100%;
            background: var(--gradient);
            width: 0%;
            transition: width 0.5s ease;
            border-radius: 4px;
            position: relative;
        }

        #global-progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 20px;
            height: 100%;
            background: white;
            filter: blur(10px);
            animation: scan 2s infinite;
        }

        .language-selector {
            position: absolute;
            top: 20px;
            right: 40px;
            z-index: 100;
            display: flex;
            gap: 5px;
        }

        .lang-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 8px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .lang-btn:hover {
            background: rgba(255, 215, 0, 0.3);
        }

        .lang-btn.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }

        .coach-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
            animation: float 3s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .coach-bubble {
            background: var(--bg-card);
            border: 3px solid var(--primary);
            border-radius: 25px 25px 5px 25px;
            padding: 20px;
            max-width: 300px;
            position: relative;
            margin-bottom: 15px;
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .coach-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            right: 20px;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 15px solid var(--primary);
        }

        .coach-message {
            color: var(--text);
            font-size: 1rem;
            line-height: 1.5;
            font-style: italic;
        }

        .coach-avatar {
            display: flex;
            justify-content: flex-end;
        }

        .coach-avatar img {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.3);
            cursor: pointer;
            transition: 0.3s;
        }

        .coach-avatar img:hover {
            transform: scale(1.1);
        }

        /* ============================================
           CARD PRINCIPALE - CONTENU DYNAMIQUE
           ============================================ */
        .main-card {
            background: rgba(18, 18, 47, 0.8);
            backdrop-filter: blur(10px);
            padding: 50px;
            border-radius: 40px;
            width: 100%;
            max-width: 800px;
            border: 2px solid var(--border);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .main-card h1 {
            font-size: 2.8rem;
            font-weight: 800;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 20px;
        }

        .main-card h2 {
            font-size: 2rem;
            color: var(--primary);
            text-align: center;
            margin-bottom: 30px;
        }

        .main-card h3 {
            color: var(--text-muted);
            text-align: center;
            margin-bottom: 40px;
            font-weight: 400;
        }

        .intro-ticker {
            width: 100%;
            background: var(--gradient);
            color: #000;
            padding: 15px 0;
            border-radius: 50px;
            margin-bottom: 30px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        .ticker-content {
            display: flex;
            animation: ticker 20s linear infinite;
            white-space: nowrap;
        }

        .ticker-item {
            display: inline-flex;
            align-items: center;
            padding: 0 40px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        .ticker-item span {
            margin: 0 15px;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        .coach-intro {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(78, 204, 163, 0.1) 100%);
            border: 2px solid var(--primary);
            border-radius: 30px;
            padding: 30px;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            gap: 25px;
        }

        .coach-intro-avatar {
            width: 100px;
            height: 100px;
            background: var(--gradient);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            border: 4px solid var(--secondary);
            box-shadow: 0 0 40px var(--primary);
        }

        .coach-intro-text {
            flex: 1;
        }

        .coach-intro-text h4 {
            color: var(--primary);
            font-size: 1.4rem;
            margin-bottom: 10px;
        }

        .coach-intro-text p {
            color: var(--text);
            font-size: 1.1rem;
            line-height: 1.6;
            font-style: italic;
        }

        .fun-fact {
            margin-top: 15px;
            padding: 10px 15px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            color: var(--secondary);
            font-size: 1rem;
            border-left: 3px solid var(--secondary);
        }

        .lesson-number {
            display: inline-block;
            background: var(--gradient);
            color: #000;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 25px;
        }

        .question-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 30px;
            border-radius: 25px;
            margin: 30px 0;
            border-left: 5px solid var(--primary);
            font-size: 1.2rem;
            line-height: 1.6;
            position: relative;
        }

        .question-box::before {
            content: '"';
            position: absolute;
            top: -15px;
            left: 20px;
            font-size: 5rem;
            color: var(--primary);
            opacity: 0.2;
            font-family: serif;
        }

        .input-field {
            width: 100%;
            padding: 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid var(--border);
            border-radius: 15px;
            color: white;
            font-size: 1.1rem;
            margin: 15px 0;
            transition: 0.3s;
        }

        .input-field:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.2);
        }

        .btn {
            background: var(--gradient);
            color: #000;
            border: none;
            padding: 18px 30px;
            font-weight: 700;
            border-radius: 15px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: 0.3s;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 10px 20px rgba(255, 215, 0, 0.3);
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(255, 215, 0, 0.4);
        }

        .btn-secondary {
            background: var(--secondary);
            box-shadow: 0 10px 20px rgba(78, 204, 163, 0.3);
        }

        .btn-danger {
            background: var(--danger);
            box-shadow: 0 10px 20px rgba(255, 71, 87, 0.3);
        }

        .feedback {
            margin-top: 20px;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-weight: 600;
            font-size: 1.1rem;
            animation: pulse 0.5s;
        }

        .feedback.success {
            background: rgba(0, 214, 143, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .feedback.error {
            background: rgba(255, 71, 87, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .auth-tabs {
            display: flex;
            gap: 15px;
            margin: 30px 0;
        }

        .auth-tab {
            flex: 1;
            padding: 15px;
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-align: center;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .auth-tab:hover {
            background: rgba(255, 215, 0, 0.2);
        }

        .auth-tab.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }

        .unlock-section {
            margin: 40px 0;
            padding: 30px;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 20px;
            border: 2px dashed var(--primary);
            text-align: center;
        }

        .whatsapp-btn {
            display: inline-block;
            text-decoration: none;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-weight: 600;
            margin: 10px;
            transition: 0.3s;
        }

        .wa-1 { background: #25D366; }
        .wa-2 { background: #075E54; }

        .whatsapp-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .certificate {
            background: white;
            color: #333;
            padding: 50px;
            border: 20px double var(--primary);
            text-align: center;
            border-radius: 20px;
        }

        .certificate h1 {
            font-size: 4rem;
            color: #000;
            margin-bottom: 30px;
        }

        .certificate h2 {
            font-size: 2.2rem;
            color: #333;
            border-bottom: 4px solid var(--primary);
            display: inline-block;
            padding: 0 40px 15px;
            margin: 30px 0;
        }

        .certificate .user-name {
            font-size: 3rem;
            color: var(--primary-dark);
            font-weight: 800;
            margin: 30px 0;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            #app { flex-direction: column; }
            #sidebar { width: 100%; max-height: 40vh; }
            .main-card { padding: 30px; }
            .coach-intro { flex-direction: column; text-align: center; }
            .language-selector { top: 10px; right: 10px; }
        }

        @media print {
            body * { visibility: hidden; }
            .certificate, .certificate * { visibility: visible; }
            .certificate { position: absolute; left: 0; top: 0; width: 100%; border: none; background: white; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Language Selector -->
        <div class="language-selector">
            <button class="lang-btn active" onclick="changeLanguage('fr')">FR</button>
            <button class="lang-btn" onclick="changeLanguage('en')">EN</button>
            <button class="lang-btn" onclick="changeLanguage('es')">ES</button>
            <button class="lang-btn" onclick="changeLanguage('ar')">عربي</button>
        </div>

        <!-- Sidebar -->
        <div id="sidebar">
            <div class="brand">
                <h1>EXCEL MASTER FUN</h1>
                <small>ÉDITION UNIVERSELLE</small>
            </div>

            <div class="user-profile" id="user-profile" style="display: none;">
                <div class="user-avatar" id="user-avatar">👤</div>
                <div class="user-name" id="user-name">Apprenant</div>
                <div class="user-title" id="user-title">Niveau 1: L'abruti</div>
                
                <div class="level-container">
                    <div class="level-header">
                        <span class="level-number" id="level-number">Niveau 1</span>
                        <span id="xp-counter">0/300 XP</span>
                    </div>
                    <div class="xp-bar">
                        <div class="xp-fill" id="xp-fill" style="width: 0%"></div>
                    </div>
                    <div class="xp-text" id="xp-total">0 XP total</div>
                </div>

                <div class="badges-container" id="badges-container">
                    <!-- Badges dynamiques -->
                </div>
            </div>

            <div class="chapters-section" id="chapters-section" style="display: none;">
                <div class="chapters-header">
                    <h3>📚 CHAPITRES</h3>
                    <span class="progress-badge" id="chapters-progress">0/100</span>
                </div>
                <ul id="chapters-list"></ul>
            </div>

            <div style="padding: 20px; text-align: center; border-top: 2px solid var(--border);">
                <small>Support: 677 05 10 62</small>
            </div>
        </div>

        <!-- Main Content -->
        <div id="main">
            <div class="global-progress">
                <div id="global-progress-bar"></div>
            </div>

            <div class="coach-container">
                <div class="coach-bubble" id="coach-bubble">
                    <div class="coach-message" id="coach-message">Salut ! Je suis Excelix, ton coach pour cette aventure !</div>

        // ============================================
        
        const BADGES = [
            { id: 'welcome', icon: '🎉', name: 'Bienvenue', condition: { type: 'login' } },
            { id: 'survivor', icon: '🦊', name: 'Survivant', condition: { type: 'level', level: 1 } },
            { id: 'scholar', icon: '📚', name: 'Érudit', condition: { type: 'lessons', count: 10 } },
            { id: 'detective', icon: '🔍', name: 'Détective', condition: { type: 'lessons', count: 25 } },
            { id: 'wizard', icon: '🧙', name: 'Magicien', condition: { type: 'lessons', count: 50 } },
            { id: 'master', icon: '👑', name: 'Maître', condition: { type: 'level', level: 6 } },
            { id: 'legend', icon: '⭐', name: 'Légende', condition: { type: 'level', level: 7 } },
            { id: 'streak7', icon: '🔥', name: 'Habitué', condition: { type: 'streak', days: 7 } },
            { id: 'streak30', icon: '💫', name: 'Accro', condition: { type: 'streak', days: 30 } },
            { id: 'perfect', icon: '💯', name: 'Parfait', condition: { type: 'perfect', count: 10 } }
        ];

        // ============================================
        // ÉTAT DE L'APPLICATION
        // ============================================
        
        let currentLang = localStorage.getItem('lang') || 'fr';
        let token = localStorage.getItem('token');
        let currentUser = null;
        let userData = {
            name: '',
            level: 1,
            xp: 0,
            badges: [],
            completed: new Set(),
            streak: 0,
            lastLogin: null
        };

        // ============================================
        // FONCTIONS UTILITAIRES
        // ============================================
        
        function t(key) {
            const keys = key.split('.');
            let value = TRANSLATIONS[currentLang];
            for (const k of keys) {
                value = value?.[k];
                if (!value) return key;
            }
            return value;
        }

        function getLevelFromXp(xp) {
            if (xp >= 2700) return 7;
            if (xp >= 2000) return 6;
            if (xp >= 1400) return 5;
            if (xp >= 900) return 4;
            if (xp >= 500) return 3;
            if (xp >= 200) return 2;
            return 1;
        }

        function updateUserLevel() {
            const newLevel = getLevelFromXp(userData.xp);
            if (newLevel > userData.level) {
                userData.level = newLevel;
                checkBadges();
                showCoachMessage(`🚀 ${t('levelUp')} ${t('levelNames.' + (newLevel-1))} → ${t('levelNames.' + newLevel)}`);
            }
            return userData.level;
        }

        function addXp(amount) {
            userData.xp += amount;
            updateUserLevel();
            saveUserData();
            updateUI();
        }

        function checkBadges() {
            BADGES.forEach(badge => {
                if (userData.badges.includes(badge.id)) return;

                let earned = false;
                switch(badge.condition.type) {
                    case 'level':
                        earned = userData.level >= badge.condition.level;
                        break;
                    case 'lessons':
                        earned = userData.completed.size >= badge.condition.count;
                        break;
                    case 'streak':
                        earned = userData.streak >= badge.condition.days;
                        break;
                    case 'perfect':
                        earned = checkPerfectLessons(badge.condition.count);
                        break;
                }

                if (earned) {
                    userData.badges.push(badge.id);
                    showCoachMessage(`🏆 ${t('badgeEarned')} : ${badge.name}`);
                }
            });
            saveUserData();
        }

        function checkPerfectLessons(count) {
            // Implémenter la logique des leçons parfaites
            return false;
        }

        function showCoachMessage(message, duration = 4000) {
            const bubble = document.getElementById('coach-message');
            if (!bubble) return;
            
            bubble.textContent = message;
            bubble.style.animation = 'none';
            bubble.offsetHeight;
            bubble.style.animation = 'pulse 0.5s';
            
            setTimeout(() => {
                bubble.style.animation = '';
            }, 500);
        }

        function getFunFact() {
            const facts = TRANSLATIONS[currentLang].funFacts;
            return facts[Math.floor(Math.random() * facts.length)];
        }

        function getRandomCoachMessage() {
            const messages = TRANSLATIONS[currentLang].coachMessages;
            return messages[Math.floor(Math.random() * messages.length)];
        }

        // ============================================
        // GESTION DES DONNÉES
        // ============================================
        
        function saveUserData() {
            localStorage.setItem('userData', JSON.stringify({
                name: userData.name,
                level: userData.level,
                xp: userData.xp,
                badges: userData.badges,
                completed: Array.from(userData.completed),
                streak: userData.streak
            }));
        }

        function loadUserData() {
            const saved = localStorage.getItem('userData');
            if (saved) {
                const data = JSON.parse(saved);
                userData.name = data.name || '';
                userData.level = data.level || 1;
                userData.xp = data.xp || 0;
                userData.badges = data.badges || [];
                userData.completed = new Set(data.completed || []);
                userData.streak = data.streak || 0;
            }
        }

        // ============================================
        // API CALLS
        // ============================================
        
        async function apiCall(endpoint, options = {}) {
            try {
                const response = await fetch(CONFIG.API_URL + endpoint, {
                    ...options,
                    headers: {
                        'Content-Type': 'application/json',
                        ...(token && { 'Authorization': `Bearer ${token}` }),
                        ...options.headers
                    }
                });
                
                if (response.status === 204) return null;
                
                const data = await response.json();
                if (!response.ok) throw new Error(data.error || 'API Error');
                
                return data;
            } catch (error) {
                console.error('API Error:', error);
                showCoachMessage('🌐 ' + error.message);
                return null;
            }
        }

        // ============================================
        // AUTHENTIFICATION
        // ============================================
        
        async function handleLogin() {
            const email = document.getElementById('login-email')?.value;
            const password = document.getElementById('login-password')?.value;
            
            if (!email || !password) {
                showCoachMessage('📧 ' + t('fillAllFields'));
                return;
            }
            
            const data = await apiCall('/login', {
                method: 'POST',
                body: JSON.stringify({ email, password })
            });
            
            if (data?.token) {
                token = data.token;
                localStorage.setItem('token', token);
                currentUser = data.user;
                userData.name = data.user.name;
                saveUserData();
                await loadUserProgress();
                showDashboard();
                showCoachMessage('🎉 ' + t('welcomeBack') + ' ' + userData.name + ' !');
            } else {
                showCoachMessage('❌ ' + t('loginError'));
            }
        }

        async function handleRegister() {
            const name = document.getElementById('register-name')?.value;
            const email = document.getElementById('register-email')?.value;
            const password = document.getElementById('register-password')?.value;
            
            if (!name || !email || !password) {
                showCoachMessage('📧 ' + t('fillAllFields'));
                return;
            }
            
            const data = await apiCall('/register', {
                method: 'POST',
                body: JSON.stringify({ name, email, password })
            });
            
            if (data?.token) {
                token = data.token;
                localStorage.setItem('token', token);
                currentUser = data.user;
                userData.name = name;
                
                // Badge de bienvenue
                if (!userData.badges.includes('welcome')) {
                    userData.badges.push('welcome');
                }
                
                saveUserData();
                showDashboard();
                showCoachMessage('🎉 ' + t('welcome') + ' ' + name + ' !');
            } else {
                showCoachMessage('❌ ' + t('registerError'));
            }
        }

        function logout() {
            token = null;
            localStorage.removeItem('token');
            currentUser = null;
            showAuth();
            showCoachMessage('👋 ' + t('goodbye'));
        }

        // ============================================
        // PROGRESSION
        // ============================================
        
        async function loadUserProgress() {
            const data = await apiCall('/progress');
            if (data?.completed) {
                userData.completed = new Set(data.completed);
                saveUserData();
            }
        }

        async function completeLesson(lessonId, xp) {
            const data = await apiCall(`/lessons/${lessonId}/complete`, {
                method: 'POST',
                body: JSON.stringify({ xp })
            });
            
            if (data?.success) {
                userData.completed.add(lessonId);
                addXp(xp);
                return true;
            }
            return false;
        }

        // ============================================
        // INTERFACE UTILISATEUR
        // ============================================
        
        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            
            // Gestion RTL pour l'arabe
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            // Mettre à jour les boutons
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.textContent.toLowerCase().includes(lang)) {
                    btn.classList.add('active');
                }
            });
            
            // Mettre à jour l'interface
            if (token && currentUser) {
                showDashboard();
            } else {
                showAuth();
            }
        }

        function showAuth() {
            document.getElementById('user-profile').style.display = 'none';
            document.getElementById('chapters-section').style.display = 'none';
            
            document.getElementById('content').innerHTML = `
                <h1>${t('appName')}</h1>
                <h3>${t('welcomeDesc')}</h3>
                
                <div class="auth-tabs">
                    <div class="auth-tab active" onclick="showLoginForm()">${t('login')}</div>
                    <div class="auth-tab" onclick="showRegisterForm()">${t('register')}</div>
                </div>
                
                <div id="auth-form">
                    ${getLoginForm()}
                </div>
            `;
        }

        function getLoginForm() {
            return `
                <input type="email" id="login-email" class="input-field" placeholder="${t('email')}">
                <input type="password" id="login-password" class="input-field" placeholder="${t('password')}">
                <button class="btn" onclick="handleLogin()">${t('loginBtn')}</button>
            `;
        }

        function getRegisterForm() {
            return `
                <input type="text" id="register-name" class="input-field" placeholder="${t('name')}">
                <input type="email" id="register-email" class="input-field" placeholder="${t('email')}">
                <input type="password" id="register-password" class="input-field" placeholder="${t('password')}">
                <button class="btn" onclick="handleRegister()">${t('registerBtn')}</button>
            `;
        }

        function showLoginForm() {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('auth-form').innerHTML = getLoginForm();
        }

        function showRegisterForm() {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('auth-form').innerHTML = getRegisterForm();
        }

        function showDashboard() {
            document.getElementById('user-profile').style.display = 'block';
            document.getElementById('chapters-section').style.display = 'block';
            
            updateUI();
            renderChapters();
            renderDashboard();
        }

        function updateUI() {
            // Mettre à jour le profil
            document.getElementById('user-name').textContent = userData.name || 'Apprenant';
            document.getElementById('user-title').textContent = `${t('level')} ${userData.level}: ${t('levelNames.' + (userData.level-1))}`;
            
            // Mettre à jour la barre XP
            const nextLevelXp = userData.level < 7 ? userData.level * 300 : 2700;
            const currentLevelXp = userData.level > 1 ? (userData.level - 1) * 300 : 0;
            const xpInLevel = userData.xp - currentLevelXp;
            const xpNeeded = nextLevelXp - currentLevelXp;
            const progress = Math.min(100, (xpInLevel / xpNeeded) * 100);
            
            document.getElementById('xp-fill').style.width = progress + '%';
            document.getElementById('xp-counter').textContent = `${xpInLevel}/${xpNeeded} XP`;
            document.getElementById('xp-total').textContent = `${userData.xp} XP ${t('total')}`;
            
            // Mettre à jour la progression globale
            const completedCount = userData.completed.size;
            document.getElementById('chapters-progress').textContent = `${completedCount}/${CONFIG.TOTAL_LESSONS}`;
            document.getElementById('global-progress-bar').style.width = (completedCount / CONFIG.TOTAL_LESSONS * 100) + '%';
            
            // Mettre à jour les badges
            renderBadges();
        }

        function renderBadges() {
            const container = document.getElementById('badges-container');
            container.innerHTML = '';
            
            BADGES.slice(0, 8).forEach(badge => {
                const earned = userData.badges.includes(badge.id);
                const div = document.createElement('div');
                div.className = `badge-item ${earned ? 'earned' : ''}`;
                div.setAttribute('data-name', badge.name);
                div.textContent = badge.icon;
                container.appendChild(div);
            });
        }

        function renderChapters() {
            const list = document.getElementById('chapters-list');
            list.innerHTML = '';
            
            for (let i = 1; i <= CONFIG.TOTAL_LESSONS; i++) {
                const lesson = LESSONS[i];
                if (!lesson) continue;
                
                const completed = userData.completed.has(i);
                const locked = i > 10 && !currentUser?.premium && !completed;
                
                const li = document.createElement('li');
                li.className = `${completed ? 'completed' : ''} ${locked ? 'locked' : ''}`;
                
                li.innerHTML = `
                    <div style="display: flex; align-items: center; width: 100%;">
                        <span class="chapter-number">${i}</span>
                        <span class="chapter-title">${lesson.title}</span>
                        <span class="chapter-status ${completed ? 'completed' : ''}">
                            ${completed ? '✓' : (locked ? '🔒' : '')}
                        </span>
                    </div>
                `;
                
                if (!locked) {
                    li.onclick = () => loadLesson(i);
                }
                
                list.appendChild(li);
            }
        }

        function renderDashboard() {
            const completedCount = userData.completed.size;
            const progress = (completedCount / CONFIG.TOTAL_LESSONS * 100).toFixed(1);
            
            document.getElementById('content').innerHTML = `
                <h2>${t('welcome')}</h2>
                
                <div class="coach-intro">
                    <div class="coach-intro-avatar">🦊</div>
                    <div class="coach-intro-text">
                        <h4>Coach Excelix</h4>
                        <p>${getRandomCoachMessage()}</p>
                        <div class="fun-fact">
                            💡 ${getFunFact()}
                        </div>
                    </div>
                </div>
                
                <div style="text-align: center; margin: 40px 0;">
                    <div style="font-size: 3rem; color: var(--primary);">${completedCount}/${CONFIG.TOTAL_LESSONS}</div>
                    <div style="font-size: 1.2rem;">${t('lessonsCompleted')}</div>
                    <div style="margin-top: 10px;">${progress}% ${t('complete')}</div>
                </div>
                
                <button class="btn" onclick="continueLearning()">${t('continueLearning')}</button>
                <button class="btn btn-secondary" onclick="logout()">${t('logout')}</button>
            `;
        }

        function continueLearning() {
            let nextLesson = 1;
            for (let i = 1; i <= CONFIG.TOTAL_LESSONS; i++) {
                if (!userData.completed.has(i)) {
                    nextLesson = i;
                    break;
                }
            }
            loadLesson(nextLesson);
        }

        function loadLesson(chapter) {
            const lesson = LESSONS[chapter];
            if (!lesson) return;
            
            const isCompleted = userData.completed.has(chapter);
            
            document.getElementById('content').innerHTML = `
                <span class="lesson-number">${t('chapter')} ${chapter}/${CONFIG.TOTAL_LESSONS}</span>
                <h2>${lesson.title}</h2>
                
                <div class="coach-intro">
                    <div class="coach-intro-avatar">🦊</div>
                    <div class="coach-intro-text">
                        <h4>Coach Excelix</h4>
                        <p>${getRandomCoachMessage()}</p>
                    </div>
                </div>
                
                <div class="question-box">
                    ${lesson.question}
                </div>
                
                <input type="text" id="lesson-answer" class="input-field" placeholder="${t('answer')}" ${isCompleted ? 'disabled' : ''} value="${isCompleted ? '✓' : ''}">
                
                ${!isCompleted ? `
                    <button class="btn" onclick="checkAnswer(${chapter})">${t('validate')}</button>
                ` : ''}
                
                <div id="lesson-feedback" class="feedback"></div>
                
                <button class="btn btn-secondary" style="margin-top: 20px;" onclick="showDashboard()">
                    ${t('backToDashboard')}
                </button>
            `;
            
            document.getElementById('lesson-answer')?.focus();
        }

        function checkAnswer(chapter) {
            const answer = document.getElementById('lesson-answer')?.value.trim().toUpperCase();
            const lesson = LESSONS[chapter];
            const correct = lesson.answer.toUpperCase();
            const feedback = document.getElementById('lesson-feedback');
            
            if (answer === correct) {
                if (!userData.completed.has(chapter)) {
                    completeLesson(chapter, lesson.xp).then(success => {
                        if (success) {
                            feedback.className = 'feedback success';
                            feedback.innerHTML = `✅ ${t('correct')} +${lesson.xp} XP`;
                            
                            setTimeout(() => {
                                if (chapter === CONFIG.TOTAL_LESSONS) {
                                    showCertificate();
                                } else {
                                    loadLesson(chapter + 1);
                                }
                            }, 1000);
                        }
                    });
                }
            } else {
                feedback.className = 'feedback error';
                feedback.innerHTML = `❌ ${t('incorrect')}`;
                
                // Donner un indice
                showCoachMessage(`💡 ${t('hint')}: ${lesson.answer}`);
            }
        }

        function showUnlockScreen() {
            document.getElementById('content').innerHTML = `
                <h2>🔓 ${t('premium')}</h2>
                
                <div class="coach-intro">
                    <div class="coach-intro-avatar">🦊</div>
                    <div class="coach-intro-text">
                        <h4>Coach Excelix</h4>
                        <p>${t('premiumDesc')}</p>
                    </div>
                </div>
                
                <div class="unlock-section">
                    <input type="text" id="unlock-name" class="input-field" placeholder="${t('name')}" value="${userData.name}">
                    <input type="text" id="unlock-key" class="input-field" placeholder="${t('key')}">
                    
                    <button class="btn" onclick="unlockPremium()">${t('unlock')}</button>
                    
                    <div style="margin-top: 30px;">
                        <p>${t('getKey')}</p>
                        <a href="https://wa.me/237677051062" class="whatsapp-btn wa-1">📱 WhatsApp 1</a>
                        <a href="https://wa.me/237659718567" class="whatsapp-btn wa-2">📱 WhatsApp 2</a>
                    </div>
                </div>
                
                <button class="btn btn-secondary" onclick="showDashboard()">${t('back')}</button>
            `;
        }

        function unlockPremium() {
            const name = document.getElementById('unlock-name')?.value.trim().toUpperCase();
            const key = document.getElementById('unlock-key')?.value.trim().toUpperCase();
            
            if (key === `EXL-${name}-2026` || key === CONFIG.MASTER_KEY) {
                currentUser.premium = true;
                showCoachMessage('🎉 ' + t('premiumActivated'));
                showDashboard();
            } else {
                showCoachMessage('❌ ' + t('invalidKey'));
            }
        }

        function showCertificate() {
            const today = new Date().toLocaleDateString(currentLang === 'fr' ? 'fr-FR' : 'en-US', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
            
            document.getElementById('content').innerHTML = `
                <div class="certificate">
                    <h1>🏆</h1>
                    <h2>${t('certificate')}</h2>
                    
                    <div class="user-name">${userData.name}</div>
                    
                    <div style="font-size: 1.4rem; margin: 30px 0;">
                        ${t('level')} ${userData.level}: ${t('levelNames.' + (userData.level-1))}<br>
                        XP: ${userData.xp}<br>
                        ${t('lessonsCompleted')}: ${userData.completed.size}/${CONFIG.TOTAL_LESSONS}
                    </div>
                    
                    <div style="display: flex; gap: 10px; justify-content: center; margin: 30px 0;">
                        ${userData.badges.slice(0, 5).map(b => {
                            const badge = BADGES.find(bd => bd.id === b);
                            return `<div class="badge-item earned" style="width: 60px; height: 60px; font-size: 1.8rem;">${badge?.icon || '🏆'}</div>`;
                        }).join('')}
                    </div>
                    
                    <div class="certificate-footer">
                        ${t('issuedAt')} Douala, ${today}
                    </div>
                    
                    <button class="print-btn" onclick="window.print()">${t('print')}</button>
                </div>
                
                <button class="btn btn-secondary" style="margin-top: 20px;" onclick="showDashboard()">
                    ${t('backToDashboard')}
                </button>
            `;
        }

        // ============================================
        // INITIALISATION
        // ============================================
        
        window.onload = async () => {
            // Charger les données locales
            loadUserData();
            
            // Initialiser la langue
            changeLanguage(currentLang);
            
            // Vérifier le token
            if (token) {
                await loadUserProgress();
                showDashboard();
            } else {
                showAuth();
            }
            
            // Lancer l'animation du coach
            setInterval(() => {
                if (currentUser && Math.random() > 0.7) {
                    showCoachMessage(getRandomCoachMessage());
                }
            }, 30000);
        };
    </script>
</body>
</html>
