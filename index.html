<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EXCEL MASTER FUN - L'application qui transforme les vies</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================
           VARIABLES - L'ÂME DE L'APPLICATION
           ============================================ */
        :root {
            --primary: #D4AF37;
            --primary-dark: #AA8C2F;
            --primary-light: #F5E7B2;
            --secondary: #2E8B57;
            --secondary-dark: #1D5B3A;
            --secondary-light: #4CAF50;
            
            --bg-dark: #0A0A14;
            --bg-card: #141424;
            --bg-light: #1E1E32;
            
            --text-primary: #F5F5F7;
            --text-secondary: #B8B8C0;
            --text-muted: #88889C;
            
            --success: #2E7D32;
            --warning: #ED6A5E;
            --info: #1976D2;
            --premium: #9C27B0;
            
            --border: rgba(212, 175, 55, 0.15);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            --shadow-sm: 0 5px 15px rgba(0, 0, 0, 0.4);
            
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Inter', sans-serif;
            
            --sidebar-width: 350px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 16px;
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-dark);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(2px 2px at 20px 30px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 40px 70px, #fff, rgba(0,0,0,0)),
                        radial-gradient(2px 2px at 80px 120px, #fff, rgba(0,0,0,0));
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.1;
            pointer-events: none;
        }

        #app {
            width: 100%;
            max-width: 1600px;
            min-height: 90vh;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            z-index: 10;
            overflow: hidden;
            display: flex;
        }

        /* ============================================
           COACH EXCELIX
           ============================================ */
        .coach-container {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 1000;
            cursor: pointer;
        }

        .coach-bubble {
            position: absolute;
            bottom: 100px;
            right: 0;
            width: 300px;
            background: var(--bg-light);
            border: 2px solid var(--primary);
            border-radius: 30px 30px 5px 30px;
            padding: 20px;
            box-shadow: var(--shadow);
            animation: float 3s infinite ease-in-out;
            display: none;
        }

        .coach-bubble.show {
            display: block;
            animation: fadeInUp 0.3s;
        }

        .coach-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            right: 20px;
            width: 0;
            height: 0;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 15px solid var(--primary);
        }

        .coach-message {
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 10px;
            font-style: italic;
        }

        .coach-timestamp {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: right;
        }

        .coach-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            transition: 0.3s;
            animation: pulse 2s infinite;
            position: relative;
        }

        .coach-avatar:hover {
            transform: scale(1.1);
        }

        .coach-avatar.premium {
            background: linear-gradient(135deg, var(--primary), var(--premium));
        }

        .coach-avatar::after {
            content: '';
            position: absolute;
            top: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            background: var(--success);
            border: 2px solid var(--bg-dark);
            border-radius: 50%;
            display: none;
        }

        .coach-avatar.has-message::after {
            display: block;
            animation: pulse 1s infinite;
        }

        /* ============================================
           SIDEBAR
           ============================================ */
        .sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(180deg, var(--bg-light) 0%, var(--bg-dark) 100%);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-y: auto;
        }

        .profile {
            padding: 40px 30px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .avatar {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .avatar.premium {
            border-color: var(--premium);
            box-shadow: 0 0 30px rgba(156, 39, 176, 0.3);
        }

        .profile h2 {
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .profile .title {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .premium-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 15px;
            background: var(--premium);
            color: white;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .stats {
            padding: 30px;
            border-bottom: 1px solid var(--border);
        }

        .stat-item {
            margin-bottom: 25px;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-dark);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 4px;
            transition: width 0.5s ease;
            position: relative;
        }

        .progress-fill.premium {
            background: linear-gradient(90deg, var(--primary), var(--premium));
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 10px;
            height: 100%;
            background: white;
            filter: blur(5px);
            animation: scan 2s infinite;
        }

        .badges {
            padding: 30px;
            border-bottom: 1px solid var(--border);
        }

        .badges h3 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .badges-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .badge-item {
            text-align: center;
            opacity: 0.3;
            filter: grayscale(1);
            transition: 0.3s;
        }

        .badge-item.earned {
            opacity: 1;
            filter: none;
        }

        .badge-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 8px;
            background: var(--bg-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border: 2px solid var(--border);
        }

        .badge-item.earned .badge-icon {
            border-color: var(--primary);
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        .badge-name {
            font-size: 0.8rem;
            color: var(--text-secondary);
        }

        .chapters-list {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .chapters-list h3 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .chapter-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: var(--bg-light);
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .chapter-item:hover {
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .chapter-item.completed {
            background: rgba(46, 139, 87, 0.1);
            border-color: var(--secondary);
        }

        .chapter-item.locked {
            opacity: 0.5;
            filter: grayscale(1);
            cursor: not-allowed;
        }

        .chapter-item.locked:hover {
            transform: none;
            border-color: var(--border);
        }

        .chapter-number {
            width: 30px;
            height: 30px;
            background: var(--bg-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 15px;
            color: var(--primary);
        }

        .chapter-title {
            flex: 1;
            font-size: 0.9rem;
        }

        .chapter-status {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            background: var(--bg-dark);
        }

        .chapter-status.completed {
            background: var(--secondary);
            color: var(--bg-dark);
        }

        .chapter-status.locked {
            background: var(--bg-dark);
            color: var(--text-muted);
        }

        /* ============================================
           MAIN CONTENT
           ============================================ */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            position: relative;
        }

        .main-header {
            padding: 30px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .welcome-message h2 {
            font-family: var(--font-heading);
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .welcome-message p {
            color: var(--text-secondary);
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.2rem;
        }

        .icon-btn:hover {
            border-color: var(--primary);
            transform: scale(1.1);
        }

        .icon-btn.premium {
            background: var(--premium);
            color: white;
        }

        .content-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        /* ============================================
           CARTE DE LEÇON
           ============================================ */
        .lesson-card {
            background: var(--bg-light);
            border-radius: 40px;
            padding: 40px;
            border: 1px solid var(--border);
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.5s;
        }

        .lesson-number {
            display: inline-block;
            padding: 8px 20px;
            background: var(--primary);
            color: var(--bg-dark);
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .lesson-title {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .lesson-question {
            background: var(--bg-dark);
            padding: 30px;
            border-radius: 30px;
            margin-bottom: 30px;
            font-size: 1.2rem;
            line-height: 1.8;
            border-left: 4px solid var(--primary);
        }

        .answer-input {
            width: 100%;
            padding: 20px;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 30px;
            color: var(--text-primary);
            font-size: 1.1rem;
            margin-bottom: 20px;
            transition: 0.3s;
        }

        .answer-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(212, 175, 55, 0.1);
        }

        .btn {
            padding: 16px 40px;
            background: var(--primary);
            border: none;
            border-radius: 40px;
            color: var(--bg-dark);
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-premium {
            background: var(--premium);
            color: white;
        }

        .btn-premium:hover {
            box-shadow: 0 10px 20px rgba(156, 39, 176, 0.3);
        }

        /* ============================================
           PAGE PREMIUM
           ============================================ */
        .premium-card {
            background: linear-gradient(135deg, var(--bg-light), var(--bg-card));
            border: 2px solid var(--premium);
            border-radius: 40px;
            padding: 50px;
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.5s;
        }

        .premium-title {
            font-family: var(--font-heading);
            font-size: 3rem;
            color: var(--premium);
            text-align: center;
            margin-bottom: 20px;
        }

        .premium-subtitle {
            text-align: center;
            color: var(--text-secondary);
            font-size: 1.2rem;
            margin-bottom: 40px;
        }

        .premium-features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .feature {
            padding: 25px;
            background: var(--bg-dark);
            border-radius: 30px;
            text-align: center;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .feature:hover {
            border-color: var(--premium);
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .feature-title {
            color: var(--premium);
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        .feature-desc {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .premium-price {
            text-align: center;
            font-size: 2rem;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .premium-input {
            width: 100%;
            padding: 15px 20px;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 30px;
            color: var(--text-primary);
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .premium-input:focus {
            outline: none;
            border-color: var(--premium);
        }

        /* ============================================
           CERTIFICAT
           ============================================ */
        .certificate-container {
            background: white;
            border-radius: 40px;
            padding: 60px;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s;
        }

        .certificate-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--premium));
        }

        .certificate-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .certificate-icon {
            font-size: 5rem;
            margin-bottom: 20px;
        }

        .certificate-title {
            font-family: var(--font-heading);
            font-size: 3rem;
            color: var(--primary-dark);
            letter-spacing: 3px;
            margin-bottom: 10px;
        }

        .certificate-subtitle {
            color: #666;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .certificate-body {
            text-align: center;
            margin: 40px 0;
        }

        .certificate-award {
            color: #666;
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .certificate-name {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary-dark);
            margin-bottom: 20px;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary);
            display: inline-block;
        }

        .certificate-details {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 40px 0;
            color: #666;
        }

        .certificate-detail {
            text-align: center;
        }

        .detail-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 5px;
        }

        .detail-value {
            font-size: 1.3rem;
            font-weight: 600;
            color: var(--primary-dark);
        }

        .certificate-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 40px;
            padding-top: 20px;
            border-top: 1px solid #ddd;
        }

        .certificate-seal {
            font-size: 2rem;
        }

        .certificate-signature {
            text-align: center;
        }

        .signature-line {
            width: 200px;
            height: 2px;
            background: #333;
            margin: 5px 0;
        }

        .certificate-number {
            color: #999;
            font-size: 0.8rem;
            font-family: monospace;
        }

        .certificate-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        .print-btn {
            background: var(--primary);
            color: var(--bg-dark);
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }

        .print-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .share-btn {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
        }

        .share-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(46, 139, 87, 0.3);
        }

        /* ============================================
           ANIMATIONS
           ============================================ */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes scan {
            0% { right: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { right: 100%; opacity: 0; }
        }

        .fade-in {
            animation: fadeInUp 0.5s ease-out;
        }

        /* ============================================
           MESSAGES
           ============================================ */
        .message {
            padding: 15px 25px;
            border-radius: 40px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 500;
            animation: fadeInUp 0.3s;
        }

        .message.success {
            background: rgba(46, 125, 50, 0.2);
            color: #81C784;
            border: 1px solid rgba(46, 125, 50, 0.3);
        }

        .message.error {
            background: rgba(237, 106, 94, 0.2);
            color: #FF8A80;
            border: 1px solid rgba(237, 106, 94, 0.3);
        }

        .message.premium {
            background: rgba(156, 39, 176, 0.2);
            color: #CE93D8;
            border: 1px solid rgba(156, 39, 176, 0.3);
        }

        @media print {
            body * { visibility: hidden; }
            .certificate-container, .certificate-container * { visibility: visible; }
            .certificate-container { position: absolute; left: 0; top: 0; width: 100%; }
            .certificate-actions { display: none; }
        }

        @media (max-width: 1024px) {
            #app { flex-direction: column; }
            .sidebar { width: 100%; max-height: 400px; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Coach Excelix -->
        <div class="coach-container" onclick="toggleCoachMessage()">
            <div class="coach-bubble" id="coachBubble">
                <div class="coach-message" id="coachMessage"></div>
                <div class="coach-timestamp" id="coachTimestamp"></div>
            </div>
            <div class="coach-avatar" id="coachAvatar">
                🦊
            </div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="profile" id="profileSection">
                <div class="avatar" id="userAvatar">👤</div>
                <h2 id="userName">Chargement...</h2>
                <div class="title" id="userTitle">Niveau 1: L'abruti</div>
                <div id="premiumBadge" class="premium-badge" style="display: none;">⭐ PREMIUM</div>
            </div>

            <div class="stats" id="statsSection">
                <div class="stat-item">
                    <div class="stat-header">
                        <span>Progression</span>
                        <span id="globalProgress">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="globalProgressBar" style="width: 0%"></div>
                    </div>
                </div>

                <div class="stat-item">
                    <div class="stat-header">
                        <span>XP</span>
                        <span id="xpTotal">0 XP</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="xpProgressBar" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="badges" id="badgesSection">
                <h3>🎖️ Hauts faits</h3>
                <div class="badges-grid" id="badgesGrid"></div>
            </div>

            <div class="chapters-list" id="chaptersList">
                <h3>📚 Chapitres</h3>
                <div id="chaptersContainer"></div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="main-header">
                <div class="welcome-message">
                    <h2 id="welcomeTitle">Bienvenue, Héros</h2>
                    <p id="welcomeMessage">Excelix est là pour t'accompagner</p>
                </div>
                <div class="header-actions">
                    <div class="icon-btn" onclick="changeLanguage('fr')" title="Français">🇫🇷</div>
                    <div class="icon-btn" onclick="changeLanguage('en')" title="English">🇬🇧</div>
                    <div class="icon-btn" onclick="changeLanguage('es')" title="Español">🇪🇸</div>
                    <div class="icon-btn" onclick="changeLanguage('ar')" title="العربية">🇸🇦</div>
                    <div class="icon-btn" onclick="showPremiumPage()" title="Premium" id="premiumButton">⭐</div>
                    <div class="icon-btn" onclick="logout()" title="Déconnexion">🚪</div>
                </div>
            </div>

            <div class="content-area" id="contentArea"></div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION
        // ============================================
        const CONFIG = {
            API_URL: 'https://excel-master-fun-production.up.railway.app/api',
            MASTER_KEY: 'EXCEL-MASTER-2026',
            TOTAL_LESSONS: 100,
            XP_PER_LEVEL: 300
        };

        // ============================================
        // MESSAGES DU COACH
        // ============================================
        const COACH_MESSAGES = {
            fr: [
                { type: 'welcome', message: "Salut ! Je suis Excelix, ton guide dans cette aventure. Ensemble, on va faire de toi un héros !" },
                { type: 'premium', message: "Tu veux débloquer tous les chapitres ? Le mode premium t'ouvre les portes de la connaissance !" },
                { type: 'certificate', message: "Quand tu auras terminé, un certificat officiel t'attend. Ça vaut le coup !" },
                { type: 'success', message: "BOOM ! T'as assuré ! Continue comme ça !" },
                { type: 'levelup', message: "FÉLICITATIONS ! Tu passes au niveau supérieur ! Tu deviens un vrai pro !" },
                { type: 'error', message: "Pas grave, c'est en se trompant qu'on apprend. Essaie encore !" },
                { type: 'badge', message: "Regarde ! Tu as débloqué un nouveau badge ! Tu collectionnes les exploits !" }
            ],
            en: [
                { type: 'welcome', message: "Hi! I'm Excelix, your guide. Together, we'll make you a hero!" },
                { type: 'premium', message: "Want to unlock all chapters? Premium mode opens the doors to knowledge!" },
                { type: 'success', message: "BOOM! You nailed it! Keep going!" },
                { type: 'error', message: "No problem, we learn from mistakes. Try again!" }
            ]
        };

        // ============================================
        // TRADUCTIONS
        // ============================================
        const TRANSLATIONS = {
            fr: {
                welcome: "Bienvenue, %s",
                levelNames: ["L'abruti", "L'apprenti", "Le débrouillard", "Le pro", "Le génie", "L'expert", "La légende"],
                badges: {
                    welcome: "Bienvenue",
                    survivor: "Survivant",
                    scholar: "Érudit",
                    master: "Maître",
                    legend: "Légende"
                },
                chapter: "Chapitre",
                completed: "Terminé",
                validate: "Valider",
                answer: "Ta réponse...",
                correct: "Bravo !",
                incorrect: "Essaie encore",
                logout: "Déconnexion",
                premium: {
                    title: "Mode Premium",
                    subtitle: "Débloque tout le potentiel",
                    features: [
                        { icon: "🔓", title: "100 chapitres", desc: "Accès à tous les chapitres" },
                        { icon: "🏆", title: "Certificat", desc: "Certificat officiel" },
                        { icon: "🎯", title: "Défis exclusifs", desc: "Des défis pour progresser" },
                        { icon: "💬", title: "Support prioritaire", desc: "Réponse sous 24h" }
                    ],
                    price: "5000 FCFA",
                    unlock: "Débloquer Premium",
                    key: "Clé d'activation"
                },
                certificate: {
                    title: "CERTIFICAT DE MAÎTRISE",
                    awarded: "Décerné à",
                    level: "Niveau atteint",
                    date: "Date d'obtention",
                    number: "Numéro de certificat",
                    print: "Imprimer",
                    share: "Partager"
                }
            },
            en: {
                welcome: "Welcome, %s",
                levelNames: ["The Noob", "The Apprentice", "The Hustler", "The Pro", "The Genius", "The Expert", "The Legend"],
                validate: "Validate",
                answer: "Your answer...",
                correct: "Well done!",
                incorrect: "Try again",
                logout: "Logout",
                premium: {
                    title: "Premium Mode",
                    subtitle: "Unlock full potential",
                    price: "5000 FCFA",
                    unlock: "Unlock Premium"
                }
            }
        };

        // ============================================
        // 100 LEÇONS
        // ============================================
        const LESSONS = {
            1: { title: "Les cellules", question: "Quel est le nom de la première cellule ?", answer: "A1", xp: 10 },
            2: { title: "Sélectionner tout", question: "Quel raccourci pour tout sélectionner ?", answer: "CTRL+A", xp: 10 },
            3: { title: "La somme", question: "Formule pour additionner A1 à A10 ?", answer: "=SOMME(A1:A10)", xp: 15 },
            4: { title: "La moyenne", question: "Formule pour la moyenne de B1 à B5 ?", answer: "=MOYENNE(B1:B5)", xp: 15 },
            5: { title: "Le minimum", question: "Formule pour la plus petite valeur de A1 à A20 ?", answer: "=MIN(A1:A20)", xp: 15 }
        };

        for (let i = 6; i <= 100; i++) {
            LESSONS[i] = {
                title: `Leçon ${i}`,
                question: `Question pour la leçon ${i}`,
                answer: "REPONSE",
                xp: i <= 10 ? 10 : i <= 20 ? 15 : i <= 50 ? 20 : 30
            };
        }

        // ============================================
        // BADGES
        // ============================================
        const BADGES = [
            { id: 'welcome', icon: '🎉', name: 'welcome', condition: { type: 'login' } },
            { id: 'survivor', icon: '🦊', name: 'survivor', condition: { type: 'lessons', count: 10 } },
            { id: 'scholar', icon: '📚', name: 'scholar', condition: { type: 'lessons', count: 25 } },
            { id: 'master', icon: '👑', name: 'master', condition: { type: 'level', level: 6 } },
            { id: 'legend', icon: '⭐', name: 'legend', condition: { type: 'level', level: 7 } }
        ];

        // ============================================
        // ÉTAT DE L'APPLICATION
        // ============================================
        let currentLang = localStorage.getItem('lang') || 'fr';
        let token = localStorage.getItem('token');
        let userData = {
            name: localStorage.getItem('userName') || 'Héros',
            level: parseInt(localStorage.getItem('level') || '1'),
            xp: parseInt(localStorage.getItem('xp') || '0'),
            badges: JSON.parse(localStorage.getItem('badges') || '["welcome"]'),
            completed: new Set(JSON.parse(localStorage.getItem('completed') || '[]')),
            premium: localStorage.getItem('premium') === 'true'
        };

        // ============================================
        // FONCTIONS DU COACH
        // ============================================
        function showCoachMessage(type = 'welcome') {
            const messages = COACH_MESSAGES[currentLang] || COACH_MESSAGES.fr;
            let message = messages.find(m => m.type === type);
            if (!message) message = messages[0];
            
            document.getElementById('coachMessage').textContent = message.message;
            document.getElementById('coachTimestamp').textContent = new Date().toLocaleTimeString();
            document.getElementById('coachBubble').classList.add('show');
            document.getElementById('coachAvatar').classList.add('has-message');
            
            setTimeout(() => {
                document.getElementById('coachBubble').classList.remove('show');
                document.getElementById('coachAvatar').classList.remove('has-message');
            }, 5000);
        }

        function toggleCoachMessage() {
            const bubble = document.getElementById('coachBubble');
            if (bubble.classList.contains('show')) {
                bubble.classList.remove('show');
                document.getElementById('coachAvatar').classList.remove('has-message');
            } else {
                showCoachMessage('welcome');
            }
        }

        // ============================================
        // FONCTIONS DE BASE
        // ============================================
        function t(key, ...args) {
            let keys = key.split('.');
            let value = TRANSLATIONS[currentLang];
            for (let k of keys) {
                value = value?.[k];
                if (!value) return key;
            }
            if (typeof value === 'string') {
                args.forEach((arg, i) => value = value.replace(`%s`, arg));
            }
            return value;
        }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            location.reload();
        }

        function getLevelFromXp(xp) {
            if (xp >= 2700) return 7;
            if (xp >= 2000) return 6;
            if (xp >= 1400) return 5;
            if (xp >= 900) return 4;
            if (xp >= 500) return 3;
            if (xp >= 200) return 2;
            return 1;
        }

        function showMessage(text, type = 'info') {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.textContent = text;
            document.getElementById('contentArea').insertBefore(messageDiv, document.getElementById('contentArea').firstChild);
            
            setTimeout(() => messageDiv.remove(), 3000);
        }

        // ============================================
        // AUTHENTIFICATION (simulée sans backend)
        // ============================================
        function logout() {
            localStorage.clear();
            window.location.href = 'index.html';
        }

        // ============================================
        // AFFICHAGE DU TABLEAU DE BORD
        // ============================================
        function loadDashboard() {
            userData.level = getLevelFromXp(userData.xp);
            
            document.getElementById('userName').textContent = userData.name;
            document.getElementById('userTitle').textContent = `Niveau ${userData.level}: ${t('levelNames')[userData.level-1]}`;
            
            if (userData.premium) {
                document.getElementById('premiumBadge').style.display = 'inline-block';
                document.getElementById('coachAvatar').classList.add('premium');
                document.getElementById('userAvatar').classList.add('premium');
                document.getElementById('globalProgressBar').classList.add('premium');
                document.getElementById('xpProgressBar').classList.add('premium');
                document.getElementById('premiumButton').classList.add('premium');
            }
            
            const completedCount = userData.completed.size;
            document.getElementById('globalProgress').textContent = `${Math.round(completedCount / CONFIG.TOTAL_LESSONS * 100)}%`;
            document.getElementById('globalProgressBar').style.width = `${completedCount / CONFIG.TOTAL_LESSONS * 100}%`;
            
            document.getElementById('xpTotal').textContent = `${userData.xp} XP`;
            const xpProgress = (userData.xp % CONFIG.XP_PER_LEVEL) / CONFIG.XP_PER_LEVEL * 100;
            document.getElementById('xpProgressBar').style.width = `${xpProgress}%`;
            
            document.getElementById('welcomeTitle').textContent = t('welcome', userData.name);
            document.getElementById('welcomeMessage').textContent = `${completedCount}/${CONFIG.TOTAL_LESSONS} leçons • Niveau ${userData.level}`;
            
            renderBadges();
            renderChapters();
            loadNextLesson();
        }

        function renderBadges() {
            const container = document.getElementById('badgesGrid');
            container.innerHTML = '';
            
            BADGES.forEach(badge => {
                const earned = userData.badges.includes(badge.id);
                const div = document.createElement('div');
                div.className = `badge-item ${earned ? 'earned' : ''}`;
                div.innerHTML = `
                    <div class="badge-icon">${badge.icon}</div>
                    <div class="badge-name">${t('badges.' + badge.name)}</div>
                `;
                container.appendChild(div);
            });
        }

        function renderChapters() {
            const container = document.getElementById('chaptersContainer');
            container.innerHTML = '';
            
            for (let i = 1; i <= CONFIG.TOTAL_LESSONS; i++) {
                const completed = userData.completed.has(i);
                const locked = i > 10 && !userData.premium && !completed;
                
                const div = document.createElement('div');
                div.className = `chapter-item ${completed ? 'completed' : ''} ${locked ? 'locked' : ''}`;
                if (!locked) div.onclick = () => loadLesson(i);
                div.innerHTML = `
                    <div class="chapter-number">${i}</div>
                    <div class="chapter-title">${LESSONS[i].title}</div>
                    <div class="chapter-status ${completed ? 'completed' : ''} ${locked ? 'locked' : ''}">
                        ${completed ? '✓' : (locked ? '🔒' : '')}
                    </div>
                `;
                container.appendChild(div);
            }
        }

        function loadNextLesson() {
            for (let i = 1; i <= CONFIG.TOTAL_LESSONS; i++) {
                if (!userData.completed.has(i)) {
                    if (i > 10 && !userData.premium) {
                        showPremiumPage();
                        return;
                    }
                    loadLesson(i);
                    return;
                }
            }
            showCertificate();
        }

        function loadLesson(chapter) {
            const lesson = LESSONS[chapter];
            document.getElementById('contentArea').innerHTML = `
                <div class="lesson-card fade-in">
                    <div class="lesson-number">${t('chapter')} ${chapter}/${CONFIG.TOTAL_LESSONS}</div>
                    <h1 class="lesson-title">${lesson.title}</h1>
                    <div class="lesson-question">${lesson.question}</div>
                    <input type="text" class="answer-input" id="answerInput" placeholder="${t('answer')}" ${userData.completed.has(chapter) ? 'disabled' : ''}>
                    ${!userData.completed.has(chapter) ? 
                        `<button class="btn" onclick="checkAnswer(${chapter})">${t('validate')}</button>` : 
                        `<div style="text-align: center; color: var(--secondary);">✓ ${t('completed')}</div>`
                    }
                </div>
            `;
            
            if (!userData.completed.has(chapter)) {
                document.getElementById('answerInput').focus();
            }
        }

        function checkAnswer(chapter) {
            const answer = document.getElementById('answerInput')?.value.trim().toUpperCase() || '';
            const correct = LESSONS[chapter].answer.toUpperCase();
            
            if (answer === correct) {
                if (!userData.completed.has(chapter)) {
                    userData.completed.add(chapter);
                    userData.xp += LESSONS[chapter].xp;
                    userData.level = getLevelFromXp(userData.xp);
                    
                    localStorage.setItem('completed', JSON.stringify(Array.from(userData.completed)));
                    localStorage.setItem('xp', userData.xp);
                    localStorage.setItem('level', userData.level);
                    
                    checkBadges();
                    showMessage(`${t('correct')} +${LESSONS[chapter].xp} XP`, 'success');
                    showCoachMessage('success');
                    
                    setTimeout(loadDashboard, 1000);
                }
            } else {
                showMessage(t('incorrect'), 'error');
                showCoachMessage('error');
            }
        }

        function checkBadges() {
            BADGES.forEach(badge => {
                if (userData.badges.includes(badge.id)) return;
                
                let earned = false;
                switch(badge.condition.type) {
                    case 'lessons':
                        earned = userData.completed.size >= badge.condition.count;
                        break;
                    case 'level':
                        earned = userData.level >= badge.condition.level;
                        break;
                    default:
                        earned = true;
                }
                
                if (earned) {
                    userData.badges.push(badge.id);
                    localStorage.setItem('badges', JSON.stringify(userData.badges));
                    showCoachMessage('badge');
                }
            });
        }

        function showPremiumPage() {
            document.getElementById('contentArea').innerHTML = `
                <div class="premium-card fade-in">
                    <h1 class="premium-title">${t('premium.title')}</h1>
                    <div class="premium-subtitle">${t('premium.subtitle')}</div>
                    
                    <div class="premium-features">
                        ${t('premium.features').map(f => `
                            <div class="feature">
                                <div class="feature-icon">${f.icon}</div>
                                <div class="feature-title">${f.title}</div>
                                <div class="feature-desc">${f.desc}</div>
                            </div>
                        `).join('')}
                    </div>
                    
                    <div class="premium-price">${t('premium.price')}</div>
                    
                    <input type="text" class="premium-input" id="premiumKey" placeholder="${t('premium.key')}">
                    <button class="btn btn-premium" onclick="unlockPremium()">${t('premium.unlock')}</button>
                    
                    <div style="text-align: center; margin-top: 20px;">
                        <small>Contactez-nous sur WhatsApp pour obtenir votre clé</small><br>
                        <small>📱 677 05 10 62 | 659 71 85 67</small>
                    </div>
                </div>
            `;
        }

        function unlockPremium() {
            const key = document.getElementById('premiumKey')?.value.trim().toUpperCase();
            if (key === 'EXCEL-MASTER-2026') {
                userData.premium = true;
                localStorage.setItem('premium', 'true');
                showMessage('Premium activé !', 'premium');
                showCoachMessage('premium');
                loadDashboard();
            } else {
                showMessage('Clé invalide', 'error');
            }
        }

        function showCertificate() {
            const date = new Date().toLocaleDateString();
            const certNumber = 'EXC-' + Date.now().toString(36).toUpperCase();
            
            document.getElementById('contentArea').innerHTML = `
                <div class="certificate-container fade-in">
                    <div class="certificate-header">
                        <div class="certificate-icon">🏆</div>
                        <h1 class="certificate-title">${t('certificate.title')}</h1>
                        <div class="certificate-subtitle">EXCEL MASTER FUN</div>
                    </div>
                    
                    <div class="certificate-body">
                        <div class="certificate-award">${t('certificate.awarded')}</div>
                        <div class="certificate-name">${userData.name}</div>
                        
                        <div class="certificate-details">
                            <div class="certificate-detail">
                                <div class="detail-label">${t('certificate.level')}</div>
                                <div class="detail-value">${t('levelNames')[userData.level-1]}</div>
                            </div>
                            <div class="certificate-detail">
                                <div class="detail-label">${t('certificate.date')}</div>
                                <div class="detail-value">${date}</div>
                            </div>
                        </div>
                    </div>
                    
                    <div class="certificate-footer">
                        <div class="certificate-seal">⭐</div>
                        <div class="certificate-signature">
                            <div class="signature-line"></div>
                            <div>Le Directeur Pédagogique</div>
                        </div>
                        <div class="certificate-seal">⭐</div>
                    </div>
                    
                    <div class="certificate-number">${certNumber}</div>
                    
                    <div class="certificate-actions">
                        <button class="print-btn" onclick="window.print()">${t('certificate.print')}</button>
                        <button class="share-btn" onclick="shareCertificate()">${t('certificate.share')}</button>
                    </div>
                </div>
            `;
        }

        function shareCertificate() {
            const text = `J'ai obtenu mon certificat Excel Master Fun ! Niveau ${t('levelNames')[userData.level-1]}`;
            if (navigator.share) {
                navigator.share({ title: 'Mon certificat', text });
            } else {
                navigator.clipboard.writeText(text);
                showMessage('Texte copié !', 'success');
            }
        }

        // ============================================
        // INITIALISATION
        // ============================================
        window.onload = () => {
            if (!token) {
                window.location.href = 'auth.html';
                return;
            }
            loadDashboard();
            showCoachMessage('welcome');
        };
    </script>
</body>
</html>
