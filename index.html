<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Master Fun | Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Excel Master Fun</h1>
        <div id="user-stats">Niveau : <span id="level">1</span> | XP : <span id="xp">0</span></div>
    </header>
    <main id="main-container">
        <aside id="chapters-sidebar">
            <h3>Progression (50 Chapitres)</h3>
            <ul id="chapters-list"></ul>
        </aside>
        <section id="content-area">
            <div id="coach-box">
                <p><strong>Excelix :</strong> "Michel, prêt à dompter les cellules ?"</p>
            </div>
            <div id="lesson-content">
                <h2>Bienvenue dans l'arène</h2>
                <p>Sélectionnez un chapitre pour commencer votre ascension.</p>
            </div>
        </section>
    </main>
    <script src="app.js"></script>
</body>
</html>
