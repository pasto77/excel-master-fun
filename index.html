<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Master Fun – Parcours complet (13 modules)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        body {
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .app-container {
            max-width: 1200px;
            width: 100%;
            background: #1e293b;
            border-radius: 40px;
            padding: 24px 28px;
            border-left: 6px solid #fbbf24;
            box-shadow: 0 25px 40px -12px black;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.8rem;
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .coach {
            display: flex;
            gap: 14px;
            align-items: center;
            background: #0f172a;
            padding: 12px 18px;
            border-radius: 60px;
            margin-bottom: 20px;
        }
        .modules-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #334155;
        }
        .module-btn {
            background: #334155;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: #e2e8f0;
            cursor: pointer;
            transition: 0.1s;
        }
        .module-btn.active {
            background: #fbbf24;
            color: #0f172a;
            font-weight: bold;
        }
        .module-content {
            background: #0f172a;
            border-radius: 32px;
            padding: 24px;
            min-height: 450px;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            gap: 16px;
        }
        button {
            background: #fbbf24;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .reset-progress {
            background: #334155;
            color: white;
        }
        .feedback {
            background: #0f172a;
            padding: 16px;
            border-radius: 24px;
            margin-top: 20px;
            border-left: 4px solid #fbbf24;
        }
        .success {
            border-left-color: #22c55e;
            color: #bef264;
        }
        .certificate-link {
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>📘 Excel Master Fun</h1>
        <div style="font-size: 0.8rem; color: #94a3b8;">Formation complète en 13 modules</div>
    </div>
    <div class="coach">
        <span style="font-size: 2rem;">🦊</span>
        <span style="color:#cbd5e1;">Choisis un module ci-dessous. Ta progression est sauvegardée.</span>
    </div>

    <div class="modules-nav" id="modulesNav"></div>
    <div class="module-content" id="moduleContent"></div>

    <div class="nav-buttons">
        <button id="prevBtn" style="background:#334155;">⬅️ Précédent</button>
        <button id="nextBtn">Suivant ➡️</button>
        <button id="resetProgressBtn" class="reset-progress">🔄 Réinitialiser progression</button>
    </div>
    <div class="certificate-link">
        <button id="showCertBtn">🎓 Voir mon certificat</button>
    </div>
</div>

<script>
    // ----- DÉFINITION DES 13 MODULES (contenu) -----
    // On reprend les 9 premiers et on en ajoute 4 nouveaux pour arriver à 13
    const modules = [
        { id: 1, title: "🧭 Module 1 – L’interface", content: "module1_content" },
        { id: 2, title: "➕ Module 2 – Premiers calculs", content: "module2_content" },
        { id: 3, title: "🎨 Module 3 – Mise en forme", content: "module3_content" },
        { id: 4, title: "📊 Module 4 – Graphique simple", content: "module4_content" },
        { id: 5, title: "🧮 Module 5 – La fonction SOMME", content: "module5_content" },
        { id: 6, title: "⚖️ Module 6 – La fonction SI", content: "module6_content" },
        { id: 7, title: "🏁 Module 7 – Bilan", content: "module7_content" },
        { id: 8, title: "🏆 Module 8 – Projet final", content: "module8_content" },
        { id: 9, title: "🎓 Module 9 – Révision & certificat", content: "module9_content" },
        { id: 10, title: "📋 Module 10 – Tableaux structurés", content: "module10_content" },
        { id: 11, title: "🔍 Module 11 – Filtres et tris", content: "module11_content" },
        { id: 12, title: "📈 Module 12 – Graphiques avancés", content: "module12_content" },
        { id: 13, title: "✍️ Module 13 – Formules de texte", content: "module13_content" }
    ];

    // Contenus simplifiés (pour les nouveaux modules, on crée des explications courtes mais pédagogiques)
    const contents = {
        module1_content: `
            <h3>🧭 Module 1 – L’interface</h3>
            <div class="excel-simulator" style="margin: 16px 0;">
                <div style="background:#0f172a; border-radius:16px; padding:12px; text-align:center; border:1px solid #334155;">
                    <p style="color:#facc15;">A1, B2, C3... chaque case a une adresse.</p>
                    <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:4px; margin-top:12px;">
                        ${['A','B','C','D','E'].map(l => `<div style="background:#1e293b; padding:8px;">${l}1</div>`).join('')}
                    </div>
                </div>
            </div>
            <p><strong>📖 Explication :</strong> Excel est une grille. Les colonnes sont des lettres, les lignes des chiffres. La cellule active est celle entourée.</p>
            <button onclick="markModuleCompleted(1)">✅ Marquer ce module comme terminé</button>
        `,
        module2_content: `
            <h3>➕ Module 2 – Premiers calculs</h3>
            <p>Dans Excel, pour additionner, on utilise le signe = . Exemple : =A1+B1</p>
            <div style="background:#0f172a; padding:12px; border-radius:16px; margin:12px 0; text-align:center;">
                <code style="color:#facc15;">=15+27 → 42</code>
            </div>
            <button onclick="markModuleCompleted(2)">✅ Marquer ce module comme terminé</button>
        `,
        module3_content: `
            <h3>🎨 Module 3 – Mise en forme</h3>
            <p>On peut changer la police, la couleur, ajouter des bordures. Un tableau bien présenté est plus lisible.</p>
            <button onclick="markModuleCompleted(3)">✅ Marquer ce module comme terminé</button>
        `,
        module4_content: `
            <h3>📊 Module 4 – Graphique simple</h3>
            <p>Un graphique transforme des chiffres en image. Clique sur "Insérer graphique" dans Excel pour choisir un histogramme ou un camembert.</p>
            <button onclick="markModuleCompleted(4)">✅ Marquer ce module comme terminé</button>
        `,
        module5_content: `
            <h3>🧮 Module 5 – La fonction SOMME</h3>
            <p><code style="color:#facc15;">=SOMME(A1:A5)</code> additionne toutes les cellules de A1 à A5.</p>
            <button onclick="markModuleCompleted(5)">✅ Marquer ce module comme terminé</button>
        `,
        module6_content: `
            <h3>⚖️ Module 6 – La fonction SI</h3>
            <p><code style="color:#facc15;">=SI(A1>=10;"Réussi";"Échec")</code> → teste une condition et renvoie un résultat différent selon qu’elle est vraie ou fausse.</p>
            <button onclick="markModuleCompleted(6)">✅ Marquer ce module comme terminé</button>
        `,
        module7_content: `
            <h3>🏁 Module 7 – Bilan</h3>
            <p>Tu as appris l’interface, les formules de base, la mise en forme, les graphiques, SOMME et SI. Continue ainsi !</p>
            <button onclick="markModuleCompleted(7)">✅ Marquer ce module comme terminé</button>
        `,
        module8_content: `
            <h3>🏆 Module 8 – Projet final</h3>
            <p>Crée ton propre tableau de bord en combinant les formules apprises : somme, mise en forme, graphique. C’est ton premier projet Excel !</p>
            <button onclick="markModuleCompleted(8)">✅ Marquer ce module comme terminé</button>
        `,
        module9_content: `
            <h3>🎓 Module 9 – Révision & certificat</h3>
            <p>Bravo ! Tu as parcouru les 8 premiers modules. Tu es prêt pour le certificat final.</p>
            <button onclick="markModuleCompleted(9)">✅ Marquer ce module comme terminé</button>
        `,
        module10_content: `
            <h3>📋 Module 10 – Tableaux structurés</h3>
            <p>Un tableau structuré (CTRL+T) permet de gérer les données plus facilement : filtres, formules automatiques, mise en forme dynamique.</p>
            <button onclick="markModuleCompleted(10)">✅ Marquer ce module comme terminé</button>
        `,
        module11_content: `
            <h3>🔍 Module 11 – Filtres et tris</h3>
            <p>Les filtres permettent de n’afficher que les lignes qui t’intéressent. Les tris organisent les données par ordre croissant ou décroissant.</p>
            <button onclick="markModuleCompleted(11)">✅ Marquer ce module comme terminé</button>
        `,
        module12_content: `
            <h3>📈 Module 12 – Graphiques avancés</h3>
            <p>Au-delà de l’histogramme, Excel propose des graphiques en courbes, en secteurs, en radar… Choisis celui qui raconte le mieux ton histoire.</p>
            <button onclick="markModuleCompleted(12)">✅ Marquer ce module comme terminé</button>
        `,
        module13_content: `
            <h3>✍️ Module 13 – Formules de texte</h3>
            <p>Concaténer (joindre) du texte, extraire des caractères, mettre en majuscules… Les formules de texte te rendent la vie plus facile.</p>
            <button onclick="markModuleCompleted(13)">✅ Marquer ce module comme terminé</button>
        `
    };

    // Gestion de la progression (localStorage)
    let completed = JSON.parse(localStorage.getItem('excelCompleted')) || [];
    let currentModule = parseInt(localStorage.getItem('currentModule')) || 1;

    function saveProgress() {
        localStorage.setItem('excelCompleted', JSON.stringify(completed));
        localStorage.setItem('currentModule', currentModule);
    }

    function markModuleCompleted(id) {
        if (!completed.includes(id)) {
            completed.push(id);
            saveProgress();
            alert(`🎉 Module ${id} terminé !`);
            renderNav();
            if (id === currentModule) renderCurrentModule();
        } else {
            alert(`✅ Module déjà terminé.`);
        }
    }

    function renderNav() {
        const nav = document.getElementById('modulesNav');
        nav.innerHTML = '';
        modules.forEach(m => {
            const isCompleted = completed.includes(m.id);
            const btn = document.createElement('button');
            btn.className = `module-btn ${currentModule === m.id ? 'active' : ''}`;
            btn.innerText = `${m.title} ${isCompleted ? '✓' : ''}`;
            btn.onclick = () => {
                currentModule = m.id;
                saveProgress();
                renderNav();
                renderCurrentModule();
            };
            nav.appendChild(btn);
        });
    }

    function renderCurrentModule() {
        const module = modules.find(m => m.id === currentModule);
        const contentDiv = document.getElementById('moduleContent');
        if (module) {
            contentDiv.innerHTML = contents[module.content] || `<p>Module ${module.id} en construction.</p>`;
            // On ajoute un petit script pour que le bouton "marquer terminé" fonctionne
            if (typeof window.markModuleCompleted === 'undefined') {
                window.markModuleCompleted = markModuleCompleted;
            }
        } else {
            contentDiv.innerHTML = '<p>Module introuvable.</p>';
        }
    }

    function nextModule() {
        if (currentModule < modules.length) {
            currentModule++;
            saveProgress();
            renderNav();
            renderCurrentModule();
        } else {
            alert('🎉 Tu as terminé tous les modules ! Félicitations !');
        }
    }

    function prevModule() {
        if (currentModule > 1) {
            currentModule--;
            saveProgress();
            renderNav();
            renderCurrentModule();
        }
    }

    function resetProgress() {
        if (confirm('Effacer toute ta progression ? Les modules redeviendront non-terminés.')) {
            completed = [];
            currentModule = 1;
            saveProgress();
            renderNav();
            renderCurrentModule();
        }
    }

    function showCertificate() {
        let score = completed.length;
        let mention = score === modules.length ? "EXCELLENT" : (score >= modules.length/2 ? "BIEN" : "EN COURS");
        let date = new Date().toLocaleDateString('fr-FR');
        let userName = prompt("Entre ton nom pour le certificat :", "Étudiant") || "Étudiant";
        let certHTML = `
            <div style="background: white; color: #0f172a; padding: 40px; border-radius: 32px; text-align: center; max-width: 600px; margin: 0 auto;">
                <h1 style="color: #fbbf24;">🏆 CERTIFICAT DE RÉUSSITE 🏆</h1>
                <p style="margin: 20px 0;">Ceci atteste que</p>
                <h2 style="font-size: 2rem; margin: 10px 0;">${userName}</h2>
                <p>a suivi avec succès le parcours Excel Master Fun</p>
                <p>Modules terminés : ${score}/${modules.length}</p>
                <p>Mention : <strong>${mention}</strong></p>
                <p>Délivré le ${date}</p>
                <button onclick="window.print();" style="margin-top: 30px; background: #fbbf24; border: none; padding: 10px 20px; border-radius: 30px;">🖨️ Imprimer</button>
                <button onclick="window.location.reload();" style="margin-top: 30px; background: #334155; color: white; border: none; padding: 10px 20px; border-radius: 30px;">Fermer</button>
            </div>
        `;
        const certWindow = window.open('', '_blank');
        certWindow.document.write(certHTML);
        certWindow.document.close();
    }

    document.getElementById('prevBtn').addEventListener('click', prevModule);
    document.getElementById('nextBtn').addEventListener('click', nextModule);
    document.getElementById('resetProgressBtn').addEventListener('click', resetProgress);
    document.getElementById('showCertBtn').addEventListener('click', showCertificate);

    renderNav();
    renderCurrentModule();
</script>
</body>
</html>
