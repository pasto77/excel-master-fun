<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXCEL MASTER FUN 5.0</title>
    
    <!-- Firebase SDK (version stable) -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #1a1a2e; color: white; min-height: 100vh; padding: 20px; }
        .app { max-width: 800px; margin: 0 auto; }
        .card { background: #16213e; padding: 30px; border-radius: 20px; margin: 20px 0; text-align: center; }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { background: #FFD700; color: #000; font-weight: bold; cursor: pointer; }
        .auth-btn { background: #FFD700; }
        .google-btn { background: #333; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 10px; }
        .stat-card { background: #0f3460; padding: 15px; border-radius: 10px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #FFD700; }
        .lesson-card { background: #0f3460; padding: 15px; border-radius: 10px; margin: 10px 0; cursor: pointer; }
        .lesson-card.completed { background: #2e8b57; }
        .badges-grid { display: flex; gap: 10px; flex-wrap: wrap; margin: 20px 0; }
        .badge-item { width: 60px; height: 60px; background: #0f3460; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2rem; opacity: 0.3; }
        .badge-item.earned { opacity: 1; background: #FFD700; color: black; }
        .premium-section { background: linear-gradient(135deg, #002966, #7c2d12); padding: 30px; border-radius: 20px; margin: 20px 0; text-align: center; }
        .pricing-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; }
        .pricing-card { background: rgba(255,255,255,0.1); padding: 15px; border-radius: 10px; cursor: pointer; }
        .price { font-size: 1.5rem; font-weight: bold; margin: 10px 0; }
        .auth-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .auth-modal.active { display: flex; }
        .auth-card { background: #16213e; padding: 30px; border-radius: 20px; max-width: 400px; width: 90%; }
        .close-btn { float: right; background: none; color: white; font-size: 1.5rem; cursor: pointer; }
        .user-profile { background: #0f3460; padding: 15px; border-radius: 50px; margin-bottom: 20px; display: flex; align-items: center; gap: 15px; }
        .user-avatar { width: 50px; height: 50px; background: #FFD700; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; color: black; }
        .logout-btn { background: #ef4444; color: white; padding: 5px 15px; border-radius: 20px; cursor: pointer; width: auto; }
    </style>
</head>
<body>
    <div class="app">
        <div class="auth-modal" id="authModal">
            <div class="auth-card">
                <button class="close-btn" onclick="closeModal()">✕</button>
                <h2 style="color:#FFD700;">🚀 Rejoins l'aventure</h2>
                <button class="google-btn" onclick="signInWithGoogle()">
                    <img src="https://www.google.com/favicon.ico" style="width:20px;"> Continuer avec Google
                </button>
                <div style="text-align:center;margin:20px 0">ou</div>
                <input type="email" id="emailInput" placeholder="Email">
                <input type="password" id="passwordInput" placeholder="Mot de passe">
                <button class="auth-btn" onclick="signUpWithEmail()">Créer un compte</button>
                <button class="auth-btn" onclick="signInWithEmail()">Se connecter</button>
            </div>
        </div>

        <div class="card">
            <h1 style="color:#FFD700;">📊 EXCEL MASTER FUN 5.0</h1>
            <div id="authSection">
                <button onclick="openModal()">🔐 Connexion</button>
            </div>
        </div>

        <div id="profileSection" style="display:none;"></div>

        <div class="stats">
            <div class="stat-card"><div class="stat-value" id="statLevel">1</div><div>Niveau</div></div>
            <div class="stat-card"><div class="stat-value" id="statXP">0</div><div>XP</div></div>
            <div class="stat-card"><div class="stat-value" id="statLessons">0/100</div><div>Leçons</div></div>
            <div class="stat-card"><div class="stat-value" id="statStreak">0</div><div>Jours</div></div>
        </div>

        <h2>📚 Chapitres</h2>
        <div id="lessonsGrid"></div>

        <h2>🏆 Hauts faits</h2>
        <div class="badges-grid" id="badgesGrid"></div>

        <div class="premium-section">
            <h2>✨ Mode Légende</h2>
            <p>Débloque 90 chapitres + certificat</p>
            <div class="pricing-grid">
                <div class="pricing-card" onclick="alert('Premium bientôt')"><h3>Mensuel</h3><div class="price">5€</div></div>
                <div class="pricing-card" onclick="alert('Premium bientôt')"><h3>Annuel</h3><div class="price">50€</div></div>
                <div class="pricing-card" onclick="alert('Premium bientôt')"><h3>À vie</h3><div class="price">150€</div></div>
            </div>
        </div>

        <div class="certificate-section" id="certificate" style="display:none; background:white; color:black; padding:30px; border-radius:20px; text-align:center;">
            <h1>🏆</h1>
            <h2>CERTIFICAT DE MAÎTRISE</h2>
            <div id="certificateName" style="font-size:2rem; margin:20px 0;"></div>
            <button onclick="window.print()">🖨️ Imprimer</button>
        </div>

        <div class="footer" style="text-align:center; margin-top:30px; color:#888;">
            <p>Support: 677 05 10 62 | 659 71 85 67</p>
        </div>
    </div>

    <script>
        // CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDtPKWklKh7Ijd_zTev7uq9gmuXcXfoFKQ",
            authDomain: "excel-master-5.firebaseapp.com",
            projectId: "excel-master-5",
            storageBucket: "excel-master-5.firebasestorage.app",
            messagingSenderId: "409433181308",
            appId: "1:409433181308:web:5db60af28ade85f1110df9"
        };

        // INITIALISATION
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        const TOTAL_LESSONS = 100;
        const LESSONS = {};
        for (let i = 1; i <= 100; i++) {
            LESSONS[i] = { title: `Leçon ${i}`, xp: 10 };
        }

        const BADGES = [
            { id: 'welcome', icon: '🎉', name: 'Bienvenue' },
            { id: 'survivor', icon: '🦊', name: 'Survivant' },
            { id: 'scholar', icon: '📚', name: 'Érudit' }
        ];

        function openModal() { document.getElementById('authModal').classList.add('active'); }
        function closeModal() { document.getElementById('authModal').classList.remove('active'); }

        async function signInWithGoogle() {
            try {
                const provider = new firebase.auth.GoogleAuthProvider();
                await auth.signInWithPopup(provider);
                closeModal();
                alert('✅ Connexion réussie !');
            } catch (error) { alert('Erreur : ' + error.message); }
        }

        async function signUpWithEmail() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            if (!email || !password) { alert('Remplis tous les champs'); return; }
            try {
                await auth.createUserWithEmailAndPassword(email, password);
                closeModal();
                alert('✅ Compte créé !');
            } catch (error) { alert('Erreur : ' + error.message); }
        }

        async function signInWithEmail() {
            const email = document.getElementById('emailInput').value;
            const password = document.getElementById('passwordInput').value;
            if (!email || !password) { alert('Remplis tous les champs'); return; }
            try {
                await auth.signInWithEmailAndPassword(email, password);
                closeModal();
                alert('✅ Connexion réussie !');
            } catch (error) { alert('Erreur : ' + error.message); }
        }

        async function logout() { await auth.signOut(); location.reload(); }

        async function loadUserProfile(user) {
            currentUser = user;
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('profileSection').style.display = 'block';
            document.getElementById('profileSection').innerHTML = `
                <div class="user-profile">
                    <div class="user-avatar">${(user.displayName || user.email)[0].toUpperCase()}</div>
                    <div style="flex:1"><strong>${user.displayName || user.email.split('@')[0]}</strong><br>${user.email}</div>
                    <button class="logout-btn" onclick="logout()">Déconnexion</button>
                </div>
            `;
            
            let userDoc = await db.collection('users').doc(user.uid).get();
            if (!userDoc.exists) {
                await db.collection('users').doc(user.uid).set({
                    name: user.displayName || user.email.split('@')[0],
                    email: user.email,
                    xp: 0,
                    level: 1,
                    completed: [],
                    badges: ['welcome']
                });
            }
            const data = (await db.collection('users').doc(user.uid).get()).data();
            renderLessons(data.completed || []);
            renderBadges(data.badges || []);
        }

        function renderLessons(completed = []) {
            const grid = document.getElementById('lessonsGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 10; i++) {
                const div = document.createElement('div');
                div.className = `lesson-card ${completed.includes(i) ? 'completed' : ''}`;
                div.innerHTML = `<h3>${LESSONS[i].title}</h3><p>+${LESSONS[i].xp} XP</p>`;
                div.onclick = () => alert('Leçon à venir !');
                grid.appendChild(div);
            }
        }

        function renderBadges(badges = []) {
            const grid = document.getElementById('badgesGrid');
            grid.innerHTML = '';
            BADGES.forEach(badge => {
                const earned = badges.includes(badge.id);
                const div = document.createElement('div');
                div.className = `badge-item ${earned ? 'earned' : ''}`;
                div.textContent = badge.icon;
                div.title = badge.name;
                grid.appendChild(div);
            });
        }

        auth.onAuthStateChanged(async (user) => {
            if (user) await loadUserProfile(user);
        });
    </script>
</body>
</html>
