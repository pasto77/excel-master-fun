<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Master Fun - Version Backend</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        /* Gardez tout votre CSS ici - c'est le même que vous avez déjà */
        * { margin:0; padding:0; box-sizing:border-box; font-family:'Poppins',sans-serif; }
        :root { --primary:#FFD700; --bg-dark:#1a1a2e; --bg-card:#16213e; --text:#e9ecef; }
        body { background:var(--bg-dark); color:var(--text); padding:15px; }
        #app { max-width:1400px; margin:0 auto; background:var(--bg-card); border-radius:30px; padding:20px; }
        /* ... tout votre CSS ... */
    </style>
</head>
<body>
    <div id="app">
        <!-- Language Selector -->
        <div class="language-selector">
            <button class="lang-btn active" onclick="changeLanguage('fr')">FR</button>
            <button class="lang-btn" onclick="changeLanguage('en')">EN</button>
        </div>

        <div id="sidebar">
            <div class="brand">
                <h1 id="brand-title">EXCEL MASTER FUN</h1>
                <small id="brand-subtitle">De zéro à héros</small>
            </div>
            <div class="user-info" id="user-info" style="display: none;">
                <div class="user-name" id="display-name"></div>
                <div class="level-info">
                    <span id="level-label">Niveau <span id="level-display">1</span></span>
                    <span id="xp-display">0/300 XP</span>
                </div>
                <div class="xp-bar-container"><div class="xp-bar-fill" id="xp-bar"></div></div>
                <div class="badges-preview" id="badges-preview"></div>
            </div>
            <div class="chapters-header" id="chapters-header" style="display: none;">
                <h3 id="chapters-title">📚 CHAPITRES</h3>
                <span class="filter-badge" id="completed-counter">0/100</span>
            </div>
            <ul id="chapters-list"></ul>
            <div class="sidebar-footer"><small>Support: 677 05 10 62</small></div>
        </div>

        <div id="main">
            <div class="progress-container" id="progress-container" style="display: none;">
                <div id="progress-bar"></div>
            </div>
            <div id="lesson-content" class="card"></div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION - À MODIFIER ICI
        // ============================================
        
        const API_BASE_URL = 'https://excel-master-fun-production.up.railway.app/api';
        
        // ============================================
        // LE RESTE DU CODE (tout le JavaScript)
        // ============================================
        
        let currentLang = localStorage.getItem('excelLang') || 'fr';
        let token = localStorage.getItem('token');
        let userName = '';
        let userLevel = 1;
        let userXp = 0;
        let completedLessons = new Set();

        const translations = {
            fr: { brand: "EXCEL MASTER FUN", brandSub: "De zéro à héros", level: "Niveau", xp: "XP", chapters: "📚 CHAPITRES", welcome: "Bienvenue !", login: "Connexion", register: "Inscription", email: "Email", password: "Mot de passe", name: "Nom", loginBtn: "Se connecter", registerBtn: "S'inscrire", logout: "Déconnexion", validate: "VALIDER", answer: "Votre réponse..." },
            en: { brand: "EXCEL MASTER FUN", brandSub: "From zero to hero", level: "Level", xp: "XP", chapters: "📚 CHAPTERS", welcome: "Welcome!", login: "Login", register: "Register", email: "Email", password: "Password", name: "Name", loginBtn: "Login", registerBtn: "Register", logout: "Logout", validate: "VALIDATE", answer: "Your answer..." }
        };

        function t(key) { return translations[currentLang][key] || key; }

        function changeLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('excelLang', lang);
            updateUITexts();
            if (token) loadUser(); else showAuth();
        }

        async function apiCall(endpoint, options = {}) {
            const res = await fetch(API_BASE_URL + endpoint, {
                ...options,
                headers: {
                    'Content-Type': 'application/json',
                    ...(token && { 'Authorization': `Bearer ${token}` })
                }
            });
            return res.json();
        }

        async function loadUser() {
            try {
                const progress = await apiCall('/progress');
                completedLessons = new Set(progress.completed || []);
                const user = JSON.parse(atob(token.split('.')[1]));
                userName = user.name;
                showDashboard();
            } catch { showAuth(); }
        }

        function showAuth() {
            document.getElementById('user-info').style.display = 'none';
            document.getElementById('chapters-header').style.display = 'none';
            document.getElementById('progress-container').style.display = 'none';
            document.getElementById('lesson-content').innerHTML = `
                <h2>${t('welcome')}</h2>
                <div class="auth-tabs">
                    <div class="auth-tab active" onclick="showLoginForm()">${t('login')}</div>
                    <div class="auth-tab" onclick="showRegisterForm()">${t('register')}</div>
                </div>
                <div id="auth-form">${getLoginForm()}</div>
            `;
        }

        function getLoginForm() {
            return `
                <input type="email" id="email" placeholder="${t('email')}">
                <input type="password" id="password" placeholder="${t('password')}">
                <button onclick="handleLogin()">${t('loginBtn')}</button>
            `;
        }

        function getRegisterForm() {
            return `
                <input type="text" id="name" placeholder="${t('name')}">
                <input type="email" id="email" placeholder="${t('email')}">
                <input type="password" id="password" placeholder="${t('password')}">
                <button onclick="handleRegister()">${t('registerBtn')}</button>
            `;
        }

        function showLoginForm() {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('auth-form').innerHTML = getLoginForm();
        }

        function showRegisterForm() {
            document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('auth-form').innerHTML = getRegisterForm();
        }

        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const data = await apiCall('/login', {
                method: 'POST',
                body: JSON.stringify({ email, password })
            });
            if (data.token) {
                token = data.token;
                localStorage.setItem('token', token);
                loadUser();
            } else alert('Erreur de connexion');
        }

        async function handleRegister() {
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const data = await apiCall('/register', {
                method: 'POST',
                body: JSON.stringify({ name, email, password })
            });
            if (data.token) {
                token = data.token;
                localStorage.setItem('token', token);
                loadUser();
            } else alert('Email déjà utilisé');
        }

        function logout() {
            token = null;
            localStorage.removeItem('token');
            showAuth();
        }

        function showDashboard() {
            document.getElementById('user-info').style.display = 'block';
            document.getElementById('chapters-header').style.display = 'flex';
            document.getElementById('progress-container').style.display = 'block';
            document.getElementById('display-name').textContent = userName;
            document.getElementById('completed-counter').textContent = `${completedLessons.size}/100`;
            document.getElementById('progress-bar').style.width = (completedLessons.size / 100 * 100) + '%';
            
            // Charger les leçons
            loadLessons();
        }

        async function loadLessons() {
            const lessons = await apiCall('/lessons');
            let html = '<h2>Chapitres</h2>';
            lessons.forEach(l => {
                const done = completedLessons.has(l.id) ? '✓' : '';
                html += `<div onclick="loadLesson(${l.chapter})">Chapitre ${l.chapter}: ${l.title} ${done}</div>`;
            });
            html += '<button onclick="logout()">Déconnexion</button>';
            document.getElementById('lesson-content').innerHTML = html;
        }

        function loadLesson(chapter) {
            // À compléter avec votre logique de leçon
            document.getElementById('lesson-content').innerHTML = `
                <h2>Chapitre ${chapter}</h2>
                <p>Question ici</p>
                <input id="answer" placeholder="${t('answer')}">
                <button onclick="checkAnswer(${chapter})">${t('validate')}</button>
                <button onclick="loadLessons()">Retour</button>
            `;
        }

        async function checkAnswer(chapter) {
            // Logique pour valider la réponse
            alert('Bravo !');
            loadLessons();
        }

        function updateUITexts() {
            document.getElementById('brand-title').textContent = t('brand');
            document.getElementById('brand-subtitle').textContent = t('brandSub');
            document.getElementById('chapters-title').textContent = t('chapters');
        }

        window.onload = () => {
            changeLanguage(currentLang);
            if (token) loadUser(); else showAuth();
        };
    </script>
</body>
</html>
