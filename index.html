<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Excel Master Fun - Multilingual Premium Training</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        :root {
            --primary: #FFD700;
            --primary-dark: #FFC107;
            --primary-light: #FFF9C4;
            --secondary: #4ECCA3;
            --secondary-dark: #2E8B57;
            --bg-dark: #1a1a2e;
            --bg-card: #16213e;
            --bg-light: #0f3460;
            --text: #e9ecef;
            --text-muted: #a0a0a0;
            --danger: #ff4b5c;
            --success: #4CAF50;
            --warning: #FF9800;
            --info: #2196F3;
            --border: rgba(255, 215, 0, 0.2);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
        }

        /* Styles pour l'arabe (RTL) */
        html[dir="rtl"] {
            text-align: right;
        }

        html[dir="rtl"] .coach-bubble::after {
            right: auto;
            left: 20px;
        }

        html[dir="rtl"] .chapter-number {
            margin-right: 0;
            margin-left: 10px;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        #app {
            width: 100%;
            max-width: 1400px;
            height: 90vh;
            background: var(--bg-card);
            border-radius: 30px;
            box-shadow: var(--shadow);
            display: flex;
            overflow: hidden;
            border: 1px solid var(--border);
        }

        /* Sidebar */
        #sidebar {
            width: 320px;
            background: linear-gradient(180deg, var(--bg-card) 0%, #0f1a2f 100%);
            border-right: 2px solid var(--border);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
        }

        html[dir="rtl"] #sidebar {
            border-right: none;
            border-left: 2px solid var(--border);
        }

        .brand {
            padding: 25px 20px;
            text-align: center;
            border-bottom: 2px solid var(--border);
            background: rgba(0, 0, 0, 0.2);
        }

        .brand h1 {
            font-size: 1.8rem;
            font-weight: 800;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .brand small {
            color: var(--text-muted);
            font-size: 0.8rem;
            letter-spacing: 1px;
        }

        .user-info {
            padding: 15px 20px;
            background: rgba(255, 215, 0, 0.05);
            border-bottom: 1px solid var(--border);
        }

        .user-name {
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 1.1rem;
        }

        .level-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }

        .xp-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
            margin-bottom: 5px;
        }

        .xp-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 4px;
        }

        .xp-text {
            font-size: 0.7rem;
            color: var(--text-muted);
            text-align: right;
        }

        .badges-preview {
            display: flex;
            gap: 8px;
            margin-top: 10px;
            flex-wrap: wrap;
        }

        .badge-mini {
            width: 30px;
            height: 30px;
            background: rgba(255, 215, 0, 0.1);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            border: 1px solid var(--border);
            transition: 0.3s;
        }

        .badge-mini.earned {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }

        .chapters-header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(0, 0, 0, 0.1);
        }

        .chapters-header h3 {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--primary);
        }

        .filter-badge {
            background: var(--secondary);
            color: #000;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            font-weight: 600;
        }

        #chapters-list {
            list-style: none;
            padding: 0;
            margin: 0;
            overflow-y: auto;
            flex-grow: 1;
        }

        #chapters-list li {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            transition: all 0.2s;
            position: relative;
        }

        #chapters-list li:hover {
            background: rgba(255, 215, 0, 0.1);
            padding-left: 25px;
        }

        html[dir="rtl"] #chapters-list li:hover {
            padding-left: 20px;
            padding-right: 25px;
        }

        #chapters-list li.completed {
            background: rgba(78, 204, 163, 0.1);
            border-left: 4px solid var(--secondary);
        }

        html[dir="rtl"] #chapters-list li.completed {
            border-left: none;
            border-right: 4px solid var(--secondary);
        }

        #chapters-list li.locked {
            opacity: 0.4;
            filter: grayscale(0.8);
            pointer-events: none;
        }

        .chapter-number {
            font-weight: 600;
            color: var(--primary);
            margin-right: 10px;
        }

        .chapter-title {
            flex: 1;
        }

        .chapter-status {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
        }

        .chapter-status.completed {
            background: var(--secondary);
            color: #000;
        }

        .sidebar-footer {
            padding: 15px;
            border-top: 1px solid var(--border);
            text-align: center;
            background: rgba(0, 0, 0, 0.2);
        }

        .contact-text {
            font-size: 0.6rem;
            opacity: 0.6;
        }

        .contact-phone {
            font-size: 0.8rem;
            color: var(--primary);
            font-weight: 700;
            margin: 3px 0;
        }

        /* Language selector */
        .language-selector {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            gap: 5px;
        }

        html[dir="rtl"] .language-selector {
            right: auto;
            left: 20px;
        }

        .lang-btn {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.8rem;
            font-weight: 600;
            transition: 0.3s;
        }

        .lang-btn.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }

        .lang-btn:hover {
            background: rgba(255, 215, 0, 0.3);
        }

        /* Main content */
        #main {
            flex-grow: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(circle at 30% 50%, rgba(78, 204, 163, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(255, 215, 0, 0.05) 0%, transparent 50%),
                        var(--bg-dark);
            overflow-y: auto;
        }

        .progress-container {
            position: absolute;
            top: 20px;
            left: 40px;
            right: 40px;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            overflow: hidden;
        }

        #progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            width: 0%;
            transition: width 0.4s ease;
            border-radius: 4px;
            position: relative;
        }

        #progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 10px;
            height: 100%;
            background: white;
            filter: blur(5px);
            animation: scan 2s infinite;
        }

        @keyframes scan {
            0% { right: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { right: 100%; opacity: 0; }
        }

        /* Bande défilante d'introduction */
        .intro-ticker {
            width: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--secondary) 100%);
            color: #000;
            padding: 12px 0;
            border-radius: 50px;
            margin-bottom: 25px;
            overflow: hidden;
            position: relative;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        .ticker-content {
            display: flex;
            animation: ticker 15s linear infinite;
            white-space: nowrap;
        }

        .ticker-item {
            display: inline-flex;
            align-items: center;
            padding: 0 30px;
            font-weight: 600;
            font-size: 1rem;
        }

        .ticker-item span {
            margin: 0 10px;
        }

        @keyframes ticker {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Cartes d'introduction du coach */
        .coach-intro-card {
            background: linear-gradient(135deg, rgba(255, 215, 0, 0.1) 0%, rgba(78, 204, 163, 0.1) 100%);
            border: 2px solid var(--primary);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            animation: slideIn 0.5s;
        }

        @keyframes slideIn {
            from { transform: translateX(-20px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .coach-intro-avatar {
            width: 80px;
            height: 80px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 3px solid var(--secondary);
            box-shadow: 0 0 20px var(--primary);
        }

        .coach-intro-text {
            flex: 1;
        }

        .coach-intro-text h4 {
            color: var(--primary);
            font-size: 1.2rem;
            margin-bottom: 8px;
        }

        .coach-intro-text p {
            color: var(--text);
            font-size: 1rem;
            line-height: 1.5;
            font-style: italic;
        }

        .fun-fact {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--secondary);
            font-weight: 600;
        }

        .fun-fact i {
            margin-right: 5px;
        }

        .coach-container {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 100;
        }

        html[dir="rtl"] .coach-container {
            right: auto;
            left: 30px;
        }

        .coach-bubble {
            background: var(--bg-card);
            border: 2px solid var(--primary);
            border-radius: 20px 20px 5px 20px;
            padding: 15px;
            max-width: 250px;
            position: relative;
            margin-bottom: 10px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            animation: float 3s infinite ease-in-out;
        }

        html[dir="rtl"] .coach-bubble {
            border-radius: 20px 20px 20px 5px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .coach-bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            right: 20px;
            width: 0;
            height: 0;
            border-left: 10px solid transparent;
            border-right: 10px solid transparent;
            border-top: 10px solid var(--primary);
        }

        html[dir="rtl"] .coach-bubble::after {
            right: auto;
            left: 20px;
        }

        .coach-message {
            font-size: 0.9rem;
            color: var(--text);
            font-style: italic;
        }

        .coach-avatar {
            display: flex;
            justify-content: flex-end;
        }

        html[dir="rtl"] .coach-avatar {
            justify-content: flex-start;
        }

        .coach-avatar img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid var(--primary);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.3);
            cursor: pointer;
            transition: 0.3s;
        }

        .coach-avatar img:hover {
            transform: scale(1.1);
        }

        .card {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 30px;
            width: 100%;
            max-width: 650px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .card h2 {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
            text-align: center;
        }

        .card h3 {
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--text-muted);
            margin-bottom: 30px;
            text-align: center;
        }

        .lesson-number {
            display: inline-block;
            background: var(--primary);
            color: #000;
            padding: 5px 15px;
            border-radius: 30px;
            font-weight: 700;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        .coach-box {
            background: rgba(255, 255, 255, 0.03);
            padding: 25px;
            border-radius: 20px;
            margin: 25px 0;
            border-left: 5px solid var(--primary);
            line-height: 1.6;
            font-size: 1.1rem;
            position: relative;
        }

        html[dir="rtl"] .coach-box {
            border-left: none;
            border-right: 5px solid var(--primary);
        }

        .coach-box::before {
            content: '"';
            position: absolute;
            top: -10px;
            left: 15px;
            font-size: 4rem;
            color: var(--primary);
            opacity: 0.3;
            font-family: serif;
        }

        html[dir="rtl"] .coach-box::before {
            left: auto;
            right: 15px;
        }

        .input-group {
            margin: 20px 0;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(10, 10, 26, 0.8);
            border: 2px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            transition: 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.2);
        }

        button {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s;
            width: 100%;
            font-size: 1rem;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.3);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(255, 215, 0, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .hint-text {
            margin-top: 10px;
            font-size: 0.9rem;
            color: var(--warning);
            font-style: italic;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.7; }
        }

        .feedback {
            margin-top: 15px;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            transition: 0.3s;
        }

        .feedback.success {
            background: rgba(76, 175, 80, 0.2);
            color: var(--success);
            border: 1px solid var(--success);
        }

        .feedback.error {
            background: rgba(255, 75, 92, 0.2);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .badges-section {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 20px;
        }

        .badge {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 215, 0, 0.1);
            border: 2px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            transition: 0.3s;
        }

        .badge.earned {
            background: var(--primary);
            border-color: var(--primary);
            color: #000;
            transform: scale(1.1);
            box-shadow: 0 0 20px var(--primary);
        }

        .badge-tooltip {
            position: relative;
        }

        .badge-tooltip:hover::after {
            content: attr(data-name);
            position: absolute;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-card);
            color: var(--text);
            padding: 5px 10px;
            border-radius: 5px;
            font-size: 0.7rem;
            white-space: nowrap;
            border: 1px solid var(--border);
            z-index: 10;
        }

        .unlock-section {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255, 215, 0, 0.05);
            border-radius: 15px;
            border: 1px dashed var(--primary);
        }

        .whatsapp-btn {
            display: inline-block;
            text-decoration: none;
            color: white;
            padding: 12px 20px;
            border-radius: 10px;
            font-weight: 600;
            margin: 5px;
            transition: 0.3s;
            text-align: center;
        }

        .wa-1 { background: #25D366; }
        .wa-2 { background: #075E54; }

        .whatsapp-btn:hover {
            transform: translateY(-3px);
            filter: brightness(1.1);
        }

        .certificate {
            background: white;
            color: #333;
            padding: 40px;
            border: 15px double var(--primary);
            text-align: center;
            border-radius: 0;
            max-width: 800px;
            margin: 0 auto;
        }

        .certificate h1 {
            font-size: 3rem;
            color: #000;
            margin-bottom: 20px;
        }

        .certificate h2 {
            font-size: 1.8rem;
            color: #333;
            border-bottom: 3px solid var(--primary);
            display: inline-block;
            padding: 0 30px 10px;
            margin: 20px 0;
        }

        .certificate .user-name {
            font-size: 2.5rem;
            color: var(--primary-dark);
            font-weight: 800;
            margin: 30px 0;
            text-transform: uppercase;
        }

        .certificate-footer {
            margin-top: 40px;
            font-size: 0.9rem;
            color: #666;
        }

        .print-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 15px 30px;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            margin-top: 20px;
        }

        @media print {
            body * { visibility: hidden; }
            .certificate, .certificate * { visibility: visible; }
            .certificate { position: absolute; left: 0; top: 0; width: 100%; border: none; background: white; }
        }

        @media (max-width: 768px) {
            #app {
                flex-direction: column;
                height: auto;
                min-height: 90vh;
            }

            #sidebar {
                width: 100%;
                max-height: 300px;
            }

            .progress-container {
                left: 20px;
                right: 20px;
            }

            .card {
                padding: 20px;
                margin: 20px 0;
            }

            .coach-container {
                bottom: 15px;
                right: 15px;
            }

            .language-selector {
                top: 10px;
                right: 10px;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Language Selector -->
        <div class="language-selector">
            <button class="lang-btn active" onclick="changeLanguage('fr')">FR</button>
            <button class="lang-btn" onclick="changeLanguage('en')">EN</button>
            <button class="lang-btn" onclick="changeLanguage('ar')">عربي</button>
            <button class="lang-btn" onclick="changeLanguage('es')">ES</button>
            <button class="lang-btn" onclick="changeLanguage('pt')">PT</button>
        </div>

        <!-- Sidebar gauche -->
        <div id="sidebar">
            <div class="brand">
                <h1 id="brand-title">EXCEL MASTER FUN</h1>
                <small id="brand-subtitle">De zéro à héros</small>
            </div>

            <div class="user-info">
                <div class="user-name" id="display-name">Apprenant</div>
                <div class="level-info">
                    <span id="level-label">Niveau <span id="level-display">1</span></span>
                    <span id="xp-display">0/300 XP</span>
                </div>
                <div class="xp-bar-container">
                    <div class="xp-bar-fill" id="xp-bar" style="width: 0%"></div>
                </div>
                <div class="xp-text" id="xp-text">0 XP</div>
                
                <div class="badges-preview" id="badges-preview"></div>
            </div>

            <div class="chapters-header">
                <h3 id="chapters-title">📚 CHAPITRES</h3>
                <span class="filter-badge" id="completed-counter">0/100</span>
            </div>

            <ul id="chapters-list"></ul>

            <div class="sidebar-footer">
                <div class="contact-text" id="support-text">Support WhatsApp</div>
                <div class="contact-phone">677 05 10 62</div>
                <div class="contact-phone">659 71 85 67</div>
            </div>
        </div>

        <!-- Contenu principal -->
        <div id="main">
            <div class="progress-container">
                <div id="progress-bar"></div>
            </div>

            <!-- Coach Excelix -->
            <div class="coach-container">
                <div class="coach-bubble" id="coach-bubble">
                    <div class="coach-message" id="coach-message">Salut ! Prêt à dompter Excel ?</div>

            // Mettre à jour les noms des niveaux
            const levelNames = t.levelNames;
            // Mettre à jour l'affichage du niveau si nécessaire
            
            // Mettre à jour les noms des badges
            const badgeNames = t.badges;
        }

        function t(key) {
            const keys = key.split('.');
            let value = translations[currentLang];
            for (const k of keys) {
                value = value[k];
                if (!value) return key;
            }
            return value;
        }

        // ============================================
        // FONCTIONS DE L'APPLICATION
        // ============================================
        
        function saveState() {
            localStorage.setItem('excelProgress', JSON.stringify(Array.from(completedChapters)));
            localStorage.setItem('userLevel', userLevel.toString());
            localStorage.setItem('userXp', userXp.toString());
            localStorage.setItem('userBadges', JSON.stringify(userBadges));
            localStorage.setItem('streakDays', streakDays.toString());
        }

        function getLevelFromXp(xp) {
            if (xp >= 2700) return 7;
            if (xp >= 2000) return 6;
            if (xp >= 1400) return 5;
            if (xp >= 900) return 4;
            if (xp >= 500) return 3;
            if (xp >= 200) return 2;
            return 1;
        }

        function updateLevel() {
            const newLevel = getLevelFromXp(userXp);
            if (newLevel > userLevel) {
                userLevel = newLevel;
                checkBadges();
                showCoachMessage(t('levelUp').replace('{level}', userLevel).replace('{name}', t('levelNames.' + userLevel)));
            }
        }

        function addXp(amount) {
            userXp += amount;
            updateLevel();
            saveState();
            updateUI();
        }

        function checkBadges() {
            BADGES.forEach(badge => {
                if (userBadges.includes(badge.id)) return;

                let earned = false;
                switch(badge.condition.type) {
                    case 'level':
                        earned = userLevel >= badge.condition.level;
                        break;
                    case 'lessons':
                        earned = completedChapters.size >= badge.condition.count;
                        break;
                    case 'streak':
                        earned = streakDays >= badge.condition.days;
                        break;
                }

                if (earned) {
                    userBadges.push(badge.id);
                    showCoachMessage(`🏆 ${t('badges.' + badge.id)} !`);
                }
            });
            saveState();
        }

        function showCoachMessage(message, duration = 3000) {
            const bubble = document.getElementById('coach-message');
            bubble.textContent = message;
            bubble.style.animation = 'none';
            bubble.offsetHeight;
            bubble.style.animation = 'pulse 0.5s';
            
            setTimeout(() => {
                bubble.style.animation = '';
            }, 500);
        }

        function checkStreak() {
            const today = new Date().toDateString();
            if (lastLogin !== today) {
                if (lastLogin) {
                    const last = new Date(lastLogin);
                    const yesterday = new Date();
                    yesterday.setDate(yesterday.getDate() - 1);
                    
                    if (last.toDateString() === yesterday.toDateString()) {
                        streakDays++;
                    } else {
                        streakDays = 1;
                    }
                } else {
                    streakDays = 1;
                }
                lastLogin = today;
                localStorage.setItem('lastLogin', lastLogin);
                
                if (streakDays % 7 === 0) {
                    addXp(50);
                    showCoachMessage(`🔥 ${streakDays} ${t('days')} ! +50 XP !`);
                }
                
                checkBadges();
            }
        }

        function updateUI() {
            document.getElementById('display-name').textContent = userName;
            document.getElementById('level-display').textContent = userLevel;
            
            const nextLevelXp = userLevel < 7 ? userLevel * 300 : 2700;
            const currentLevelXp = userLevel > 1 ? (userLevel - 1) * 300 : 0;
            const xpInLevel = userXp - currentLevelXp;
            const xpNeeded = nextLevelXp - currentLevelXp;
            const progressPercent = (xpInLevel / xpNeeded) * 100;
            
            document.getElementById('xp-bar').style.width = progressPercent + '%';
            document.getElementById('xp-display').textContent = `${xpInLevel}/${xpNeeded} ${t('xp')}`;
            document.getElementById('xp-text').textContent = `${userXp} ${t('xp')}`;
            
            document.getElementById('completed-counter').textContent = `${completedChapters.size}/100`;
            document.getElementById('progress-bar').style.width = (completedChapters.size / 100 * 100) + '%';
            
            renderChaptersList();
            renderBadges();
        }

        function renderChaptersList() {
            const list = document.getElementById('chapters-list');
            list.innerHTML = '';

            for (let i = 1; i <= 100; i++) {
                const chapter = CHAPTERS[i];
                const isCompleted = completedChapters.has(i);
                const isLocked = i > 10 && !isPremium && !isCompleted;
                
                const li = document.createElement('li');
                li.className = `${isCompleted ? 'completed' : ''} ${isLocked ? 'locked' : ''}`;
                
                li.innerHTML = `
                    <div style="display: flex; align-items: center; width: 100%;">
                        <span class="chapter-number">${i}</span>
                        <span class="chapter-title">${chapter.title}</span>
                        <span class="chapter-status ${isCompleted ? 'completed' : ''}">
                            ${isCompleted ? '✓' : (isLocked ? '🔒' : '')}
                        </span>
                    </div>
                `;
                
                if (!isLocked) {
                    li.onclick = () => loadChapter(i);
                }
                
                list.appendChild(li);
            }
        }

        function renderBadges() {
            const container = document.getElementById('badges-preview');
            container.innerHTML = '';
            
            const displayedBadges = BADGES.slice(0, 5);
            displayedBadges.forEach(badge => {
                const earned = userBadges.includes(badge.id);
                const div = document.createElement('div');
                div.className = `badge-mini ${earned ? 'earned' : ''}`;
                div.setAttribute('data-name', t('badges.' + badge.id));
                div.textContent = badge.icon;
                container.appendChild(div);
            });
        }

        function showWelcome() {
            document.getElementById('lesson-content').innerHTML = `
                <h2>${t('welcome')}</h2>
                <h3>${t('welcomeDesc')}</h3>
                
                <div class="coach-box">
                    ${t('coachIntro')}
                </div>

                <div class="badges-section">
                    <div class="badge earned" data-name="${t('badges.welcome')}">🎉</div>
                    <div class="badge" data-name="${t('badges.survivor')}">🦊</div>
                    <div class="badge" data-name="${t('badges.master')}">👑</div>
                </div>

                <button onclick="startJourney()">${t('start')}</button>
            `;
        }

        function startJourney() {
            loadChapter(1);
        }

        function loadChapter(i) {
            localStorage.setItem('currentLesson', i);
            
            if (i > 100) {
                showCertificate();
                return;
            }

            if (i > 10 && !isPremium && !completedChapters.has(i)) {
                showUnlockScreen();
                return;
            }

            const chapter = CHAPTERS[i];
            const introMessage = INTRO_MESSAGES[currentLang] && INTRO_MESSAGES[currentLang][i] 
                ? INTRO_MESSAGES[currentLang][i] 
                : INTRO_MESSAGES.fr[i] || "Prêt pour ce chapitre ?";
            
            const funFact = FUN_FACTS[currentLang][Math.floor(Math.random() * FUN_FACTS[currentLang].length)];
            
            document.getElementById('lesson-content').innerHTML = `
                <!-- Bande défilante d'introduction -->
                <div class="intro-ticker">
                    <div class="ticker-content">
                        ${Array(5).fill(0).map(() => `
                            <div class="ticker-item">
                                <span>⭐</span>
                                <span>${funFact}</span>
                                <span>⭐</span>
                            </div>
                        `).join('')}
                    </div>
                </div>

                <!-- Carte d'introduction du coach -->
                <div class="coach-intro-card">
                    <div class="coach-intro-avatar">
                        🦊
                    </div>
                    <div class="coach-intro-text">
                        <h4>Coach Excelix</h4>
                        <p>${introMessage}</p>
                        <div class="fun-fact">
                            <i>💡</i> ${funFact}
                        </div>
                    </div>
                </div>

                <span class="lesson-number">${t('chapter')} ${i}/100</span>
                <h2>${chapter.title}</h2>
                
                <div class="coach-box">
                    ${chapter.question}
                </div>
                
                <div class="input-group">
                    <input type="text" id="answer-input" placeholder="${t('answer')}" autofocus>
                </div>
                
                <button onclick="checkAnswer(${i})">${t('validate')}</button>
                
                <div id="feedback" class="feedback"></div>
            `;

            document.getElementById('answer-input').focus();
            showCoachMessage(introMessage);
        }

        function checkAnswer(i) {
            const answer = document.getElementById('answer-input').value.trim().toUpperCase().replace(/,/g, ';');
            const correct = CHAPTERS[i].answer.toUpperCase().replace(/,/g, ';');
            const feedback = document.getElementById('feedback');

            if (answer === correct) {
                if (!completedChapters.has(i)) {
                    completedChapters.add(i);
                    
                    let xpGain = 10;
                    if (i <= 10) xpGain = 10;
                    else if (i <= 20) xpGain = 15;
                    else if (i <= 50) xpGain = 20;
                    else xpGain = 30;
                    
                    addXp(xpGain);
                    
                    feedback.className = 'feedback success';
                    feedback.innerHTML = `✅ ${t('correct')} +${xpGain} XP`;
                    
                    showCoachMessage(t('success_message'));
                    
                    if (i === 10) {
                        showCoachMessage(t('premium_unlock_message'));
                    }
                } else {
                    feedback.className = 'feedback success';
                    feedback.innerHTML = `✅ ${t('already_validated')}`;
                }

                setTimeout(() => {
                    if (i === 100) {
                        showCertificate();
                    } else {
                        loadChapter(i + 1);
                    }
                }, 800);
            } else {
                feedback.className = 'feedback error';
                feedback.innerHTML = `❌ ${t('incorrect')} ${CHAPTERS[i].answer}`;
                showCoachMessage(t('error_message'));
            }
        }

        function showUnlockScreen() {
            document.getElementById('lesson-content').innerHTML = `
                <h2>${t('unlock')}</h2>
                
                <div class="coach-box">
                    ${t('unlockDesc')}
                </div>
                
                <div class="badges-section">
                    <div class="badge earned">🔥</div>
                    <div class="badge earned">📊</div>
                    <div class="badge">👑</div>
                    <div class="badge">🚀</div>
                </div>
                
                <div class="unlock-section">
                    <h3 style="color: var(--primary); margin-bottom: 15px;">${t('getKey')}</h3>
                    
                    <div style="margin-bottom: 20px;">
                        <input type="text" id="unlock-name" placeholder="${t('unlockName')}" value="${userName}">
                        <input type="text" id="unlock-key" placeholder="${t('unlockKey')}" style="margin-top: 10px;">
                    </div>
                    
                    <button onclick="unlockPremium()">${t('unlockBtn')}</button>
                    
                    <div style="margin-top: 30px;">
                        <p style="color: var(--text-muted); margin-bottom: 10px;">${t('getKey')}</p>
                        <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                            <a href="https://wa.me/237677051062?text=Clé%20Excel%20pour%20${userName}" class="whatsapp-btn wa-1" target="_blank">📱 ${t('line1')}</a>
                            <a href="https://wa.me/237659718567?text=Clé%20Excel%20pour%20${userName}" class="whatsapp-btn wa-2" target="_blank">📱 ${t('line2')}</a>
                        </div>
                    </div>
                </div>
                
                <div style="margin-top: 20px; font-size: 0.9rem; color: var(--text-muted);">
                    ${t('price')}
                </div>
            `;
        }

        function unlockPremium() {
            const name = document.getElementById('unlock-name').value.trim().toUpperCase();
            const key = document.getElementById('unlock-key').value.trim().toUpperCase();
            
            const generatedKey = `EXL-${name}-2026`;
            
            if (key === generatedKey || key === MASTER_KEY) {
                isPremium = true;
                localStorage.setItem('excelPremium', 'true');
                localStorage.setItem('userName', name || userName);
                userName = name || userName;
                
                if (!userBadges.includes('premium')) {
                    userBadges.push('premium');
                }
                
                saveState();
                
                showCoachMessage(t('premium_success'));
                
                let nextChapter = 11;
                for (let i = 11; i <= 100; i++) {
                    if (!completedChapters.has(i)) {
                        nextChapter = i;
                        break;
                    }
                }
                loadChapter(nextChapter);
            } else {
                alert(t('invalid_key'));
            }
        }

        function showCertificate() {
            const today = new Date().toLocaleDateString(currentLang === 'fr' ? 'fr-FR' : 'en-US', {
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });
            
            document.getElementById('lesson-content').innerHTML = `
                <div class="certificate">
                    <h1>🏆</h1>
                    <h2>${t('certificate')}</h2>
                    
                    <div class="user-name">${userName}</div>
                    
                    <div style="font-size: 1.2rem; margin: 30px 0;">
                        ${t('awarded')}<br>
                        <strong>Excel Master Fun</strong>
                    </div>
                    
                    <div style="display: flex; justify-content: center; gap: 10px; margin: 30px 0;">
                        <div class="badge earned" data-name="${t('badges.legend')}">⭐</div>
                        <div class="badge earned" data-name="${t('badges.master')}">👑</div>
                        <div class="badge earned" data-name="${t('badges.survivor')}">🦊</div>
                    </div>
                    
                    <div style="margin: 30px 0; font-size: 0.9rem;">
                        ${t('level_reached')} <strong>${t('levelNames.' + userLevel)}</strong><br>
                        ${t('total_xp')} <strong>${userXp}</strong><br>
                        ${t('badges_count')} <strong>${userBadges.length}</strong>
                    </div>
                    
                    <div class="certificate-footer">
                        <div>${t('issued_in')} Douala, ${today}</div>
                        <div style="margin-top: 20px;">${t('certificate_number')} #${Math.random().toString(36).substring(2, 10).toUpperCase()}</div>
                    </div>
                    
                    <button class="print-btn" onclick="window.print()">${t('print')}</button>
                </div>
            `;
            
            if (!userBadges.includes('legend')) {
                userBadges.push('legend');
                saveState();
            }
            
            showCoachMessage(t('congrats_message'));
        }

        // ============================================
        // INITIALISATION
        // ============================================
        
        const BADGES = [
            { id: 'welcome', name: 'Bienvenue', icon: '🎉', condition: { type: 'login' } },
            { id: 'survivor', name: 'Survivant', icon: '🦊', condition: { type: 'level', level: 1 } },
            { id: 'calculator', name: 'Calculator', icon: '🧮', condition: { type: 'lessons', count: 10 } },
            { id: 'stylist', name: 'Artiste', icon: '🎨', condition: { type: 'lessons', count: 20 } },
            { id: 'detective', name: 'Détective', icon: '🔍', condition: { type: 'challenges', count: 5 } },
            { id: 'speedy', name: 'L\'éclair', icon: '⚡', condition: { type: 'speed' } },
            { id: 'streak7', name: 'Habitué', icon: '🔥', condition: { type: 'streak', days: 7 } },
            { id: 'streak30', name: 'Accro', icon: '💫', condition: { type: 'streak', days: 30 } },
            { id: 'master', name: 'Maître', icon: '👑', condition: { type: 'level', level: 6 } },
            { id: 'legend', name: 'Légende', icon: '⭐', condition: { type: 'level', level: 7 } }
        ];

        // Initialisation
        checkStreak();
        
        // Appliquer la langue initiale
        if (currentLang === 'ar') {
            document.documentElement.setAttribute('dir', 'rtl');
        }
        updateUITexts();
        updateUI();
        
        // Afficher l'écran d'accueil
        showWelcome();
    </script>
</body>
</html>
