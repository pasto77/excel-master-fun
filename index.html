<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EXCEL MASTER FUN - VRAIE FORMATION</title>
    
    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore-compat.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #1a1a2e; color: white; min-height: 100vh; padding: 20px; }
        .app { max-width: 1200px; margin: 0 auto; }
        
        /* Header et navigation */
        .header { display: flex; justify-content: space-between; align-items: center; background: #16213e; padding: 15px 25px; border-radius: 50px; margin-bottom: 20px; }
        .logo h1 { color: #FFD700; font-size: 1.5rem; }
        .lang-buttons { display: flex; gap: 8px; }
        .lang-btn { background: #333; color: white; border: none; padding: 5px 12px; border-radius: 20px; cursor: pointer; }
        .lang-btn.active { background: #FFD700; color: black; }
        
        /* Coach */
        .coach { background: #16213e; border-radius: 30px; padding: 20px; margin-bottom: 20px; display: flex; gap: 20px; align-items: center; }
        .coach-avatar { width: 80px; height: 80px; background: #FFD700; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; }
        .coach-bubble { flex: 1; background: #0f3460; padding: 20px; border-radius: 20px; border-left: 5px solid #FFD700; }
        .coach-name { color: #FFD700; font-weight: bold; }
        
        /* Stats */
        .stats { display: grid; grid-template-columns: repeat(4,1fr); gap: 15px; margin-bottom: 20px; }
        .stat-card { background: #16213e; padding: 15px; border-radius: 20px; text-align: center; }
        .stat-value { font-size: 2rem; font-weight: bold; color: #FFD700; }
        
        /* Liste des leçons */
        .lessons-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 15px; margin: 20px 0; max-height: 400px; overflow-y: auto; }
        .lesson-card { background: #16213e; padding: 15px; border-radius: 15px; cursor: pointer; text-align: center; transition: 0.3s; }
        .lesson-card:hover { transform: translateY(-3px); border: 1px solid #FFD700; }
        .lesson-card.completed { background: #2e8b57; }
        .lesson-number { font-size: 0.8rem; color: #FFD700; }
        .lesson-title { font-weight: bold; margin: 5px 0; }
        
        /* Modal de leçon */
        .lesson-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none; justify-content: center; align-items: center;
            z-index: 1000; overflow-y: auto; padding: 20px;
        }
        .lesson-modal.active { display: flex; }
        .lesson-content {
            background: #16213e; max-width: 700px; width: 100%; border-radius: 30px; padding: 40px;
            max-height: 90vh; overflow-y: auto;
        }
        .lesson-content h2 { color: #FFD700; margin-bottom: 20px; }
        .demo { background: #0f3460; padding: 20px; border-radius: 15px; margin: 20px 0; font-family: monospace; font-size: 1.1rem; text-align: center; }
        .exercise-input { width: 100%; padding: 15px; margin: 15px 0; border-radius: 10px; border: 1px solid #333; background: #1a1a2e; color: white; font-size: 1rem; }
        .feedback { padding: 15px; border-radius: 10px; margin: 15px 0; }
        .feedback.correct { background: rgba(46, 139, 86, 0.3); border-left: 4px solid #2e8b57; }
        .feedback.wrong { background: rgba(255, 71, 87, 0.3); border-left: 4px solid #ff4757; }
        .close-modal { background: #333; color: white; padding: 10px 20px; border-radius: 25px; cursor: pointer; margin-top: 20px; border: none; }
        
        /* Auth Modal */
        .auth-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center;
            z-index: 1000;
        }
        .auth-modal.active { display: flex; }
        .auth-card { background: #16213e; padding: 30px; border-radius: 20px; max-width: 400px; width: 90%; text-align: center; }
        .auth-card input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; background: #0f3460; color: white; }
        .auth-card button { width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; border: none; cursor: pointer; }
        .google-btn { background: #333; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .auth-btn { background: #FFD700; color: black; font-weight: bold; }
        .user-profile { display: flex; align-items: center; gap: 15px; background: #16213e; padding: 10px 20px; border-radius: 50px; margin-bottom: 20px; }
        .logout-btn { background: #ff4757; color: white; padding: 5px 15px; border-radius: 20px; cursor: pointer; }
        
        @media (max-width: 768px) {
            .stats { grid-template-columns: repeat(2,1fr); }
            .coach { flex-direction: column; text-align: center; }
        }
    </style>
</head>
<body>
    <div class="app">
        <!-- Auth Modal -->
        <div class="auth-modal" id="authModal">
            <div class="auth-card">
                <h2 style="color:#FFD700;">🚀 Rejoins l'aventure</h2>
                <button class="google-btn" onclick="signInWithGoogle()">🔐 Continuer avec Google</button>
                <div style="margin:15px 0">ou</div>
                <input type="email" id="emailInput" placeholder="Email">
                <input type="password" id="passwordInput" placeholder="Mot de passe">
                <button class="auth-btn" onclick="signUpWithEmail()">Créer un compte</button>
                <button class="auth-btn" onclick="signInWithEmail()">Se connecter</button>
                <button class="close-btn" style="margin-top:15px; background:#333;" onclick="closeModal()">Fermer</button>
            </div>
        </div>

        <!-- Header -->
        <div class="header">
            <div class="logo"><h1>📊 EXCEL MASTER FUN</h1></div>
            <div class="lang-buttons">
                <button class="lang-btn active" onclick="changeLanguage('fr')">FR</button>
                <button class="lang-btn" onclick="changeLanguage('en')">EN</button>
                <button class="lang-btn" onclick="changeLanguage('es')">ES</button>
                <button class="lang-btn" onclick="changeLanguage('ar')">AR</button>
                <button class="lang-btn" onclick="changeLanguage('zh')">ZH</button>
            </div>
        </div>

        <!-- Auth Section -->
        <div id="authSection">
            <button class="auth-btn" onclick="openModal()" style="width:auto; padding:10px 30px;">🔐 Connexion</button>
        </div>
        <div id="profileSection" style="display:none;"></div>

        <!-- Coach -->
        <div class="coach">
            <div class="coach-avatar">🦊</div>
            <div class="coach-bubble">
                <div class="coach-name">Excelix</div>
                <div class="coach-message" id="coachMessage">Salut ! Je suis ton coach. Connecte-toi pour commencer ton aventure !</div>
            </div>
        </div>

        <!-- Stats -->
        <div class="stats">
            <div class="stat-card"><div class="stat-value" id="statLevel">1</div><div>Niveau</div></div>
            <div class="stat-card"><div class="stat-value" id="statXP">0</div><div>XP</div></div>
            <div class="stat-card"><div class="stat-value" id="statLessons">0/100</div><div>Leçons</div></div>
            <div class="stat-card"><div class="stat-value" id="statStreak">0</div><div>Jours</div></div>
        </div>

        <!-- Leçons -->
        <h2>📚 Les 100 chapitres</h2>
        <div class="lessons-grid" id="lessonsGrid"></div>

        <div class="footer" style="text-align:center; margin-top:30px; color:#888;">
            <p>Support: 677 05 10 62 | 659 71 85 67</p>
        </div>
    </div>

    <!-- Modal Leçon -->
    <div class="lesson-modal" id="lessonModal">
        <div class="lesson-content" id="lessonContent">
            <!-- Le contenu de la leçon sera injecté ici -->
        </div>
    </div>

    <script>
        // Firebase config
        const firebaseConfig = {
            apiKey: "AIzaSyDtPKWklKh7Ijd_zTev7uq9gmuXcXfoFKQ",
            authDomain: "excel-master-5.firebaseapp.com",
            projectId: "excel-master-5",
            storageBucket: "excel-master-5.firebasestorage.app",
            messagingSenderId: "409433181308",
            appId: "1:409433181308:web:5db60af28ade85f1110df9"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();

        // ============================================
        // LES VRAIES LEÇONS AVEC EXPLICATIONS
        // ============================================
        const LESSONS = {
            1: {
                title: "🧩 Les cellules",
                explanation: "Excel est une immense grille composée de petites cases appelées CELLULES. Chaque cellule a une adresse unique : la colonne (lettre) et la ligne (chiffre). Exemple : A1, B3, C5.",
                demo: "La cellule A1 est la première case en haut à gauche. La cellule B2 est une case à droite et en bas.",
                question: "Quel est le nom de la première cellule (en haut à gauche) ?",
                answer: "A1",
                hint: "C'est la colonne A, ligne 1",
                xp: 10
            },
            2: {
                title: "⌨️ Sélectionner tout",
                explanation: "Pour travailler rapidement, il faut connaître les raccourcis clavier. CTRL+A permet de sélectionner TOUTES les cellules d'un coup !",
                demo: "Appuie sur CTRL+A (ou Cmd+A sur Mac) pour tout sélectionner.",
                question: "Quel raccourci clavier permet de tout sélectionner dans Excel ?",
                answer: "CTRL+A",
                hint: "A comme 'All' (tout)",
                xp: 10
            },
            3: {
                title: "➕ La fonction SOMME",
                explanation: "La fonction SOMME additionne toutes les valeurs d'une plage de cellules. Elle s'écrit =SOMME(plage). Exemple : =SOMME(A1:A5) additionne les cellules A1, A2, A3, A4 et A5.",
                demo: "Si A1=10, A2=20, A3=30, alors =SOMME(A1:A3) donne 60.",
                question: "Quelle formule additionne les cellules A1 à A10 ?",
                answer: "=SOMME(A1:A10)",
                hint: "Commence par =, puis SOMME, puis la plage entre parenthèses",
                xp: 15
            },
            4: {
                title: "📊 La fonction MOYENNE",
                explanation: "La fonction MOYENNE calcule la moyenne des valeurs d'une plage. =MOYENNE(plage) additionne toutes les valeurs et divise par le nombre de valeurs.",
                demo: "Si B1=10, B2=20, B3=30, alors =MOYENNE(B1:B3) donne 20.",
                question: "Quelle formule calcule la moyenne des cellules B1 à B5 ?",
                answer: "=MOYENNE(B1:B5)",
                hint: "Commence par =, puis MOYENNE, puis la plage",
                xp: 15
            },
            5: {
                title: "📉 MIN et MAX",
                explanation: "MIN trouve la valeur la plus petite d'une plage. MAX trouve la valeur la plus grande.",
                demo: "Pour des notes de 5 à 18, =MIN(notes) donne 5, =MAX(notes) donne 18.",
                question: "Quelle formule trouve la plus petite valeur de A1 à A20 ?",
                answer: "=MIN(A1:A20)",
                hint: "MIN comme Minimum",
                xp: 15
            },
            6: {
                title: "📈 La fonction MAX",
                explanation: "MAX trouve la valeur la plus grande d'une plage. Très utile pour connaître le meilleur score, la vente maximale, etc.",
                demo: "Avec les valeurs 12, 45, 23, 67, 34, =MAX(A1:A5) donne 67.",
                question: "Quelle formule trouve la plus grande valeur de A1 à A20 ?",
                answer: "=MAX(A1:A20)",
                hint: "MAX comme Maximum",
                xp: 15
            },
            7: {
                title: "🔤 Mettre en gras",
                explanation: "Pour mettre du texte en gras, sélectionne la cellule et appuie sur CTRL+G (ou Ctrl+B sur les versions anglaises).",
                demo: "Sélectionne une cellule, tape CTRL+G, le texte devient plus épais !",
                question: "Quel raccourci pour mettre le texte en gras ?",
                answer: "CTRL+G",
                hint: "G pour Gras",
                xp: 10
            },
            8: {
                title: "📋 Copier",
                explanation: "Pour copier une cellule, sélectionne-la et appuie sur CTRL+C. Ensuite, sélectionne la destination et appuie sur CTRL+V pour coller.",
                demo: "CTRL+C pour copier, CTRL+V pour coller.",
                question: "Quel raccourci pour copier une cellule ?",
                answer: "CTRL+C",
                hint: "C pour Copier",
                xp: 10
            },
            9: {
                title: "🔄 Annuler",
                explanation: "CTRL+Z annule la dernière action. C'est LE raccourci qui sauve des vies ! Tu as supprimé quelque chose par erreur ? CTRL+Z et tout revient.",
                demo: "Fais une action, puis CTRL+Z → elle disparaît. Refais-la avec CTRL+Y.",
                question: "Quel raccourci annule la dernière action ?",
                answer: "CTRL+Z",
                hint: "Z comme Zéro, pour revenir en arrière",
                xp: 10
            },
            10: {
                title: "🔍 RECHERCHEV",
                explanation: "RECHERCHEV est une fonction puissante. Elle cherche une valeur dans la première colonne d'un tableau et retourne une valeur dans la même ligne, à une colonne donnée.",
                demo: "=RECHERCHEV(A1;B1:C10;2;0) cherche la valeur de A1 dans la colonne B, et retourne la valeur de la colonne C (colonne 2) sur la même ligne.",
                question: "Quelle formule cherche A1 dans B1:C10 et retourne la 2ème colonne ?",
                answer: "=RECHERCHEV(A1;B1:C10;2;0)",
                hint: "RECHERCHEV(valeur_cherchée; tableau; numéro_colonne; 0)",
                xp: 20
            }
        };
        
        // Compléter les 100 leçons
        for (let i = 11; i <= 100; i++) {
            LESSONS[i] = {
                title: `📘 Leçon ${i}`,
                explanation: `Cette leçon approfondit tes connaissances sur Excel. Continue à pratiquer !`,
                demo: `Pratique avec des exemples concrets.`,
                question: `Question pour la leçon ${i}`,
                answer: "REPONSE",
                hint: "Cherche dans tes notes",
                xp: i <= 20 ? 15 : i <= 50 ? 20 : 30
            };
        }

        // État
        let currentUser = null;
        let userData = { level: 1, xp: 0, completed: [] };
        let currentLesson = null;

        // Auth
        function openModal() { document.getElementById('authModal').classList.add('active'); }
        function closeModal() { document.getElementById('authModal').classList.remove('active'); }
        
        async function signInWithGoogle() {
            try { await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()); closeModal(); } 
            catch(e) { alert('Erreur'); }
        }
        
        async function signUpWithEmail() {
            const email = document.getElementById('emailInput').value;
            const pwd = document.getElementById('passwordInput').value;
            if(!email || !pwd) { alert('Remplis tous les champs'); return; }
            try { await auth.createUserWithEmailAndPassword(email, pwd); closeModal(); } 
            catch(e) { alert(e.message); }
        }
        
        async function signInWithEmail() {
            const email = document.getElementById('emailInput').value;
            const pwd = document.getElementById('passwordInput').value;
            if(!email || !pwd) { alert('Remplis tous les champs'); return; }
            try { await auth.signInWithEmailAndPassword(email, pwd); closeModal(); } 
            catch(e) { alert(e.message); }
        }
        
        async function logout() { await auth.signOut(); location.reload(); }

        async function saveProgress() {
            if (!currentUser) return;
            await db.collection('users').doc(currentUser.uid).set({
                name: currentUser.displayName || currentUser.email.split('@')[0],
                level: userData.level,
                xp: userData.xp,
                completed: userData.completed
            }, { merge: true });
        }
        
        async function loadUserData() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (doc.exists) {
                const data = doc.data();
                userData.level = data.level || 1;
                userData.xp = data.xp || 0;
                userData.completed = data.completed || [];
            } else {
                userData = { level: 1, xp: 0, completed: [] };
                await saveProgress();
            }
            updateUI();
        }
        
        function updateUI() {
            document.getElementById('statLevel').textContent = userData.level;
            document.getElementById('statXP').textContent = userData.xp;
            document.getElementById('statLessons').textContent = `${userData.completed.length}/100`;
            renderLessons();
        }
        
        function renderLessons() {
            const grid = document.getElementById('lessonsGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 100; i++) {
                const completed = userData.completed.includes(i);
                const div = document.createElement('div');
                div.className = `lesson-card ${completed ? 'completed' : ''}`;
                div.innerHTML = `<div class="lesson-number">Chapitre ${i}</div><div class="lesson-title">${LESSONS[i].title}</div>`;
                if (!completed) div.onclick = () => openLesson(i);
                grid.appendChild(div);
            }
        }
        
        // ============================================
        // OUVERTURE D'UNE VRAIE LEÇON
        // ============================================
        function openLesson(lessonId) {
            currentLesson = lessonId;
            const lesson = LESSONS[lessonId];
            const modal = document.getElementById('lessonModal');
            const content = document.getElementById('lessonContent');
            
            content.innerHTML = `
                <h2>${lesson.title}</h2>
                <div style="margin: 20px 0;">
                    <h3 style="color:#FFD700;">🎯 Objectif de cette leçon</h3>
                    <p style="margin-top:5px;">${lesson.title.split(' ')[1] || 'Maîtriser un concept Excel'}</p>
                </div>
                <div>
                    <h3 style="color:#FFD700;">📖 Explication</h3>
                    <p style="margin:10px 0; line-height:1.6;">${lesson.explanation}</p>
                </div>
                <div class="demo">
                    <strong>🎬 Démonstration :</strong><br>
                    ${lesson.demo}
                </div>
                <div>
                    <h3 style="color:#FFD700;">✍️ Exercice</h3>
                    <p style="margin:10px 0;">${lesson.question}</p>
                    <input type="text" class="exercise-input" id="exerciseAnswer" placeholder="Tape ta réponse ici...">
                    <button class="auth-btn" onclick="checkLessonAnswer()" style="width:100%; margin:10px 0;">Vérifier</button>
                    <div id="exerciseFeedback"></div>
                    <details style="margin-top:10px;">
                        <summary style="color:#FFD700; cursor:pointer;">💡 Besoin d'un indice ?</summary>
                        <p style="margin-top:10px; padding:10px; background:#0f3460; border-radius:10px;">${lesson.hint}</p>
                    </details>
                </div>
                <button class="close-modal" onclick="closeLessonModal()">Fermer</button>
            `;
            modal.classList.add('active');
        }
        
        function closeLessonModal() {
            document.getElementById('lessonModal').classList.remove('active');
        }
        
        async function checkLessonAnswer() {
            const answer = document.getElementById('exerciseAnswer').value.trim().toUpperCase();
            const lesson = LESSONS[currentLesson];
            const feedbackDiv = document.getElementById('exerciseFeedback');
            
            if (answer === lesson.answer.toUpperCase()) {
                feedbackDiv.innerHTML = `<div class="feedback correct">✅ BRAVO ! +${lesson.xp} XP</div>`;
                
                if (!userData.completed.includes(currentLesson)) {
                    userData.completed.push(currentLesson);
                    userData.xp += lesson.xp;
                    userData.level = Math.floor(userData.xp / 300) + 1;
                    await saveProgress();
                    updateUI();
                    
                    setTimeout(() => {
                        closeLessonModal();
                        document.getElementById('coachMessage').innerHTML = `🦊 Félicitations ! Tu as gagné ${lesson.xp} XP ! Continue comme ça !`;
                    }, 1500);
                }
            } else {
                feedbackDiv.innerHTML = `<div class="feedback wrong">❌ Mauvaise réponse. La bonne réponse était : ${lesson.answer}<br><br>💡 ${lesson.hint}</div>`;
            }
        }
        
        async function loadUserProfile(user) {
            currentUser = user;
            document.getElementById('authSection').style.display = 'none';
            document.getElementById('profileSection').style.display = 'block';
            document.getElementById('profileSection').innerHTML = `
                <div class="user-profile">
                    <div style="width:45px;height:45px;background:#FFD700;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;">${(user.displayName || user.email)[0].toUpperCase()}</div>
                    <div style="flex:1"><strong>${user.displayName || user.email.split('@')[0]}</strong><br>${user.email}</div>
                    <button class="logout-btn" onclick="logout()">Déconnexion</button>
                </div>
            `;
            document.getElementById('coachMessage').innerHTML = `🦊 Bienvenue ${user.displayName || user.email.split('@')[0]} ! Prêt à devenir un maître Excel ?`;
            await loadUserData();
        }
        
        // Langues
        function changeLanguage(lang) {
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            alert(`Langue changée en ${lang}. Les traductions complètes arrivent bientôt !`);
        }
        
        auth.onAuthStateChanged(async (user) => {
            if (user) await loadUserProfile(user);
        });
    </script>
</body>
</html>
