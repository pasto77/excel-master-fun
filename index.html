<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel Master Fun – Formation complète</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, 'Segoe UI', sans-serif;
        }
        body {
            background: #0f172a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .app-container {
            max-width: 1200px;
            width: 100%;
            background: #1e293b;
            border-radius: 40px;
            padding: 24px 28px;
            border-left: 6px solid #fbbf24;
            box-shadow: 0 25px 40px -12px black;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.8rem;
            color: #fbbf24;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .coach {
            display: flex;
            gap: 14px;
            align-items: center;
            background: #0f172a;
            padding: 12px 18px;
            border-radius: 60px;
            margin-bottom: 20px;
        }
        .modules-nav {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #334155;
        }
        .module-btn {
            background: #334155;
            border: none;
            padding: 8px 16px;
            border-radius: 40px;
            color: #e2e8f0;
            cursor: pointer;
            transition: 0.1s;
        }
        .module-btn.active {
            background: #fbbf24;
            color: #0f172a;
            font-weight: bold;
        }
        .module-btn.locked {
            opacity: 0.5;
            cursor: not-allowed;
            background: #334155;
        }
        .module-content {
            background: #0f172a;
            border-radius: 32px;
            padding: 24px;
            min-height: 450px;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 24px;
            gap: 16px;
        }
        button {
            background: #fbbf24;
            border: none;
            padding: 10px 20px;
            border-radius: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        .reset-progress {
            background: #334155;
            color: white;
        }
        .premium-btn {
            background: #f97316;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-size: 0.8rem;
            margin-left: 10px;
        }
        .payment-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .payment-modal.active {
            display: flex;
        }
        .payment-card {
            background: #1e293b;
            padding: 32px;
            border-radius: 32px;
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .payment-card input {
            width: 100%;
            padding: 12px;
            margin: 16px 0;
            border-radius: 40px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            text-align: center;
        }
        .payment-card button {
            margin: 8px;
        }
        .success {
            border-left-color: #22c55e;
            color: #bef264;
        }
        .premium-badge {
            background: #f97316;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 30px;
            font-size: 0.7rem;
            margin-left: 10px;
            vertical-align: middle;
        }
        .feedback {
            background: #0f172a;
            padding: 16px;
            border-radius: 24px;
            margin-top: 20px;
            border-left: 4px solid #fbbf24;
        }
    </style>
</head>
<body>
<div class="app-container">
    <div class="header">
        <h1>📘 Excel Master Fun</h1>
        <div>
            <span id="premiumStatus"></span>
            <button id="premiumButton" class="premium-btn">⭐ Débloquer l’intégralité</button>
        </div>
    </div>
    <div class="coach">
        <span style="font-size: 2rem;">🦊</span>
        <span style="color:#cbd5e1;">Choisis un module. Les modules avancés (10 à 13) sont accessibles après paiement.</span>
    </div>

    <div class="modules-nav" id="modulesNav"></div>
    <div class="module-content" id="moduleContent"></div>

    <div class="nav-buttons">
        <button id="prevBtn" style="background:#334155;">⬅️ Précédent</button>
        <button id="nextBtn">Suivant ➡️</button>
        <button id="resetProgressBtn" class="reset-progress">🔄 Réinitialiser progression</button>
    </div>
    <div class="feedback" id="globalFeedback" style="margin-top: 20px;">
        🎓 13 modules pour maîtriser Excel.
    </div>
</div>

<!-- Modal de paiement -->
<div id="paymentModal" class="payment-modal">
    <div class="payment-card">
        <h3 style="color:#fbbf24;">🔓 Débloquer les modules avancés</h3>
        <p style="margin: 16px 0;">Choisis ton moyen de paiement</p>
        <div style="display: flex; gap: 12px; justify-content: center;">
            <button id="orangeMoneyBtn" style="background:#f97316;">📱 Orange Money</button>
            <button id="mtnMoneyBtn" style="background:#f97316;">📱 MTN Money</button>
        </div>
        <input type="text" id="phoneNumber" placeholder="Numéro de téléphone (ex: 677051062)" style="margin-top: 16px;">
        <button id="confirmPaymentBtn" style="background:#fbbf24;">Confirmer le paiement (5000 FCFA)</button>
        <button id="closePaymentBtn" style="background:#334155; margin-top: 8px;">Annuler</button>
        <div id="paymentMessage" style="margin-top: 12px; font-size: 0.9rem;"></div>
    </div>
</div>

<script>
    // ----- Contenus des modules (inchangés, mais on ajoute un message premium pour les modules 10-13) -----
    const modules = [
        { id: 1, title: "🧭 Module 1 – L’interface", content: "module1" },
        { id: 2, title: "➕ Module 2 – Premiers calculs", content: "module2" },
        { id: 3, title: "🎨 Module 3 – Mise en forme", content: "module3" },
        { id: 4, title: "📊 Module 4 – Graphique simple", content: "module4" },
        { id: 5, title: "🧮 Module 5 – La fonction SOMME", content: "module5" },
        { id: 6, title: "⚖️ Module 6 – La fonction SI", content: "module6" },
        { id: 7, title: "🏁 Module 7 – Bilan", content: "module7" },
        { id: 8, title: "🏆 Module 8 – Projet final", content: "module8" },
        { id: 9, title: "🎓 Module 9 – Révision", content: "module9" },
        { id: 10, title: "📋 Module 10 – Tableaux structurés", content: "module10" },
        { id: 11, title: "🔍 Module 11 – Filtres et tris", content: "module11" },
        { id: 12, title: "📈 Module 12 – Graphiques avancés", content: "module12" },
        { id: 13, title: "✍️ Module 13 – Formules de texte", content: "module13" }
    ];

    // Contenus (seuls les 9 premiers sont détaillés, les suivants ont un placeholder)
    const contents = {
        module1: `<h3>🧭 Module 1 – L’interface</h3><p>Excel est une grille de cellules (A1, B2...). Les colonnes sont des lettres, les lignes des chiffres.</p><button onclick="markCompleted(1)">✅ Terminer ce module</button>`,
        module2: `<h3>➕ Module 2 – Premiers calculs</h3><p>=A1+B1 permet d’additionner. Exemple : 15+27 = 42.</p><button onclick="markCompleted(2)">✅ Terminer ce module</button>`,
        module3: `<h3>🎨 Module 3 – Mise en forme</h3><p>On peut changer la police, la couleur, ajouter des bordures.</p><button onclick="markCompleted(3)">✅ Terminer ce module</button>`,
        module4: `<h3>📊 Module 4 – Graphique simple</h3><p>Un graphique transforme des chiffres en image.</p><button onclick="markCompleted(4)">✅ Terminer ce module</button>`,
        module5: `<h3>🧮 Module 5 – La fonction SOMME</h3><p>=SOMME(A1:A5) additionne les cellules de A1 à A5.</p><button onclick="markCompleted(5)">✅ Terminer ce module</button>`,
        module6: `<h3>⚖️ Module 6 – La fonction SI</h3><p>=SI(A1>=10;"Réussi";"Échec")</p><button onclick="markCompleted(6)">✅ Terminer ce module</button>`,
        module7: `<h3>🏁 Module 7 – Bilan</h3><p>Tu as appris les bases d’Excel.</p><button onclick="markCompleted(7)">✅ Terminer ce module</button>`,
        module8: `<h3>🏆 Module 8 – Projet final</h3><p>Construis ton propre tableau de bord.</p><button onclick="markCompleted(8)">✅ Terminer ce module</button>`,
        module9: `<h3>🎓 Module 9 – Révision</h3><p>Révise les 8 premiers modules.</p><button onclick="markCompleted(9)">✅ Terminer ce module</button>`,
        module10: `<h3>📋 Module 10 – Tableaux structurés</h3><p>Crée un tableau avec CTRL+T pour bénéficier de filtres automatiques.</p><button onclick="markCompleted(10)">✅ Terminer ce module</button>`,
        module11: `<h3>🔍 Module 11 – Filtres et tris</h3><p>Les filtres permettent de n’afficher que certaines lignes.</p><button onclick="markCompleted(11)">✅ Terminer ce module</button>`,
        module12: `<h3>📈 Module 12 – Graphiques avancés</h3><p>Histogramme, courbe, camembert… choisis celui qui raconte ton histoire.</p><button onclick="markCompleted(12)">✅ Terminer ce module</button>`,
        module13: `<h3>✍️ Module 13 – Formules de texte</h3><p>Concaténer, extraire des caractères, mettre en majuscules.</p><button onclick="markCompleted(13)">✅ Terminer ce module</button>`
    };

    // Progression et premium
    let completed = JSON.parse(localStorage.getItem('excelCompleted')) || [];
    let isPremium = localStorage.getItem('excelPremium') === 'true';
    let currentModule = parseInt(localStorage.getItem('currentModule')) || 1;

    function saveProgress() {
        localStorage.setItem('excelCompleted', JSON.stringify(completed));
        localStorage.setItem('currentModule', currentModule);
        localStorage.setItem('excelPremium', isPremium);
    }

    function markCompleted(id) {
        if (!completed.includes(id)) {
            completed.push(id);
            saveProgress();
            alert(`🎉 Module ${id} terminé !`);
            renderNav();
            if (currentModule === id) renderCurrentModule();
        } else {
            alert(`✅ Module déjà terminé.`);
        }
    }
    window.markCompleted = markCompleted;

    function isModuleLocked(id) {
        if (id <= 9) return false;
        return !isPremium;
    }

    function renderNav() {
        const nav = document.getElementById('modulesNav');
        nav.innerHTML = '';
        modules.forEach(m => {
            const locked = isModuleLocked(m.id);
            const completedFlag = completed.includes(m.id);
            const btn = document.createElement('button');
            btn.className = `module-btn ${currentModule === m.id ? 'active' : ''} ${locked ? 'locked' : ''}`;
            btn.innerText = `${m.title} ${completedFlag ? '✓' : ''} ${locked ? '🔒' : ''}`;
            if (!locked) {
                btn.onclick = () => {
                    currentModule = m.id;
                    saveProgress();
                    renderNav();
                    renderCurrentModule();
                };
            } else {
                btn.onclick = () => {
                    document.getElementById('globalFeedback').innerHTML = '🔒 Ces modules avancés sont accessibles après paiement. Clique sur "⭐ Débloquer l’intégralité".';
                };
            }
            nav.appendChild(btn);
        });
    }

    function renderCurrentModule() {
        const module = modules.find(m => m.id === currentModule);
        const contentDiv = document.getElementById('moduleContent');
        if (module && !isModuleLocked(module.id)) {
            contentDiv.innerHTML = contents[module.content] || `<p>Module ${module.id} en préparation.</p>`;
        } else if (module && isModuleLocked(module.id)) {
            contentDiv.innerHTML = `
                <div style="text-align:center; padding: 40px;">
                    <p style="color:#facc15;">🔒 Ce module fait partie des modules avancés.</p>
                    <button id="premiumPopupBtn" style="margin-top: 20px;">⭐ Débloquer maintenant</button>
                </div>
            `;
            document.getElementById('premiumPopupBtn')?.addEventListener('click', () => showPaymentModal());
        } else {
            contentDiv.innerHTML = '<p>Module introuvable.</p>';
        }
    }

    function showPaymentModal() {
        document.getElementById('paymentModal').classList.add('active');
    }

    function closePaymentModal() {
        document.getElementById('paymentModal').classList.remove('active');
        document.getElementById('paymentMessage').innerHTML = '';
        document.getElementById('phoneNumber').value = '';
    }

    function simulatePayment(provider) {
        const phone = document.getElementById('phoneNumber').value.trim();
        if (!phone) {
            document.getElementById('paymentMessage').innerHTML = '📱 Veuillez entrer votre numéro de téléphone.';
            return;
        }
        document.getElementById('paymentMessage').innerHTML = '⏳ Traitement en cours...';
        setTimeout(() => {
            // Simuler un succès de paiement
            isPremium = true;
            saveProgress();
            document.getElementById('paymentMessage').innerHTML = '✅ Paiement réussi ! Modules avancés débloqués.';
            setTimeout(() => {
                closePaymentModal();
                document.getElementById('globalFeedback').innerHTML = '🎉 Félicitations ! Tu as maintenant accès à tous les modules.';
                renderNav();
                if (currentModule >= 10) renderCurrentModule();
                updatePremiumStatus();
            }, 1500);
        }, 1000);
    }

    function updatePremiumStatus() {
        const statusSpan = document.getElementById('premiumStatus');
        if (isPremium) {
            statusSpan.innerHTML = '<span class="premium-badge">⭐ Accès complet</span>';
        } else {
            statusSpan.innerHTML = '<span style="color:#f97316;">⭐ Modules avancés verrouillés</span>';
        }
    }

    function nextModule() {
        let next = currentModule + 1;
        while (next <= modules.length && isModuleLocked(next)) next++;
        if (next <= modules.length) {
            currentModule = next;
            saveProgress();
            renderNav();
            renderCurrentModule();
        } else {
            alert('🎉 Tu as atteint le dernier module accessible !');
        }
    }

    function prevModule() {
        if (currentModule > 1) {
            currentModule--;
            saveProgress();
            renderNav();
            renderCurrentModule();
        }
    }

    function resetProgress() {
        if (confirm('Effacer toute ta progression ? Les modules redeviendront non-terminés. Le statut premium reste actif.')) {
            completed = [];
            saveProgress();
            renderNav();
            renderCurrentModule();
        }
    }

    document.getElementById('prevBtn').addEventListener('click', prevModule);
    document.getElementById('nextBtn').addEventListener('click', nextModule);
    document.getElementById('resetProgressBtn').addEventListener('click', resetProgress);
    document.getElementById('premiumButton').addEventListener('click', showPaymentModal);
    document.getElementById('orangeMoneyBtn').addEventListener('click', () => simulatePayment('orange'));
    document.getElementById('mtnMoneyBtn').addEventListener('click', () => simulatePayment('mtn'));
    document.getElementById('confirmPaymentBtn').addEventListener('click', () => simulatePayment('orange'));
    document.getElementById('closePaymentBtn').addEventListener('click', closePaymentModal);

    renderNav();
    renderCurrentModule();
    updatePremiumStatus();
</script>
</body>
</html>
