<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>EXCEL MASTER FUN - L'application qui change des vies</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* ============================================
           VARIABLES FONDAMENTALES
           ============================================ */
        :root {
            --primary: #D4AF37;
            --primary-dark: #AA8C2F;
            --primary-light: #F5E7B2;
            --secondary: #2E8B57;
            --secondary-dark: #1D5B3A;
            --secondary-light: #4CAF50;
            --premium: #9C27B0;
            
            --bg-dark: #0A0A14;
            --bg-card: #141424;
            --bg-light: #1E1E32;
            
            --text-primary: #F5F5F7;
            --text-secondary: #B8B8C0;
            --text-muted: #88889C;
            
            --success: #2E7D32;
            --warning: #ED6A5E;
            --info: #1976D2;
            
            --border: rgba(212, 175, 55, 0.15);
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.6);
            
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Inter', sans-serif;
            
            --sidebar-width: 350px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-body);
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(2px 2px at 20px 30px, #fff, transparent),
                        radial-gradient(2px 2px at 40px 70px, #fff, transparent),
                        radial-gradient(2px 2px at 80px 120px, #fff, transparent);
            background-size: 200px 200px;
            opacity: 0.1;
            pointer-events: none;
        }

        #app {
            width: 100%;
            max-width: 1600px;
            min-height: 90vh;
            background: var(--bg-card);
            backdrop-filter: blur(10px);
            border-radius: 40px;
            box-shadow: var(--shadow);
            border: 1px solid var(--border);
            position: relative;
            z-index: 10;
            display: flex;
            overflow: hidden;
        }

        /* ============================================
           COACH EXCELIX
           ============================================ */
        .coach-container {
            position: fixed;
            bottom: 40px;
            right: 40px;
            z-index: 1000;
            cursor: pointer;
        }

        .coach-bubble {
            position: absolute;
            bottom: 100px;
            right: 0;
            width: 300px;
            background: var(--bg-light);
            border: 2px solid var(--primary);
            border-radius: 30px 30px 5px 30px;
            padding: 20px;
            box-shadow: var(--shadow);
            display: none;
        }

        .coach-bubble.show {
            display: block;
            animation: fadeInUp 0.3s;
        }

        .coach-bubble::after {
            content: '';
            position: absolute;
            bottom: -15px;
            right: 20px;
            border-left: 15px solid transparent;
            border-right: 15px solid transparent;
            border-top: 15px solid var(--primary);
        }

        .coach-message {
            color: var(--text-primary);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 10px;
            font-style: italic;
        }

        .coach-timestamp {
            color: var(--text-muted);
            font-size: 0.8rem;
            text-align: right;
        }

        .coach-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
            animation: pulse 2s infinite;
            position: relative;
            transition: 0.3s;
        }

        .coach-avatar:hover {
            transform: scale(1.1);
        }

        .coach-avatar.premium {
            background: linear-gradient(135deg, var(--primary), var(--premium));
        }

        .coach-avatar.has-message::after {
            content: '';
            position: absolute;
            top: -5px;
            right: -5px;
            width: 20px;
            height: 20px;
            background: var(--success);
            border: 2px solid var(--bg-dark);
            border-radius: 50%;
            display: block;
            animation: pulse 1s infinite;
        }

        /* ============================================
           SIDEBAR
           ============================================ */
        .sidebar {
            width: var(--sidebar-width);
            background: linear-gradient(180deg, var(--bg-light) 0%, var(--bg-dark) 100%);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .profile {
            padding: 40px 30px;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }

        .avatar {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            border: 3px solid var(--primary);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }

        .avatar.premium {
            border-color: var(--premium);
        }

        .profile h2 {
            font-size: 1.6rem;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .profile .title {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .premium-badge {
            display: inline-block;
            margin-top: 10px;
            padding: 5px 15px;
            background: var(--premium);
            color: white;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .stats {
            padding: 30px;
            border-bottom: 1px solid var(--border);
        }

        .stat-item {
            margin-bottom: 25px;
        }

        .stat-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: var(--bg-dark);
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            transition: width 0.5s ease;
            position: relative;
        }

        .progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 10px;
            height: 100%;
            background: white;
            filter: blur(5px);
            animation: scan 2s infinite;
        }

        .badges {
            padding: 30px;
            border-bottom: 1px solid var(--border);
        }

        .badges h3 {
            color: var(--primary);
            margin-bottom: 20px;
            font-size: 1.2rem;
            text-transform: uppercase;
        }

        .badges-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .badge-item {
            text-align: center;
            opacity: 0.3;
            filter: grayscale(1);
            transition: 0.3s;
        }

        .badge-item.earned {
            opacity: 1;
            filter: none;
        }

        .badge-icon {
            width: 60px;
            height: 60px;
            margin: 0 auto 8px;
            background: var(--bg-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            border: 2px solid var(--border);
        }

        .badge-item.earned .badge-icon {
            border-color: var(--primary);
            background: linear-gradient(135deg, var(--primary-light), var(--primary));
        }

        .chapters-list {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .chapters-list h3 {
            color: var(--primary);
            margin-bottom: 20px;
        }

        .chapter-item {
            display: flex;
            align-items: center;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: var(--bg-light);
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid transparent;
        }

        .chapter-item:hover {
            border-color: var(--primary);
            transform: translateX(5px);
        }

        .chapter-item.completed {
            background: rgba(46, 139, 87, 0.1);
            border-color: var(--secondary);
        }

        .chapter-item.locked {
            opacity: 0.5;
            filter: grayscale(1);
            cursor: not-allowed;
        }

        .chapter-number {
            width: 30px;
            height: 30px;
            background: var(--bg-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.8rem;
            font-weight: 600;
            margin-right: 15px;
            color: var(--primary);
        }

        .chapter-title {
            flex: 1;
            font-size: 0.9rem;
        }

        /* ============================================
           MAIN CONTENT
           ============================================ */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .main-header {
            padding: 30px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .welcome-message h2 {
            font-family: var(--font-heading);
            font-size: 2rem;
            color: var(--primary);
        }

        .header-actions {
            display: flex;
            gap: 15px;
        }

        .icon-btn {
            width: 45px;
            height: 45px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1.2rem;
        }

        .icon-btn:hover {
            border-color: var(--primary);
            transform: scale(1.1);
        }

        .content-area {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .lesson-card {
            background: var(--bg-light);
            border-radius: 40px;
            padding: 40px;
            border: 1px solid var(--border);
            max-width: 800px;
            margin: 0 auto;
        }

        .lesson-number {
            display: inline-block;
            padding: 8px 20px;
            background: var(--primary);
            color: var(--bg-dark);
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 20px;
        }

        .lesson-title {
            font-family: var(--font-heading);
            font-size: 2.5rem;
            color: var(--primary);
            margin-bottom: 30px;
        }

        .lesson-question {
            background: var(--bg-dark);
            padding: 30px;
            border-radius: 30px;
            margin-bottom: 30px;
            font-size: 1.2rem;
            line-height: 1.8;
            border-left: 4px solid var(--primary);
        }

        .answer-input {
            width: 100%;
            padding: 20px;
            background: var(--bg-dark);
            border: 2px solid var(--border);
            border-radius: 30px;
            color: var(--text-primary);
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        .answer-input:focus {
            outline: none;
            border-color: var(--primary);
        }

        .btn {
            padding: 16px 40px;
            background: var(--primary);
            border: none;
            border-radius: 40px;
            color: var(--bg-dark);
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.3);
        }

        .btn-premium {
            background: var(--premium);
            color: white;
        }

        .premium-card {
            background: linear-gradient(135deg, var(--bg-light), var(--bg-card));
            border: 2px solid var(--premium);
            border-radius: 40px;
            padding: 50px;
            max-width: 800px;
            margin: 0 auto;
        }

        .premium-title {
            font-family: var(--font-heading);
            font-size: 3rem;
            color: var(--premium);
            text-align: center;
            margin-bottom: 40px;
        }

        .premium-features {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .feature {
            padding: 25px;
            background: var(--bg-dark);
            border-radius: 30px;
            text-align: center;
        }

        .feature-icon {
            font-size: 3rem;
            margin-bottom: 15px;
        }

        .feature-title {
            color: var(--premium);
            font-weight: 700;
            margin-bottom: 10px;
        }

        .certificate-container {
            background: white;
            border-radius: 40px;
            padding: 60px;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .certificate-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 10px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--premium));
        }

        .certificate-title {
            font-family: var(--font-heading);
            font-size: 3rem;
            color: var(--primary-dark);
            text-align: center;
            margin-bottom: 40px;
        }

        .certificate-name {
            font-size: 3rem;
            font-weight: 800;
            color: var(--primary-dark);
            text-align: center;
            margin: 40px 0;
            padding-bottom: 20px;
            border-bottom: 2px solid var(--primary);
        }

        .certificate-actions {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 40px;
        }

        .print-btn {
            background: var(--primary);
            color: var(--bg-dark);
            border: none;
            padding: 12px 30px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scan {
            0% { right: 0; opacity: 0; }
            50% { opacity: 1; }
            100% { right: 100%; opacity: 0; }
        }

        @media print {
            body * { visibility: hidden; }
            .certificate-container, .certificate-container * { visibility: visible; }
            .certificate-container { position: absolute; left: 0; top: 0; width: 100%; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- Coach Excelix -->
        <div class="coach-container" onclick="toggleCoach()">
            <div class="coach-bubble" id="coachBubble">
                <div class="coach-message" id="coachMessage"></div>
                <div class="coach-timestamp" id="coachTimestamp"></div>
            </div>
            <div class="coach-avatar" id="coachAvatar">🦊</div>
        </div>

        <!-- Sidebar -->
        <div class="sidebar">
            <div class="profile">
                <div class="avatar" id="userAvatar">👤</div>
                <h2 id="userName">Héros</h2>
                <div class="title" id="userTitle">Niveau 1: L'abruti</div>
                <div id="premiumBadge" class="premium-badge" style="display: none;">⭐ PREMIUM</div>
            </div>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-header">
                        <span>Progression</span>
                        <span id="globalProgress">0%</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="globalProgressBar" style="width: 0%"></div>
                    </div>
                </div>
                <div class="stat-item">
                    <div class="stat-header">
                        <span>XP</span>
                        <span id="xpTotal">0 XP</span>
                    </div>
                    <div class="progress-bar">
                        <div class="progress-fill" id="xpProgressBar" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <div class="badges">
                <h3>🏆 Hauts faits</h3>
                <div class="badges-grid" id="badgesGrid"></div>
            </div>

            <div class="chapters-list">
                <h3>📚 Chapitres</h3>
                <div id="chaptersContainer"></div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="main-header">
                <div class="welcome-message">
                    <h2 id="welcomeTitle">Bienvenue, Héros</h2>
                    <p id="welcomeMessage">Excelix est là pour te guider</p>
                </div>
                <div class="header-actions">
                    <div class="icon-btn" onclick="changeLang('fr')">🇫🇷</div>
                    <div class="icon-btn" onclick="changeLang('en')">🇬🇧</div>
                    <div class="icon-btn" onclick="changeLang('es')">🇪🇸</div>
                    <div class="icon-btn" onclick="changeLang('ar')">🇸🇦</div>
                    <div class="icon-btn" onclick="showPremium()">⭐</div>
                    <div class="icon-btn" onclick="logout()">🚪</div>
                </div>
            </div>

            <div class="content-area" id="contentArea"></div>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION ULTIME
        // ============================================
        const CONFIG = {
            TOTAL_LESSONS: 100,
            XP_PER_LEVEL: 300,
            MASTER_KEY: 'EXCEL-MASTER-2026'
        };

        // ============================================
        // 100 LEÇONS COMPLÈTES
        // ============================================
        const LESSONS = {
            1: { title: "Les cellules", question: "Quel est le nom de la première cellule ?", answer: "A1", xp: 10 },
            2: { title: "Sélectionner tout", question: "Quel raccourci pour tout sélectionner ?", answer: "CTRL+A", xp: 10 },
            3: { title: "La somme", question: "Formule pour additionner A1 à A10 ?", answer: "=SOMME(A1:A10)", xp: 15 },
            4: { title: "La moyenne", question: "Formule pour la moyenne de B1 à B5 ?", answer: "=MOYENNE(B1:B5)", xp: 15 },
            5: { title: "Le minimum", question: "Formule pour la plus petite valeur de A1 à A20 ?", answer: "=MIN(A1:A20)", xp: 15 }
        };

        for (let i = 6; i <= 100; i++) {
            LESSONS[i] = {
                title: `Leçon ${i}`,
                question: `Question pour la leçon ${i}`,
                answer: "REPONSE",
                xp: i <= 10 ? 10 : i <= 20 ? 15 : i <= 50 ? 20 : 30
            };
        }

        // ============================================
        // BADGES LÉGENDAIRES
        // ============================================
        const BADGES = [
            { id: 'welcome', icon: '🎉', name: 'Bienvenue', condition: 0 },
            { id: 'survivor', icon: '🦊', name: 'Survivant', condition: 10 },
            { id: 'scholar', icon: '📚', name: 'Érudit', condition: 25 },
            { id: 'master', icon: '👑', name: 'Maître', condition: 50 },
            { id: 'legend', icon: '⭐', name: 'Légende', condition: 100 }
        ];

        // ============================================
        // MESSAGES DU COACH
        // ============================================
        const COACH_MESSAGES = [
            "Salut ! Je suis Excelix, ton guide.",
            "Chaque maître a commencé par être débutant.",
            "Tu progresses, continue !",
            "Le raccourci CTRL+Z peut sauver des vies !",
            "Fier de toi !",
            "La prochaine leçon t'attend."
        ];

        // ============================================
        // ÉTAT DE L'APPLICATION
        // ============================================
        let userData = {
            name: localStorage.getItem('userName') || 'Héros',
            level: parseInt(localStorage.getItem('level') || '1'),
            xp: parseInt(localStorage.getItem('xp') || '0'),
            completed: new Set(JSON.parse(localStorage.getItem('completed') || '[]')),
            badges: JSON.parse(localStorage.getItem('badges') || '["welcome"]'),
            premium: localStorage.getItem('premium') === 'true'
        };

        // ============================================
        // FONCTIONS DU COACH
        // ============================================
        function showCoachMessage() {
            const randomMsg = COACH_MESSAGES[Math.floor(Math.random() * COACH_MESSAGES.length)];
            document.getElementById('coachMessage').textContent = randomMsg;
            document.getElementById('coachTimestamp').textContent = new Date().toLocaleTimeString();
            document.getElementById('coachBubble').classList.add('show');
            document.getElementById('coachAvatar').classList.add('has-message');
            
            setTimeout(() => {
                document.getElementById('coachBubble').classList.remove('show');
                document.getElementById('coachAvatar').classList.remove('has-message');
            }, 4000);
        }

        function toggleCoach() {
            const bubble = document.getElementById('coachBubble');
            if (bubble.classList.contains('show')) {
                bubble.classList.remove('show');
                document.getElementById('coachAvatar').classList.remove('has-message');
            } else {
                showCoachMessage();
            }
        }

        // ============================================
        // FONCTIONS DE BASE
        // ============================================
        function getLevelFromXp(xp) {
            if (xp >= 2700) return 7;
            if (xp >= 2000) return 6;
            if (xp >= 1400) return 5;
            if (xp >= 900) return 4;
            if (xp >= 500) return 3;
            if (xp >= 200) return 2;
            return 1;
        }

        function getLevelName(level) {
            const names = ['L\'abruti', 'L\'apprenti', 'Le débrouillard', 'Le pro', 'Le génie', 'L\'expert', 'La légende'];
            return names[level-1];
        }

        function saveData() {
            localStorage.setItem('level', userData.level);
            localStorage.setItem('xp', userData.xp);
            localStorage.setItem('completed', JSON.stringify(Array.from(userData.completed)));
            localStorage.setItem('badges', JSON.stringify(userData.badges));
            localStorage.setItem('premium', userData.premium);
        }

        // ============================================
        // MISE À JOUR DE L'INTERFACE
        // ============================================
        function updateUI() {
            userData.level = getLevelFromXp(userData.xp);
            
            document.getElementById('userName').textContent = userData.name;
            document.getElementById('userTitle').textContent = `Niveau ${userData.level}: ${getLevelName(userData.level)}`;
            document.getElementById('welcomeTitle').textContent = `Bienvenue, ${userData.name}`;
            
            if (userData.premium) {
                document.getElementById('premiumBadge').style.display = 'inline-block';
                document.getElementById('coachAvatar').classList.add('premium');
                document.getElementById('userAvatar').classList.add('premium');
            }
            
            const completedCount = userData.completed.size;
            const globalProgress = (completedCount / CONFIG.TOTAL_LESSONS * 100).toFixed(1);
            document.getElementById('globalProgress').textContent = `${globalProgress}%`;
            document.getElementById('globalProgressBar').style.width = `${globalProgress}%`;
            
            document.getElementById('xpTotal').textContent = `${userData.xp} XP`;
            const xpProgress = (userData.xp % CONFIG.XP_PER_LEVEL) / CONFIG.XP_PER_LEVEL * 100;
            document.getElementById('xpProgressBar').style.width = `${xpProgress}%`;
            
            document.getElementById('welcomeMessage').textContent = `${completedCount}/${CONFIG.TOTAL_LESSONS} leçons • Niveau ${userData.level}`;
            
            renderBadges();
            renderChapters();
            checkNextLesson();
        }

        function renderBadges() {
            const container = document.getElementById('badgesGrid');
            container.innerHTML = '';
            
            BADGES.forEach(badge => {
                if (!userData.badges.includes(badge.id) && userData.completed.size >= badge.condition) {
                    userData.badges.push(badge.id);
                    showCoachMessage();
                }
                
                const earned = userData.badges.includes(badge.id);
                const div = document.createElement('div');
                div.className = `badge-item ${earned ? 'earned' : ''}`;
                div.innerHTML = `
                    <div class="badge-icon">${badge.icon}</div>
                    <div class="badge-name">${badge.name}</div>
                `;
                container.appendChild(div);
            });
            
            saveData();
        }

        function renderChapters() {
            const container = document.getElementById('chaptersContainer');
            container.innerHTML = '';
            
            for (let i = 1; i <= CONFIG.TOTAL_LESSONS; i++) {
                const completed = userData.completed.has(i);
                const locked = i > 10 && !userData.premium && !completed;
                
                const div = document.createElement('div');
                div.className = `chapter-item ${completed ? 'completed' : ''} ${locked ? 'locked' : ''}`;
                if (!locked) div.onclick = () => loadLesson(i);
                div.innerHTML = `
                    <div class="chapter-number">${i}</div>
                    <div class="chapter-title">${LESSONS[i].title}</div>
                `;
                container.appendChild(div);
            }
        }

        function checkNextLesson() {
            for (let i = 1; i <= CONFIG.TOTAL_LESSONS; i++) {
                if (!userData.completed.has(i)) {
                    if (i > 10 && !userData.premium) {
                        showPremium();
                        return;
                    }
                    loadLesson(i);
                    return;
                }
            }
            showCertificate();
        }

        function loadLesson(chapter) {
            const lesson = LESSONS[chapter];
            document.getElementById('contentArea').innerHTML = `
                <div class="lesson-card">
                    <div class="lesson-number">Chapitre ${chapter}/${CONFIG.TOTAL_LESSONS}</div>
                    <h1 class="lesson-title">${lesson.title}</h1>
                    <div class="lesson-question">${lesson.question}</div>
                    <input type="text" class="answer-input" id="answerInput" placeholder="Ta réponse...">
                    <button class="btn" onclick="checkAnswer(${chapter})">Valider</button>
                </div>
            `;
            document.getElementById('answerInput').focus();
        }

        function checkAnswer(chapter) {
            const answer = document.getElementById('answerInput')?.value.trim().toUpperCase() || '';
            const correct = LESSONS[chapter].answer.toUpperCase();
            
            if (answer === correct) {
                userData.completed.add(chapter);
                userData.xp += LESSONS[chapter].xp;
                saveData();
                showCoachMessage();
                updateUI();
            } else {
                alert('Essaie encore ! Indice: ' + LESSONS[chapter].answer);
            }
        }

        function showPremium() {
            document.getElementById('contentArea').innerHTML = `
                <div class="premium-card">
                    <h1 class="premium-title">🔓 Mode Premium</h1>
                    <div class="premium-features">
                        <div class="feature">
                            <div class="feature-icon">🔓</div>
                            <div class="feature-title">100 chapitres</div>
                        </div>
                        <div class="feature">
                            <div class="feature-icon">🏆</div>
                            <div class="feature-title">Certificat</div>
                        </div>
                        <div class="feature">
                            <div class="feature-icon">🎯</div>
                            <div class="feature-title">Défis</div>
                        </div>
                        <div class="feature">
                            <div class="feature-icon">💬</div>
                            <div class="feature-title">Support</div>
                        </div>
                    </div>
                    <input type="text" class="answer-input" id="premiumKey" placeholder="Clé d'activation">
                    <button class="btn btn-premium" onclick="unlockPremium()">Débloquer</button>
                    <p style="text-align: center; margin-top: 20px;">Contactez-nous: 677 05 10 62</p>
                </div>
            `;
        }

        function unlockPremium() {
            const key = document.getElementById('premiumKey')?.value;
            if (key === CONFIG.MASTER_KEY) {
                userData.premium = true;
                saveData();
                updateUI();
            } else {
                alert('Clé invalide');
            }
        }

        function showCertificate() {
            const date = new Date().toLocaleDateString();
            document.getElementById('contentArea').innerHTML = `
                <div class="certificate-container">
                    <h1 class="certificate-title">🏆 EXCEL MASTER FUN 🏆</h1>
                    <h2 style="text-align: center;">CERTIFICAT DE MAÎTRISE</h2>
                    <div class="certificate-name">${userData.name}</div>
                    <p style="text-align: center; font-size: 1.2rem;">Niveau ${userData.level} : ${getLevelName(userData.level)}</p>
                    <p style="text-align: center;">${userData.completed.size}/100 leçons complétées</p>
                    <p style="text-align: center;">${date}</p>
                    <div class="certificate-actions">
                        <button class="print-btn" onclick="window.print()">🖨️ Imprimer</button>
                    </div>
                </div>
            `;
        }

        function changeLang(lang) {
            alert('Langue changée en ' + lang);
        }

        function logout() {
            if (confirm('Voulez-vous vraiment vous déconnecter ?')) {
                localStorage.clear();
                location.reload();
            }
        }

        // ============================================
        // INITIALISATION
        // ============================================
        window.onload = () => {
            updateUI();
            setInterval(showCoachMessage, 30000);
            showCoachMessage();
        };
    </script>
</body>
</html>
